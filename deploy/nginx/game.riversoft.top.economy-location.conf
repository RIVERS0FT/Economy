# Economy account bridge: expose only the shared-account endpoints needed by the game.
# Requests remain same-origin on game.riversoft.top while credentials are verified by
# the existing RIVERSOFT account service and user database on 127.0.0.1:3001.
location = /economy-api/login {
    proxy_pass http://127.0.0.1:3001/api/login;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

location = /economy-api/me {
    proxy_pass http://127.0.0.1:3001/api/me;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

location = /economy-api/logout {
    proxy_pass http://127.0.0.1:3001/api/logout;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

location = /economy {
    return 301 /economy/;
}

location ^~ /economy/assets/ {
    root /var/www/game;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
}

location ^~ /economy/ {
    root /var/www/game;
    index index.html;
    try_files $uri $uri/ /economy/index.html;
}

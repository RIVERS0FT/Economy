# Economy account bridge: only login/session routes are delegated to the shared
# RIVERSOFT account service on port 3001.
location = /economy-api/login {
    proxy_pass http://127.0.0.1:3001/api/login;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

location = /economy-api/me {
    proxy_pass http://127.0.0.1:3001/api/me;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

location = /economy-api/logout {
    proxy_pass http://127.0.0.1:3001/api/logout;
    proxy_http_version 1.1;
    proxy_set_header Host riversoft.top;
    proxy_set_header X-Forwarded-Host riversoft.top;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Origin "";
    proxy_cookie_path / /;
}

# All authoritative economy state and actions are handled by the dedicated game
# service on port 3002. The trailing slash intentionally maps
# /economy-api/game/state -> /api/game/state.
location ^~ /economy-api/game/ {
    proxy_pass http://127.0.0.1:3002/api/game/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    client_max_body_size 256k;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types application/json;
}

location = /economy {
    return 301 /economy/;
}

location ^~ /economy/assets/ {
    root /var/www/game;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
}

location ^~ /economy/ {
    root /var/www/game;
    index index.html;
    try_files $uri $uri/ /economy/index.html;
}

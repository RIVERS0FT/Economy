location = /economy {
    return 301 /economy/;
}

location ^~ /economy/assets/ {
    root /var/www/game;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
}

location ^~ /economy/ {
    root /var/www/game;
    index index.html;
    try_files $uri $uri/ /economy/index.html;
}

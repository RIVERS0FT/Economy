name: Apply Desktop Production Optimization

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/agent-optimize-production.patch
      - .github/workflows/agent-optimize-production.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply production optimization
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{path}: expected one match, found {text.count(old)}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'src/pages/ProductionPage.tsx',
              '      <div className="facility-card-spacer" aria-hidden="true" />\n',
              '',
          )

          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''.facility-cluster-detail-shell {
            grid-area: detail;
            min-width: 0;
            display: flex;
            align-self: stretch;
            container-type: inline-size;
          }

          .facility-cluster-detail-card {
            width: 100%;
            min-width: 0;
            min-height: 100%;
          }
          ''',
              '''.facility-cluster-detail-shell {
            grid-area: detail;
            min-width: 0;
            display: flex;
            align-self: start;
            container-type: inline-size;
          }

          .facility-cluster-detail-card {
            width: 100%;
            min-width: 0;
            min-height: 0;
          }
          ''',
          )
          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''  display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr) auto;
            grid-auto-rows: auto;
            align-content: stretch;
            align-items: start;
          ''',
              '''  display: grid;
            grid-template-rows: auto;
            grid-auto-rows: auto;
            align-content: start;
            align-items: start;
          ''',
          )
          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''.facility-card-spacer {
            min-height: 0;
          }

          ''',
              '',
          )
          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''  .facility-cluster-selector-list {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .facility-group-card {
          ''',
              '''  .facility-cluster-selector-list {
              grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .production-build-card {
              position: static;
              top: auto;
              max-height: none;
              overflow: visible;
            }

            .facility-group-card {
          ''',
          )
          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''
            .facility-card-spacer {
              display: none;
            }
          ''',
              '\n          ',
          )
          replace_once(
              'src/styles/facility-group-card-grid.css',
              '''/* Desktop production workspace density. */
          @media (min-width: 961px) {
            .production-build-card {
              top: var(--desktop-page-top-offset);
              max-height: calc(100dvh - var(--desktop-page-top-offset) - var(--desktop-layout-gutter));
            }

            .facility-cluster-detail-shell {
              align-self: start;
            }

            .facility-cluster-detail-card {
              min-height: 0;
            }

            .facility-cluster-detail-card.facility-group-card {
              grid-template-rows: auto;
              align-content: start;
            }

            .facility-card-spacer {
              display: none;
            }
          }
          ''',
              '''/* Desktop production workspace density. */
          @media (min-width: 961px) {
            .production-build-card {
              position: sticky;
              top: var(--desktop-page-top-offset);
              align-self: start;
              max-height: calc(100dvh - var(--desktop-page-top-offset) - var(--desktop-layout-gutter));
              overflow-y: auto;
              overscroll-behavior-x: contain;
              overscroll-behavior-y: auto;
            }
          }
          ''',
          )

          replace_once(
              'src/styles/industry-system.css',
              '''.production-grid {
            grid-template-columns: minmax(0, 1fr);
          }

          ''',
              '',
          )
          replace_once(
              'src/styles/industry-system.css',
              '''.production-build-card {
            position: static;
            top: auto;
            display: grid;
          ''',
              '''.production-build-card {
            display: grid;
          ''',
          )
          replace_once(
              'src/styles/industry-system.css',
              '''.production-grid {
            grid-template-columns: minmax(280px, 320px) minmax(0, 1fr);
            align-items: start;
          }

          ''',
              '',
          )
          replace_once(
              'src/styles/industry-system.css',
              '''.production-build-card {
            position: sticky;
            top: var(--space-3);
            align-self: start;
            display: grid;
            grid-template-columns: 1fr;
            align-items: start;
            gap: var(--space-3);
            max-height: calc(100dvh - var(--space-6));
            overflow-y: auto;
            overscroll-behavior-x: contain;
            overscroll-behavior-y: auto;
          }
          ''',
              '''.production-build-card {
            display: grid;
            grid-template-columns: 1fr;
            align-items: start;
            gap: var(--space-3);
          }
          ''',
          )
          replace_once(
              'src/styles/industry-system.css',
              '''@media (max-width: 960px) {
            .production-grid {
              grid-template-columns: 1fr;
            }

            .production-build-card {
              position: static;
              top: auto;
              max-height: none;
              overflow: visible;
            }

            .facility-group-card {
          ''',
              '''@media (max-width: 960px) {
            .facility-group-card {
          ''',
          )

          replace_once(
              'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md',
              '共享仓库、建设新工厂、工厂集群选择和桌面当前工厂详情属于生产页同一一级平面，统一使用 `.production-surface` 与 `PagePanel`：大于 `720px` 时四边内边距统一为 `16px`，不大于 `720px` 时统一为 `12px`。业务 CSS 只管理轨道、列数、内部密度和 Overlay，不得重新声明一级卡片外层 `padding`。\n',
              '共享仓库、建设新工厂、工厂集群选择和桌面当前工厂详情属于生产页同一一级平面，统一使用 `.production-surface` 与 `PagePanel`：大于 `720px` 时四边内边距统一为 `16px`，不大于 `720px` 时统一为 `12px`。业务 CSS 只管理轨道、列数、内部密度和 Overlay，不得重新声明一级卡片外层 `padding`。\n\n生产管理区的主网格、响应式轨道、建设卡 sticky 几何、集群选择器和详情高度统一由 `src/styles/facility-group-card-grid.css` 负责；`src/styles/industry-system.css` 只保留建设表单、施工状态和生产内容的内部密度，不得重新声明 `.production-grid` 主轨道、sticky 顶部偏移、最大高度或页面级溢出规则。\n',
          )
          replace_once(
              'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md',
              '- 桌面详情卡高度由内容决定：详情壳使用交叉轴起始对齐，详情卡不得使用 `min-height: 100%`、弹性空白行或可见占位 spacer；市场入口紧跟在实际详情内容之后。\n',
              '- 桌面详情卡高度由内容决定：详情壳使用交叉轴起始对齐，详情卡不得使用 `min-height: 100%`、弹性空白行或可见占位 spacer；市场入口紧跟在实际详情内容之后。\n- 共享详情组件不得渲染无业务语义的 spacer DOM，生产布局 CSS 也不得保留 `.facility-card-spacer` 选择器；自然内容流是桌面详情高度的唯一来源。\n',
          )

          Path('scripts/verify-production-desktop-layout.mjs').write_text('''// Desktop production workspace geometry regression guard.
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const read = (path) => readFileSync(path, 'utf8');
          const shell = read('src/styles/game-shell-layout.css');
          const page = read('src/pages/ProductionPage.tsx');
          const production = read('src/styles/facility-group-card-grid.css');
          const legacyIndustryStyles = read('src/styles/industry-system.css');
          const industry = read('docs/INDUSTRY_AND_PRODUCTION_DESIGN.md');
          const chrome = read('docs/LIQUID_GLASS_CHROME_DESIGN.md');
          const readme = read('README.md');

          for (const text of [
            '--desktop-page-top-offset: calc(',
            'padding-top: var(--desktop-page-top-offset);',
            'scroll-padding-top: var(--desktop-page-top-offset);',
          ]) assert.equal(shell.includes(text), true, `桌面外壳缺少: ${text}`);

          for (const text of [
            'Desktop production workspace density',
            '@media (min-width: 961px)',
            'position: sticky;',
            'top: var(--desktop-page-top-offset);',
            'max-height: calc(100dvh - var(--desktop-page-top-offset) - var(--desktop-layout-gutter));',
            'align-self: start;',
            'grid-template-rows: auto;',
            'align-content: start;',
            '@media (min-width: 1600px)',
            'minmax(440px, 520px)',
            'minmax(480px, 680px)',
            'justify-content: start;',
            'grid-template-columns: repeat(2, minmax(0, 1fr));',
          ]) assert.equal(production.includes(text), true, `桌面生产布局缺少: ${text}`);

          assert.equal(page.includes('facility-card-spacer'), false, '生产详情不得渲染占位 spacer DOM');
          assert.equal(production.includes('.facility-card-spacer'), false, '生产布局不得保留 spacer CSS');
          assert.equal(legacyIndustryStyles.includes('.production-grid {'), false, '旧产业样式不得控制生产主网格');
          assert.equal(legacyIndustryStyles.includes('top: var(--space-3);'), false, '建设卡不得使用独立顶部间距');
          assert.equal(legacyIndustryStyles.includes('max-height: calc(100dvh - var(--space-6));'), false, '建设卡不得维护旧最大高度');

          for (const text of [
            '大于等于 `1600px` 时使用紧凑三列',
            '固定两列选择卡',
            '桌面详情卡高度由内容决定',
            '`--desktop-page-top-offset`',
            '`src/styles/facility-group-card-grid.css` 负责',
            '不得渲染无业务语义的 spacer DOM',
          ]) assert.equal(industry.includes(text), true, `产业设计缺少: ${text}`);

          assert.equal(chrome.includes('页面顶部避让必须集中为 `--desktop-page-top-offset`'), true, '外壳设计缺少统一顶部避让规则');
          assert.equal(readme.includes('大于等于 1600px 时建设卡、两列工厂集群选择器和自然高度的当前详情卡紧凑排列'), true, 'README 缺少桌面生产布局摘要');

          console.log('桌面生产页单一布局权威、自然高度详情、两列集群与统一 sticky 间隔验证通过。');
          ''', encoding='utf-8')
          PY

          node scripts/verify-production-desktop-layout.mjs
          rm .github/agent-optimize-production.patch
          rm .github/workflows/agent-optimize-production.yml

      - name: Commit optimized production layout
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '优化桌面生产页布局权威'
          git push origin HEAD:${{ github.head_ref }}

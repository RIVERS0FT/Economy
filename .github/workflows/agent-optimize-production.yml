name: Apply Desktop Production Optimization

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/agent-optimize-production.patch
      - .github/agent-optimize-production.py
      - .github/workflows/agent-optimize-production.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false

      - name: Apply and verify production optimization
        id: transform
        shell: bash
        run: |
          set +e
          {
            python3 <<'PY'
          from pathlib import Path
          path = Path('.github/agent-optimize-production.py')
          text = path.read_text(encoding='utf-8')
          old = 'industry = re.sub(r"\\n\\.production-grid \\{[^}]*\\}\\n", "\\n", industry)'
          new = 'industry = re.sub(r"(?m)^[ \\t]*\\.production-grid \\{\\n(?:[ \\t]+[^\\n]*\\n)*[ \\t]*\\}\\n", "", industry)'
          if text.count(old) != 1:
              raise SystemExit(f'production-grid regex update mismatch: {text.count(old)}')
          text = text.replace(old, new, 1)
          text = text.replace('assert "top: var(--space-3);" not in industry\n', '')
          text = text.replace('assert "max-height: calc(100dvh - var(--space-6));" not in industry\n', '')
          path.write_text(text, encoding='utf-8')
          PY
            python3 .github/agent-optimize-production.py
            python3 <<'PY'
          import re
          from pathlib import Path

          path = Path('src/styles/industry-system.css')
          lines = path.read_text(encoding='utf-8').splitlines(keepends=True)
          banned = {
              'position',
              'top',
              'align-self',
              'max-height',
              'overflow',
              'overflow-y',
              'overscroll-behavior-x',
              'overscroll-behavior-y',
          }
          output: list[str] = []
          index = 0
          found = 0
          selector = re.compile(r'^[ \t]*\.production-build-card \{[ \t]*$')
          while index < len(lines):
              line = lines[index]
              if not selector.match(line.rstrip('\n')):
                  output.append(line)
                  index += 1
                  continue
              found += 1
              header = line
              index += 1
              kept: list[str] = []
              while index < len(lines) and lines[index].strip() != '}':
                  candidate = lines[index]
                  stripped = candidate.strip()
                  property_name = stripped.split(':', 1)[0] if ':' in stripped else ''
                  if property_name not in banned:
                      kept.append(candidate)
                  index += 1
              if index >= len(lines):
                  raise SystemExit('unterminated production-build-card block')
              closing = lines[index]
              index += 1
              if ''.join(kept).strip():
                  output.extend([header, *kept, closing])

          if found == 0:
              raise SystemExit('no production-build-card blocks were found')
          text = ''.join(output)
          if 'top: var(--space-3);' in text:
              position = text.index('top: var(--space-3);')
              raise SystemExit('old build top remains:\n' + text[max(0, position - 180):position + 220])
          if 'max-height: calc(100dvh - var(--space-6));' in text:
              raise SystemExit('old build max-height remains')
          path.write_text(text, encoding='utf-8')
          PY
            node scripts/verify-production-desktop-layout.mjs
          } > /tmp/production-transform.log 2>&1
          status=$?
          cat /tmp/production-transform.log
          if [ "$status" -ne 0 ]; then exit "$status"; fi
          rm .github/agent-optimize-production.patch
          rm .github/agent-optimize-production.py
          rm .github/workflows/agent-optimize-production.yml

      - name: Upload transform diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-transform-diagnostics
          path: /tmp/production-transform.log

      - name: Commit optimized production layout
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '优化桌面生产页布局权威'
          git push origin HEAD:${{ github.head_ref }}

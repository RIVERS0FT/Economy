name: Fix admin five-section verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Update page responsibility verification
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/verify-page-content.mjs')
          content = path.read_text(encoding='utf-8')

          def replace(old: str, new: str) -> None:
              global content
              if old not in content:
                  raise RuntimeError(f'missing source: {old[:120]!r}')
              content = content.replace(old, new, 1)

          replace(
              "  'src/components/AdminOverview.tsx',\n",
              "  'src/components/AdminOverview.tsx',\n  'src/components/AdminCommunityLinkPanel.tsx',\n  'src/components/AdminPlayerSection.tsx',\n  'src/components/AdminPopulationSection.tsx',\n  'src/components/AdminGiftCodesSection.tsx',\n",
          )
          replace(
              "for (const text of [\n  'items={giftCodes}',\n  'items={redemptions}',\n  'admin-gifts-virtual-table',\n  'admin-redemptions-virtual-table',\n]) requireText('src/app/AdminApp.tsx', text);",
              "for (const text of [\n  'items={giftCodes}',\n  'items={redemptions}',\n  'admin-gifts-virtual-table',\n  'admin-redemptions-virtual-table',\n  'StatusTag',\n]) requireText('src/components/AdminGiftCodesSection.tsx', text);",
          )
          replace(
              "for (const text of [\n  '玩家社区入口',\n  'adminApi.updateCommunityLink',\n  'QQ群跳转链接',\n  \"activeSection === 'bans'\",\n  '<AdminBanPanel',\n  '<AdminSidebar',\n  '<SignedInShell',\n  '<AdminDesktopBar',\n]) requireText('src/app/AdminApp.tsx', text);",
              "for (const text of [\n  '玩家社区入口',\n  'adminApi.updateCommunityLink',\n  'QQ群跳转链接',\n]) requireText('src/components/AdminCommunityLinkPanel.tsx', text);\nfor (const text of [\n  \"visitedSections.has('players')\",\n  \"visitedSections.has('population')\",\n  \"visitedSections.has('gift-codes')\",\n  \"visitedSections.has('bans')\",\n  '<AdminBanPanel',\n  '<AdminSidebar',\n  '<SignedInShell',\n  '<AdminDesktopBar',\n]) requireText('src/app/AdminApp.tsx', text);",
          )
          replace(
              "  \"export type AdminSectionId = 'overview' | 'community' | 'gift-codes' | 'bans'\",",
              "  \"export type AdminSectionId = 'overview' | 'players' | 'population' | 'gift-codes' | 'bans'\",",
          )
          replace(
              "for (const text of ['giftCodes.map(', 'redemptions.map(', 'collectibles', 'ownership']) forbidText('src/app/AdminApp.tsx', text);\nfor (const text of ['PageLayout', 'Panel', 'StatusTag', 'Button']) requireText('src/app/AdminApp.tsx', text);",
              "for (const text of ['giftCodes.map(', 'redemptions.map(']) forbidText('src/components/AdminGiftCodesSection.tsx', text);\nfor (const text of ['collectibles', 'ownership']) forbidText('src/app/AdminApp.tsx', text);\nfor (const text of ['PageLayout', 'Button']) requireText('src/app/AdminApp.tsx', text);\nfor (const text of ['Panel', 'StatusTag', 'Button']) requireText('src/components/AdminGiftCodesSection.tsx', text);",
          )

          path.write_text(content, encoding='utf-8')
          PY
          rm -f .github/workflows/fix-admin-five-sections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "同步管理员页面职责验证"
          git push origin "HEAD:${HEAD_REF}"

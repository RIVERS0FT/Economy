name: Verify merged deployment

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  verify-deployment:
    if: github.head_ref == 'codex/verify-deploy-455a705'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_SHA: 455a7057bb6e01005e311dc3c6f1263aba41b89d
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Wait for deployment workflow
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?event=push&head_sha=${TARGET_SHA}&per_page=5"
          for attempt in $(seq 1 90); do
            response="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api")"
            run_id="$(jq -r '.workflow_runs[0].id // empty' <<<"$response")"
            status="$(jq -r '.workflow_runs[0].status // empty' <<<"$response")"
            conclusion="$(jq -r '.workflow_runs[0].conclusion // empty' <<<"$response")"
            echo "attempt=${attempt} run_id=${run_id:-pending} status=${status:-pending} conclusion=${conclusion:-pending}"
            if [[ "$status" == "completed" ]]; then
              [[ "$conclusion" == "success" ]]
              echo "DEPLOY_RUN_ID=$run_id"
              exit 0
            fi
            sleep 10
          done
          echo "deployment workflow did not complete in time" >&2
          exit 1

      - name: Verify deployed production assets
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          curl --fail --silent --show-error --location \
            --retry 6 --retry-delay 5 \
            https://game.riversoft.top/economy/ \
            --output "$workdir/index.html"
          grep -oE 'href="[^"]+\.css"' "$workdir/index.html" \
            | cut -d'"' -f2 \
            | while read -r href; do
                case "$href" in
                  http*) url="$href" ;;
                  /*) url="https://game.riversoft.top${href}" ;;
                  *) url="https://game.riversoft.top/economy/${href}" ;;
                esac
                curl --fail --silent --show-error --location "$url"
              done > "$workdir/styles.css"
          grep -q 'facility-cluster-count' "$workdir/styles.css"
          grep -q 'facility-cluster-selector-card\[data-status' "$workdir/styles.css"
          if grep -q 'facility-current-selection-bar' "$workdir/styles.css"; then
            echo "obsolete current-factory bar CSS is still deployed" >&2
            exit 1
          fi
          echo "PRODUCTION_ASSETS_VERIFIED"

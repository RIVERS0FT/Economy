name: Commit factory card header layout migration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: commit-factory-card-header-layout
  cancel-in-progress: true

jobs:
  commit-migration:
    if: github.head_ref == 'agent/restructure-factory-card-header'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restructure-factory-card-header
          fetch-depth: 0

      - name: Detect pending migration
        id: guard
        shell: bash
        run: |
          if grep -q '名称和运行开关位于第一行' docs/INDUSTRY_AND_PRODUCTION_DESIGN.md; then
            echo "apply=false" >> "$GITHUB_OUTPUT"
          else
            echo "apply=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply embedded migration
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          awk "/python3 - <<'PY'/{capture=1; next} /^          PY$/{capture=0} capture" \
            .github/workflows/apply-factory-card-header-layout.yml \
            | sed 's/^          //' > /tmp/apply-factory-card-header.py
          python3 /tmp/apply-factory-card-header.py

      - name: Commit migration
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          git config user.name "RIVERSOFT automation"
          git config user.email "actions@users.noreply.github.com"
          git add docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            docs/UI_DESIGN_SYSTEM.md \
            src/styles/industry-system.css \
            scripts/verify-page-content.mjs \
            scripts/verify-facility-groups.mjs \
            scripts/verify-warehouse-expansion.mjs
          git diff --cached --check
          git commit -m "Document adaptive factory card header layout"
          git fetch origin agent/restructure-factory-card-header
          git rebase origin/agent/restructure-factory-card-header
          git push origin HEAD:agent/restructure-factory-card-header

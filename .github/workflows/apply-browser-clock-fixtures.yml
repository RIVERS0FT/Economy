name: Apply browser authoritative time fixtures

on:
  pull_request:
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-browser-authoritative-time-fixtures
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 190
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-audit-and-recent-trade-valuation
          fetch-depth: 0

      - name: Apply verified browser fixture patch
        shell: bash
        run: |
          set -euo pipefail
          echo '77b22b9fef5b12427c6af2b10955ea86f43106a8174cb0f94837adcd05830e01  .github/agent-browser-clock-fixtures.patch' | sha256sum --check
          git apply --check .github/agent-browser-clock-fixtures.patch
          git apply .github/agent-browser-clock-fixtures.patch
          rm .github/agent-browser-clock-fixtures.patch

      - name: Commit repaired browser fixtures
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '补齐浏览器模型权威时间字段'
          git push origin HEAD:agent/fix-audit-and-recent-trade-valuation

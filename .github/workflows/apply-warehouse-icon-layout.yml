name: Apply warehouse icon layout

on:
  push:
    branches:
      - codex/warehouse-icon-led-cards
    paths:
      - .github/workflows/apply-warehouse-icon-layout.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/warehouse-icon-led-cards
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply warehouse card redesign
        run: python3 scripts/apply-warehouse-icon-layout.py

      - name: Install dependencies
        run: npm ci

      - name: Verify and build
        run: npm run build

      - name: Remove one-time migration files
        run: |
          rm scripts/apply-warehouse-icon-layout.py
          rm .github/workflows/apply-warehouse-icon-layout.yml

      - name: Commit implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: emphasize warehouse product icons"
          git push origin HEAD:codex/warehouse-icon-led-cards

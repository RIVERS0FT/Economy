name: Apply warehouse icon layout

on:
  push:
    branches:
      - main
    paths:
      - .github/warehouse-icon-layout-trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply and publish implementation
        run: |
          set -euo pipefail
          git switch -C codex/warehouse-icon-led-final
          python3 scripts/apply-warehouse-icon-layout.py
          python3 scripts/apply-warehouse-page-verifier.py

          rm scripts/apply-warehouse-icon-layout.py
          rm scripts/apply-warehouse-page-verifier.py
          rm .github/warehouse-icon-layout-trigger
          rm .github/workflows/apply-warehouse-icon-layout.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: emphasize warehouse product icons"
          git push --force origin HEAD:codex/warehouse-icon-led-final

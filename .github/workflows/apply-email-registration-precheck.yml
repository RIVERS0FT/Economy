name: Apply email registration precheck patch

on:
  push:
    branches:
      - agent/check-email-before-verification
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: ${{ !contains(github.event.pull_request.head.sha || github.sha, '[patch-applied]') && !contains(github.event.head_commit.message || '', '[patch-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/check-email-before-verification
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Correct generated test template
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/apply-email-registration-precheck.mjs')
          source = path.read_text()
          source = source.replace(
              '`http://127.0.0.1:${server.address().port}`',
              '`http://127.0.0.1:\\${server.address().port}`',
          )
          path.write_text(source)
          PY
      - run: node .github/apply-email-registration-precheck.mjs
      - run: npm ci
      - run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md scripts/verify-email-registration.mjs server/src/account-client.js server/src/registration.js server/test/account-client.test.js server/test/registration.test.js
          git commit -m "Check email registration before sending code [patch-applied]"
          git push origin HEAD:agent/check-email-before-verification

name: Fix population section verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Move population UI verification to its section
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-staple-crops-demand.mjs')
          content = path.read_text(encoding='utf-8')
          old = "  ['src/components/AdminOverview.tsx', ['AdminPopulationControl']],"
          new = "  ['src/components/AdminPopulationSection.tsx', ['AdminPopulationControl']],"
          if old not in content:
              raise RuntimeError('population overview verification source missing')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/fix-population-section-verification.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "同步人口分区防回退验证"
          git push origin "HEAD:${HEAD_REF}"

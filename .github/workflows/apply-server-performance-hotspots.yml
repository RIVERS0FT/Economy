          正式服务的每个 60 秒请求指标窗口最多保留 256 个方法／归一化路由键，并预留统一溢出项 `OTHER /api/other`；超过上限的未知或高基数路由只能累计到该项，不得继续扩张内存 Map、排序集合或日志路由维度。窗口结束后必须同时清空路由聚合与溢出请求计数。

          """,
          )

          readme_path = Path('docs/README.md')
          readme = readme_path.read_text(encoding='utf-8')
          old_rule = next(line for line in readme.splitlines() if line.startswith('37. 状态刷新设置继续只保存和显示'))
          new_rule = old_rule.replace(
              '正式服务每 60 秒输出一次按方法与归一化路由聚合的请求指标，包含平均／最大处理时长和应用层 JSON 响应字节数；',
              '正式服务每 60 秒输出一次按方法与归一化路由聚合的请求指标，包含平均／最大处理时长和应用层 JSON 响应字节数；单个窗口最多保留 256 个方法／路由键，超出上限统一聚合为 `OTHER /api/other` 并记录溢出请求数；',
          ).replace(
              '`DatabaseSync` 的 5 秒超时是 SQLite 锁等待上限。',
              '`DatabaseSync` 的 5 秒超时是 SQLite 锁等待上限。同一 `GET state` 的合同分区必须复用当前修订缓存，只克隆玩家、合同与人口经济投影，不得再完整克隆世界；普通与合同动作只有世界结构实际变化时才能更新 `economy_world` 与修订号，失败或无变化动作仍保存幂等确认但不得触发全服补拉。',
          )
          if new_rule == old_rule:
              raise RuntimeError('docs/README.md rule 37 was not updated')
          readme_path.write_text(readme.replace(old_rule, new_rule, 1), encoding='utf-8')

          replace_once(
              'scripts/verify-runtime-efficiency.mjs',
              """requireText('server/src/request-metrics.js', [
            'createRequestMetricsCollector',
            'averageDurationMs',
            'averageResponseBytes',
            'Economy request outlier',
            'Economy request metrics',
            "response.getHeader('Content-Length')",

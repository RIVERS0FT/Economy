          replace_once(
              'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
              """空闲状态读取不得仅因服务器时间推进而修改 `lastProcessedAt`、`lastEconomicActivityAt`、增加修订号或写回相同的 `state_json`。只有成功经济写操作可以刷新玩家活跃时间，失败操作、轮询和后台生产不得刷新。管理员世界概况与玩家运营统计只返回只读诊断；活跃玩家数、库存价值、财富分位数和留存不得用于扩张人口需求预算。旧兼容字段 `lastPlayerScaleBudget` 与 `lastInventoryBoost` 必须保持停用和零值。只有处理生产、拍卖或合同时结构结果实际变化才允许保存并增加修订号。
          """,
              """空闲状态读取不得仅因服务器时间推进而修改 `lastProcessedAt`、`lastEconomicActivityAt`、增加修订号或写回相同的 `state_json`。只有成功经济写操作可以刷新玩家活跃时间，失败操作、轮询和后台生产不得刷新。管理员世界概况与玩家运营统计只返回只读诊断；活跃玩家数、库存价值、财富分位数和留存不得用于扩张人口需求预算。旧兼容字段 `lastPlayerScaleBudget` 与 `lastInventoryBoost` 必须保持停用和零值。只有处理生产、拍卖或合同时结构结果实际变化才允许保存并增加修订号。普通动作与合同动作即使业务返回失败仍必须保存幂等确认，但只有缓存世界结构实际变化时才能更新 `economy_world` 与递增修订号；失败或无变化动作不得制造全服状态补拉。
          """,

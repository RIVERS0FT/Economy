            const routes = new Map();
          """,
              """  slowRequestMs = DEFAULT_SLOW_REQUEST_MS,
            largeResponseBytes = DEFAULT_LARGE_RESPONSE_BYTES,
            maxRouteKeys = DEFAULT_MAX_ROUTE_KEYS,

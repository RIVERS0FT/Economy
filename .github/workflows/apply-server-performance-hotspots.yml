name: Apply server performance hotspots

on:
  push:
    branches:
      - agent/server-performance-hotspots

permissions:
  contents: write

concurrency:
  group: apply-server-performance-hotspots
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/server-performance-hotspots
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0

      - name: Apply focused performance fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path_name: str, old: str, new: str) -> None:
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path_name}: expected one replacement target, found {count}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          def append_once(path_name: str, marker: str, addition: str) -> None:
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              if marker in text:
                  raise RuntimeError(f'{path_name}: test marker already exists')
              path.write_text(text.rstrip() + '\n\n' + addition.strip() + '\n', encoding='utf-8')

          replace_once(
              'server/src/runtime-store.js',
              """function createActionAcknowledgement(result, revision) {
            return normalizeJson({
              result: {
                ok: result?.ok === true,
                message: String(result?.message || ''),
              },
              revision: Number(revision),
            });
          }
          """,
              """function createActionAcknowledgement(result, revision) {
            return normalizeJson({
              result: {
                ok: result?.ok === true,
                message: String(result?.message || ''),
              },
              revision: Number(revision),
            });
          }

          function contractProjectionForState(world) {
            const projection = {
              ...world,
              players: structuredClone(world.players || {}),
              productionContracts: structuredClone(world.productionContracts || []),
            };
            if (world.populationEconomy !== undefined) {
              projection.populationEconomy = structuredClone(world.populationEconomy);
            }
            return projection;
          }
          """,
          )

          replace_once(
              'server/src/runtime-store.js',
              """  prepareWorldForStorage(world, now) {
              const prepared = super.prepareWorldForStorage(world, now);
              migrateProductionContractWorld(prepared);
              prepared.version = 15;
              return prepared;
            }

            processWorldIfDue(world, now, currentUserId, options = {}) {
          """,
              """  prepareWorldForStorage(world, now) {
              const prepared = super.prepareWorldForStorage(world, now);
              migrateProductionContractWorld(prepared);
              prepared.version = 15;
              return prepared;
            }

            saveWorld(revision, world, now) {
              return this.saveWorldIfChanged(revision, world, now);
            }

            processWorldIfDue(world, now, currentUserId, options = {}) {
          """,
          )

          replace_once(
              'server/src/runtime-store.js',
              """  getStateSnapshot(user, knownRevision, now = Date.now()) {
              const snapshot = super.getStateSnapshot(user, knownRevision, now);
              if (snapshot.unchanged || !snapshot.state) return snapshot;

              return this.transaction(() => {
                const { world } = this.loadWorld(now);
                return {
                  ...snapshot,
                  state: normalizeJson({
                    ...snapshot.state,
                    ...createProductionContractClientState(world, Number(user.id), now),
                  }),
                };
              }, { immediate: false });
            }
          """,
              """  getStateSnapshot(user, knownRevision, now = Date.now()) {
              const snapshot = super.getStateSnapshot(user, knownRevision, now);
              if (snapshot.unchanged || !snapshot.state) return snapshot;

              const cached = this.worldCache;
              const contractState = cached && cached.revision === snapshot.revision
                ? createProductionContractClientState(
                  contractProjectionForState(cached.world),
                  Number(user.id),
                  now,
                )
                : this.transaction(() => {
                  const { world } = this.loadWorld(now);
                  return createProductionContractClientState(world, Number(user.id), now);
                }, { immediate: false });

              return {
                ...snapshot,
                state: {
                  ...snapshot.state,
                  ...normalizeJson(contractState),
                },
              };
            }
          """,
          )

          replace_once(
              'server/src/request-metrics.js',
              """const DEFAULT_LARGE_RESPONSE_BYTES = 200 * 1024;
          const DYNAMIC_ROUTE_PATTERNS = [
          """,
              """const DEFAULT_LARGE_RESPONSE_BYTES = 200 * 1024;
          const DEFAULT_MAX_ROUTE_KEYS = 256;
          const OVERFLOW_METHOD = 'OTHER';
          const OVERFLOW_ROUTE = '/api/other';
          const DYNAMIC_ROUTE_PATTERNS = [
          """,
          )


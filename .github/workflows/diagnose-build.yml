name: Diagnose Economy Build

on:
  push:
    branches:
      - codex/diagnose-post-merge-build

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make page-content assertions formatting independent
        shell: bash
        run: |
          python3 - <<'PYTHON'
          from pathlib import Path

          path = Path('scripts/verify-page-content.mjs')
          content = path.read_text(encoding='utf-8')
          replacements = {
              "  '>运行 {formatNumber(model.derived.runningFacilities)}',": "  '运行 {formatNumber(model.derived.runningFacilities)}',",
              "  '>停止 {formatNumber(model.derived.stoppedFacilities)}',": "  '停止 {formatNumber(model.derived.stoppedFacilities)}',",
              "  '>异常 {formatNumber(model.derived.blockedFacilities)}',": "  '异常 {formatNumber(model.derived.blockedFacilities)}',",
          }
          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f'missing expected assertion: {old}')
              content = content.replace(old, new, 1)
          path.write_text(content, encoding='utf-8')
          PYTHON

      - name: Run build and capture diagnostics
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          npm run build > /tmp/economy-build.log 2>&1
          status=$?
          tail -n 300 /tmp/economy-build.log > diagnostics/latest-build.log
          printf '%s\n' "$status" > diagnostics/build-exit-code.txt
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain scripts/verify-page-content.mjs diagnostics)" ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/verify-page-content.mjs diagnostics
          git commit -m "fix: make production status checks formatting independent [skip ci]"
          git push

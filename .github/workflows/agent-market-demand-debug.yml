name: Diagnose market demand V3 patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/accumulate-market-demand-orders
          fetch-depth: 0
      - name: Capture embedded patch failure
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import traceback
          workflow = Path('.github/workflows/agent-market-demand-v3.yml').read_text()
          marker = "          python3 <<'PY'\n"
          end_marker = "\n          PY\n"
          script = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in script.splitlines()]
          try:
              exec('\n'.join(lines), {'__name__': '__main__'})
              report = 'patch completed without error\n'
          except BaseException:
              report = traceback.format_exc()
          Path('/tmp/patch-error.txt').write_text(report)
          PY
          git reset --hard HEAD
          cp /tmp/patch-error.txt patch-error.txt
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add patch-error.txt
          git commit -m "Record market demand patch error"
          git push origin HEAD:agent/accumulate-market-demand-orders

name: Economy Contract Type Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/production-contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - run: npm ci

      - name: Add contract icon and request body compatibility
        run: |
          python - <<'PY'
          from pathlib import Path

          icons = Path('src/components/icons/GameIcons.tsx')
          text = icons.read_text(encoding='utf-8')
          old_union = "export type NavigationIconName = 'home' | 'market' | 'production' | 'assets' | 'collections' | 'auction' | 'leaderboard' | 'gem-shop' | 'settings';"
          new_union = "export type NavigationIconName = 'home' | 'market' | 'production' | 'assets' | 'collections' | 'auction' | 'contracts' | 'leaderboard' | 'gem-shop' | 'settings';"
          if old_union not in text:
              raise SystemExit('missing navigation icon union anchor')
          text = text.replace(old_union, new_union, 1)

          auction_icon = "export function AuctionIcon(props: GameIconProps) {\n  return <GameIcon {...props}><path d=\"m13.5 5.5 5 5M11.5 7.5l5 5M8 11l7-7M13 16l7-7\" /><path d=\"m10.2 9.8 4 4M3 20h11M5 16h7v4H5z\" /></GameIcon>;\n}\n"
          contract_icon = auction_icon + "\nexport function ContractIcon(props: GameIconProps) {\n  return <GameIcon {...props}><path d=\"M6 3h9l3 3v15H6V3Z\" /><path d=\"M15 3v4h4M9 11h6M9 15h6M9 19h4\" /></GameIcon>;\n}\n"
          if auction_icon not in text:
              raise SystemExit('missing auction icon anchor')
          text = text.replace(auction_icon, contract_icon, 1)

          switch_old = "    case 'auction': return <AuctionIcon {...props} />;\n    case 'leaderboard': return <LeaderboardIcon {...props} />;"
          switch_new = "    case 'auction': return <AuctionIcon {...props} />;\n    case 'contracts': return <ContractIcon {...props} />;\n    case 'leaderboard': return <LeaderboardIcon {...props} />;"
          if switch_old not in text:
              raise SystemExit('missing navigation icon switch anchor')
          text = text.replace(switch_old, switch_new, 1)
          icons.write_text(text, encoding='utf-8')

          api = Path('src/contracts/api.ts')
          text = api.read_text(encoding='utf-8')
          old_post = 'async function post(path: string, body: Record<string, unknown> = {}): Promise<GameActionResponse> {'
          new_post = 'async function post(path: string, body: unknown = {}): Promise<GameActionResponse> {'
          if old_post not in text:
              raise SystemExit('missing contract post signature anchor')
          api.write_text(text.replace(old_post, new_post, 1), encoding='utf-8')
          PY

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Commit type corrections
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add src/components/icons/GameIcons.tsx src/contracts/api.ts
          git commit -m "fix contract navigation and API types"
          git push origin HEAD:agent/production-contracts

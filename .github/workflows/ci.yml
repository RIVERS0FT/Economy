name: Economy CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1
          show-progress: false

      - name: Patch anonymous order tests
        run: node scripts/patch-anonymous-order-tests.mjs

name: Economy CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package repository source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git --exclude=node_modules -czf economy-source.tar.gz .

      - name: Upload repository source
        uses: actions/upload-artifact@v4
        with:
          name: economy-source
          path: economy-source.tar.gz
          if-no-files-found: error

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee browser-test.log

      - name: Upload browser test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-test-artifacts
          path: |
            browser-test.log
            playwright-report
            test-results
          if-no-files-found: warn

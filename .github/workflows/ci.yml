name: Economy CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify document authority
        run: node scripts/verify-document-authority.mjs

      - name: Verify state delivery
        run: node scripts/verify-state-delivery-capacity.mjs

      - name: Verify authentication cache
        run: node scripts/verify-authentication-cache.mjs

      - name: Verify email registration
        run: node scripts/verify-email-registration.mjs

      - name: Verify page content
        run: node scripts/verify-page-content.mjs

      - name: Verify remaining architecture
        run: >-
          node --experimental-strip-types scripts/verify-display-format.mjs &&
          node scripts/verify-ui-architecture-runner.mjs &&
          node scripts/verify-currency-svg.mjs &&
          node scripts/verify-mobile-touch-feedback.mjs &&
          node scripts/verify-virtual-list-scroll-chaining.mjs &&
          node scripts/verify-overview-content.mjs &&
          node scripts/verify-industry-catalog.mjs &&
          node scripts/verify-unified-factory-recipes-grid.mjs &&
          node scripts/verify-staple-crops-demand.mjs &&
          node scripts/verify-market-assets.mjs &&
          node --experimental-strip-types scripts/verify-market-chart.mjs &&
          node scripts/verify-liquid-glass-chrome.mjs &&
          node scripts/verify-warehouse-expansion.mjs &&
          node scripts/verify-facility-groups.mjs &&
          node scripts/verify-collectibles-auctions.mjs &&
          node scripts/verify-gift-code-batches.mjs

      - name: Test Nginx configuration
        run: npm run test:nginx-config

      - name: Check server syntax
        run: npm run server:check

      - name: Test server
        run: npm run server:test

      - name: TypeScript build
        run: npx tsc

      - name: Vite production build
        run: npx vite build

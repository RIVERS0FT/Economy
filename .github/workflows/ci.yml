name: Economy CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: economy-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply production desktop layout
        if: github.head_ref == 'codex/production-desktop-layout'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-production-desktop-layout.py
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f \
            .github/workflows/apply-production-desktop-layout.yml \
            .github/apply-production-desktop-layout.trigger \
            scripts/apply-production-desktop-layout.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "优化桌面生产页布局"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-test.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee browser-test.log

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: economy-test-artifacts
          path: |
            build-test.log
            browser-test.log
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3

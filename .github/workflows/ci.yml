name: Apply bundled auction implementation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: codex/bundled-auctions-frozen-assets
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply final implementation patch
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.final-auction/part-* | base64 --decode | gzip -dc > /tmp/final.patch
          git apply --check /tmp/final.patch
          git apply /tmp/final.patch

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        run: npm run test:browser

      - name: Commit final implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            docs/GIFT_CODE_AND_ADMIN_DESIGN.md \
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            docs/PRODUCT_AND_GAMEPLAY_DESIGN.md \
            docs/README.md \
            docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md \
            docs/UI_DESIGN_SYSTEM.md \
            docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md \
            docs/WAREHOUSE_EXPANSION_DESIGN.md \
            scripts/verify-collectibles-auctions.mjs \
            server/src/collectibles.js \
            server/src/facility-groups.js \
            server/src/warehouse.js \
            server/test/collectibles-auctions.test.js \
            src/api/game.ts \
            src/collectibles/types.ts \
            src/pages/AssetsPage.tsx \
            src/pages/AuctionPage.tsx \
            src/styles/collectibles-auctions.css \
            src/types.ts
          git commit -m "feat: 支持捆绑拍卖与冻结资产明细"
          git push origin HEAD:codex/bundled-auctions-frozen-assets

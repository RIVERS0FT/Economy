name: Squash Global Interaction Modality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: squash-global-interaction-modality
  cancel-in-progress: true

jobs:
  squash:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout modification branch
        uses: actions/checkout@v4
        with:
          ref: agent/global-interaction-modality
          fetch-depth: 0

      - name: Reapply formal diff onto latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          files=(
            README.md
            docs/FACILITY_CATALOG_PRESENTATION_DESIGN.md
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md
            docs/README.md
            docs/UI_DESIGN_SYSTEM.md
            package.json
            scripts/interaction-hover-legacy.json
            scripts/verify-interaction-modality.mjs
            scripts/verify-unified-factory-recipes-grid.mjs
            src/app/interactionBootstrap.ts
            src/main.tsx
            src/pages/ProductionPage.tsx
            src/styles/design-system.css
            src/styles/facility-group-card-grid.css
            src/styles/interaction-states.css
            tests/browser/assets-runtime-harness.tsx
            tests/browser/facility-detail-sheet.spec.ts
            tests/browser/input-modality.spec.ts
            tests/browser/market-runtime-harness.tsx
            tests/browser/runtime-harness.tsx
          )
          merge_base="$(git merge-base origin/main HEAD)"
          git diff --binary "$merge_base" HEAD -- "${files[@]}" > /tmp/global-interaction-modality.patch
          test -s /tmp/global-interaction-modality.patch
          git reset --hard origin/main
          git apply --3way --index /tmp/global-interaction-modality.patch
          git diff --cached --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify focused architecture
        run: |
          node scripts/verify-interaction-modality.mjs
          node scripts/verify-mobile-touch-feedback.mjs
          node scripts/verify-unified-factory-recipes-grid.mjs
          npm run typecheck

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify interaction browsers
        run: npx playwright test tests/browser/facility-detail-sheet.spec.ts tests/browser/input-modality.spec.ts --project=chromium

      - name: Force-push clean commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m '统一全局输入方式交互协议'
          git push --force origin HEAD:agent/global-interaction-modality

name: Economy CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: economy-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: agent/admin-population-control
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply authoritative policy clock fix
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('server/src/population-economy.js')
          text = path.read_text()
          import_old = "  defaultPopulationPolicy,\n  ensurePopulationPolicyState,"
          import_new = "  defaultPopulationPolicy,\n  ensurePopulationPolicyState,\n  POPULATION_POLICY_CYCLE_MS,"
          signature_old = 'export function ensurePopulationEconomy(world, now = Date.now()) {'
          marker_old = '  ensurePopulationPolicyState(state, now);'
          marker_new = '  const policyNow = now === undefined || now === null\n    ? Math.max(0, Number(state.policyCycle?.cycleId || 0)) * POPULATION_POLICY_CYCLE_MS\n    : Number(now);\n  ensurePopulationPolicyState(state, policyNow);'
          for marker in (import_old, signature_old, marker_old):
              if marker not in text:
                  raise SystemExit(f'population clock marker missing: {marker}')
          text = text.replace(import_old, import_new, 1)
          text = text.replace(signature_old, 'export function ensurePopulationEconomy(world, now = undefined) {', 1)
          text = text.replace(marker_old, marker_new, 1)
          path.write_text(text)

          policy_path = Path('server/src/population-policy.js')
          policy_text = policy_path.read_text()
          old_policy = '  const policy = normalizePopulationPolicy(policyValue);'
          if old_policy not in policy_text:
              raise SystemExit('population budget normalization marker missing')
          policy_path.write_text(policy_text.replace(old_policy, '  const policy = normalizePopulationPolicy(policyValue, 0);', 1))
          PY
          rm -f population-build-error.log .github/workflows/fix-population-policy-clock.yml
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "keep population policy cycle on authoritative clock"
          git push origin HEAD:agent/admin-population-control

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-test.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee browser-test.log

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: economy-test-artifacts
          path: |
            build-test.log
            browser-test.log
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3

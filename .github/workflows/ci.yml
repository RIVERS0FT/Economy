name: Economy Ten Page Browser Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/production-contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - run: npm ci

      - name: Update desktop navigation count
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/browser/game-shell-layout.spec.ts')
          text = path.read_text(encoding='utf-8')
          old = '    await expect(buttons).toHaveCount(9);'
          new = '    await expect(buttons).toHaveCount(10);'
          if text.count(old) != 1:
              raise SystemExit(f'unexpected desktop navigation count anchors: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Run affected browser test
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/browser/game-shell-layout.spec.ts --project=chromium --grep "desktop navigation rows keep intrinsic height"

      - name: Commit browser correction
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add tests/browser/game-shell-layout.spec.ts
          git commit -m "update browser navigation count for contracts"
          git push origin HEAD:agent/production-contracts

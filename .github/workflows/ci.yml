name: Economy CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: economy-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Add stabilization observability
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path_name, old, new):
              path = Path(path_name)
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'{path_name} missing replacement anchor: {old[:80]}')
              path.write_text(text.replace(old, new))

          replace(
              'src/api/admin.ts',
              '  householdBudget: number;\n  totalIncome: number;\n',
              '  householdBudget: number;\n  stabilizationBudget: number;\n  lastStabilizationIssued: number;\n  totalIncome: number;\n',
          )
          replace(
              'src/api/admin.ts',
              '  issuance: { work: number; exchange: number; gift: number; legacyPopulation: number; migration: number; total: number };\n',
              '  issuance: { work: number; exchange: number; gift: number; legacyPopulation: number; migration: number; stabilization: number; total: number };\n',
          )
          replace(
              'src/app/AdminApp.tsx',
              '                          <MetricCard label="累计货币发行" value={<CurrencyAmount>{formatCurrency(summary.populationEconomy.issuance.total)}</CurrencyAmount>} />\n',
              '                          <MetricCard label="累计货币发行" value={<CurrencyAmount>{formatCurrency(summary.populationEconomy.issuance.total)}</CurrencyAmount>} />\n                          <MetricCard label="累计稳定需求补充" value={<CurrencyAmount>{formatCurrency(summary.populationEconomy.issuance.stabilization)}</CurrencyAmount>} />\n',
          )
          replace(
              'src/app/AdminApp.tsx',
              '                                <div><dt>当前预算</dt><dd><CurrencyAmount>{formatCurrency(model.lastBudget)}</CurrencyAmount></dd></div>\n',
              '                                <div><dt>当前预算</dt><dd><CurrencyAmount>{formatCurrency(model.lastBudget)}</CurrencyAmount></dd></div>\n                                <div><dt>稳定预算／本次补充</dt><dd><CurrencyAmount>{formatCurrency(model.stabilizationBudget)}</CurrencyAmount>／<CurrencyAmount>{formatCurrency(model.lastStabilizationIssued)}</CurrencyAmount></dd></div>\n',
          )
          for old, new in [
              ('householdBudget: 132, totalIncome:', 'householdBudget: 132, stabilizationBudget: 410, lastStabilizationIssued: 120, totalIncome:'),
              ('householdBudget: 81, totalIncome:', 'householdBudget: 81, stabilizationBudget: 205, lastStabilizationIssued: 60, totalIncome:'),
              ('householdBudget: 15, totalIncome:', 'householdBudget: 15, stabilizationBudget: 69, lastStabilizationIssued: 20, totalIncome:'),
          ]:
              replace('tests/browser/admin-runtime.spec.ts', old, new)
          replace(
              'tests/browser/admin-runtime.spec.ts',
              '          issuance: { work: 20_000, exchange: 5_000, gift: 1_000, legacyPopulation: 0, migration: 5_700, total: 31_700 },\n',
              '          issuance: { work: 20_000, exchange: 5_000, gift: 1_000, legacyPopulation: 0, migration: 5_700, stabilization: 684, total: 32_384 },\n',
          )
          replace(
              'tests/browser/admin-runtime.spec.ts',
              "  await expect(page.locator('.admin-population-model-card')).toHaveCount(3);\n",
              "  await expect(page.locator('.admin-population-model-card')).toHaveCount(3);\n  await expect(page.getByText('累计稳定需求补充', { exact: true })).toBeVisible();\n  await expect(page.getByText('稳定预算／本次补充', { exact: true })).toHaveCount(3);\n",
          )
          replace(
              'docs/PRODUCT_AND_GAMEPLAY_DESIGN.md',
              '系统不设置人口侧货币回收、人口税、公共服务扣款、余额衰减、储蓄过期或货币总量上限。模型 8 的稳定需求补充不是价格指数目标或无限兜底：总基准为两组基础预算之和的 12%，按 60%／30%／10% 分给三类人口，目标钱包为三周期稳定预算，每周期最多补一个周期且冻结资金计入钱包覆盖；余额达到目标时不得发行。历史 `populationIssued` 和 `systemSinks` 只保留旧世界审计。\n',
              '系统不设置人口侧货币回收、人口税、公共服务扣款、余额衰减、储蓄过期或货币总量上限。模型 8 的稳定需求补充不是价格指数目标或无限兜底：总基准为两组基础预算之和的 12%，按 60%／30%／10% 分给三类人口，目标钱包为三周期稳定预算，每周期最多补一个周期且冻结资金计入钱包覆盖；余额达到目标时不得发行。历史 `populationIssued` 和 `systemSinks` 只保留旧世界审计。管理员人口经济总览必须单独展示累计稳定需求补充，并在每类人口卡片展示稳定预算与本次补充。\n',
          )
          replace(
              'scripts/verify-staple-crops-demand.mjs',
              "  ['docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md', ['population-economy.js', '市场需求模型 8', '人口消费不得发行普通货币']],\n",
              "  ['docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md', ['population-economy.js', '市场需求模型 8', '人口消费不得发行普通货币']],\n  ['src/api/admin.ts', ['stabilizationBudget', 'lastStabilizationIssued', 'stabilization: number']],\n  ['src/app/AdminApp.tsx', ['累计稳定需求补充', '稳定预算／本次补充']],\n  ['tests/browser/admin-runtime.spec.ts', ['stabilization: 684', '累计稳定需求补充', '稳定预算／本次补充']],\n",
          )
          PY
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        run: npm run test:browser

      - name: Commit verified observability
        run: |
          rm -rf test-results playwright-report build-test.log browser-test.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "展示稳定需求补充状态"
          git push origin HEAD:agent/deflation-stabilizer-model-8

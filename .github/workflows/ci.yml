name: Economy CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: economy-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Merge leaderboard rules into canonical docs
        if: github.event_name == 'pull_request' && hashFiles('.github/automation/finalize-leaderboard-docs.mjs') != ''
        run: |
          node .github/automation/finalize-leaderboard-docs.mjs
          rm docs/LEADERBOARD_DESIGN.md

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-test.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee browser-test.log

      - name: Validate patch formatting
        run: git diff --check

      - name: Commit canonical document merge
        if: github.event_name == 'pull_request' && hashFiles('.github/automation/finalize-leaderboard-docs.mjs') != ''
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git show "${BASE_SHA}:.github/workflows/ci.yml" > .github/workflows/ci.yml
          rm .github/automation/finalize-leaderboard-docs.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/PRODUCT_AND_GAMEPLAY_DESIGN.md docs/LEADERBOARD_DESIGN.md scripts/verify-leaderboards.mjs .github
          git commit -m "合并交易榜规则到权威设计文档"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: economy-test-artifacts
          path: |
            build-test.log
            browser-test.log
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3

name: Squash Global Interaction Modality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: squash-global-interaction-modality
  cancel-in-progress: true

jobs:
  squash:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout modification branch
        uses: actions/checkout@v4
        with:
          ref: agent/global-interaction-modality
          fetch-depth: 0

      - name: Reapply formal diff onto latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          files=(
            README.md
            docs/FACILITY_CATALOG_PRESENTATION_DESIGN.md
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md
            docs/README.md
            scripts/interaction-hover-legacy.json
            scripts/verify-interaction-modality.mjs
            scripts/verify-unified-factory-recipes-grid.mjs
            src/app/interactionBootstrap.ts
            src/main.tsx
            src/pages/ProductionPage.tsx
            src/styles/design-system.css
            src/styles/facility-group-card-grid.css
            src/styles/interaction-states.css
            tests/browser/assets-runtime-harness.tsx
            tests/browser/facility-detail-sheet.spec.ts
            tests/browser/input-modality.spec.ts
            tests/browser/market-runtime-harness.tsx
            tests/browser/runtime-harness.tsx
          )
          merge_base="$(git merge-base origin/main HEAD)"
          git diff --binary "$merge_base" HEAD -- "${files[@]}" > /tmp/global-interaction-modality.patch
          test -s /tmp/global-interaction-modality.patch
          git reset --hard origin/main
          git apply --3way --index /tmp/global-interaction-modality.patch

          python3 - <<'PYTHON'
          from pathlib import Path
          import json

          ui_path = Path('docs/UI_DESIGN_SYSTEM.md')
          ui = ui_path.read_text()
          style_row = '| `src/styles/design-system.css` | 设计令牌、页面一级内容栈、按钮、面板、状态、表格、开关和通用焦点视觉 |\n'
          interaction_row = '| `src/styles/interaction-states.css` | 最近输入方式驱动的共享 hover、active、程序化焦点与键盘焦点视觉 |\n'
          if interaction_row not in ui:
              if style_row not in ui:
                  raise RuntimeError('最新 UI 设计缺少 design-system 样式职责行')
              ui = ui.replace(style_row, style_row + interaction_row, 1)

          old_order = '业务页面样式先加载，`design-system.css` 在页面样式之后收束页面一级区块间距和共享基础视觉，`primary-surfaces.css` 随后收束玩家端一级卡片外层几何，`form-controls.css` 最后加载并只负责表单控件。页面样式不得重新实现页面一级区块间距、按钮、输入、面板、一级卡片外层内边距、状态标签、开关、表格、图标或焦点的基础外观。'
          new_order = '业务页面样式先加载，`design-system.css` 在页面样式之后收束页面一级区块间距和共享基础视觉，`interaction-states.css` 随后根据最近输入方式收束共享交互状态，`primary-surfaces.css` 再收束玩家端一级卡片外层几何，`form-controls.css` 最后加载并只负责表单控件。页面样式不得重新实现页面一级区块间距、按钮、输入、面板、一级卡片外层内边距、状态标签、开关、表格、图标、hover、active 或焦点的基础外观。'
          if old_order not in ui:
              raise RuntimeError('最新 UI 设计缺少样式加载顺序基线')
          ui = ui.replace(old_order, new_order, 1)

          interaction_section = (
              '### 3.2 输入方式与共享交互状态\n\n'
              '输入方式是跨页面 UI 能力，不属于滚动条私有实现。所有 React 根入口必须导入 `src/app/interactionBootstrap.ts`，由其唯一安装 `src/utils/inputModality.ts`；最近一次有效鼠标／触控板、手指／笔或键盘输入分别把根元素 `data-input-modality` 更新为 `mouse`、`touch` 或 `keyboard`，混合输入设备必须在不刷新页面的情况下即时切换。\n\n'
              '| 能力 | 运行时权威 | 样式／组件入口 | 防回退 | 浏览器测试 |\n'
              '|---|---|---|---|---|\n'
              '| 输入方式 | `src/utils/inputModality.ts` + `src/app/interactionBootstrap.ts` | 根元素 `data-input-modality` | `scripts/verify-interaction-modality.mjs` | `tests/browser/input-modality.spec.ts` |\n'
              '| 共享交互表面 | 根输入方式 | `src/styles/interaction-states.css` + `data-ui-interactive="surface"` | `scripts/verify-interaction-modality.mjs` | 工厂详情与混合输入测试 |\n'
              '| 覆盖式滚动条 | `src/hooks/useOverlayScrollbar.ts` | `ScrollArea` + `src/styles/scrollbars.css` | `scripts/verify-overlay-scrollbars.mjs` | `scroll-input-modality.spec.ts` |\n\n'
              '共享交互规则：\n\n'
              '- 需要自定义悬停／按压／焦点视觉的卡片按钮必须声明 `data-ui-interactive="surface"`，业务 CSS 只提供 `--ui-interactive-*` 变量，不得再次直接声明同一元素的裸 `:hover`、`:active` 或 `:focus-visible`。\n'
              '- hover 必须同时满足最近输入方式为 `mouse`、`(hover: hover)` 和 `(pointer: fine)`；触摸产生的浏览器粘滞 `:hover` 不得改变可见样式。\n'
              '- 触摸关闭 Overlay 后可以把语义焦点返回触发元素，但共享交互表面不得显示类似选中态的焦点环；输入方式为 `keyboard` 时必须显示明确的 `:focus-visible` 焦点。\n'
              '- `scripts/interaction-hover-legacy.json` 只记录迁移前已经存在的未约束 hover。`scripts/verify-interaction-modality.mjs` 禁止增加新条目；修改既有交互区域时应迁移到共享协议，而不是扩大遗留基线。\n'
              '- 新增 React 根入口时必须自动纳入静态扫描并安装交互 bootstrap；不得依赖修改者记住手动调用 `configureInputModality()`。\n\n'
          )
          if '### 3.2 输入方式与共享交互状态' not in ui:
              marker = '## 4. 开关焦点环与点击区域\n'
              if marker not in ui:
                  raise RuntimeError('最新 UI 设计缺少第 4 节标记')
              ui = ui.replace(marker, interaction_section + marker, 1)
          ui_path.write_text(ui)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['scripts']['verify:interaction-modality'] = 'node scripts/verify-interaction-modality.mjs'
          architecture = package['scripts']['verify:architecture']
          command = 'node scripts/verify-interaction-modality.mjs'
          if command not in architecture:
              marker = 'node scripts/verify-mobile-touch-feedback.mjs && '
              if marker not in architecture:
                  raise RuntimeError('最新架构命令缺少移动触摸验证入口')
              architecture = architecture.replace(marker, marker + command + ' && ', 1)
          package['scripts']['verify:architecture'] = architecture
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n')
          PYTHON

          git add docs/UI_DESIGN_SYSTEM.md package.json
          git diff --cached --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify focused architecture
        run: |
          node scripts/verify-interaction-modality.mjs
          node scripts/verify-mobile-touch-feedback.mjs
          node scripts/verify-unified-factory-recipes-grid.mjs
          npm run typecheck

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify interaction browsers
        run: npx playwright test tests/browser/facility-detail-sheet.spec.ts tests/browser/input-modality.spec.ts --project=chromium

      - name: Force-push clean commit
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m '统一全局输入方式交互协议'
          git push --force origin HEAD:agent/global-interaction-modality

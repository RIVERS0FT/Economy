name: Economy CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply local trade anonymization bundle
        run: |
          set +e
          node scripts/fix-anonymize-script.mjs
          node scripts/apply-anonymize-local-trades.mjs 2> /tmp/anonymize-error.log
          status=$?
          if [ $status -ne 0 ]; then
            cp /tmp/anonymize-error.log scripts/anonymize-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/anonymize-error.log
            git commit -m "记录成交匿名化组装错误"
            git push origin HEAD:agent/anonymize-local-trades
            exit $status
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify document authority
        run: node scripts/verify-document-authority.mjs

      - name: Verify state delivery
        run: node scripts/verify-state-delivery-capacity.mjs

      - name: Verify authentication cache
        run: node scripts/verify-authentication-cache.mjs

      - name: Verify email registration
        run: node scripts/verify-email-registration.mjs

      - name: Verify page content
        run: node scripts/verify-page-content.mjs

      - name: Verify display format
        run: node --experimental-strip-types scripts/verify-display-format.mjs

      - name: Verify UI architecture
        run: node scripts/verify-ui-architecture-runner.mjs

      - name: Verify currency SVG
        run: node scripts/verify-currency-svg.mjs

      - name: Verify mobile touch feedback
        run: node scripts/verify-mobile-touch-feedback.mjs

      - name: Verify virtual list scroll chaining
        run: node scripts/verify-virtual-list-scroll-chaining.mjs

      - name: Verify overview content
        run: node scripts/verify-overview-content.mjs

      - name: Verify industry catalog
        run: node scripts/verify-industry-catalog.mjs

      - name: Verify factory recipes
        run: node scripts/verify-unified-factory-recipes-grid.mjs

      - name: Verify staple demand
        run: node scripts/verify-staple-crops-demand.mjs

      - name: Verify market assets
        run: node scripts/verify-market-assets.mjs

      - name: Verify market chart
        run: node --experimental-strip-types scripts/verify-market-chart.mjs

      - name: Verify liquid glass chrome
        run: node scripts/verify-liquid-glass-chrome.mjs

      - name: Verify warehouse expansion
        run: node scripts/verify-warehouse-expansion.mjs

      - name: Verify facility groups
        run: node scripts/verify-facility-groups.mjs

      - name: Verify collectibles and auctions
        run: node scripts/verify-collectibles-auctions.mjs

      - name: Verify gift code batches
        run: node scripts/verify-gift-code-batches.mjs

      - name: Test Nginx configuration
        run: npm run test:nginx-config

      - name: Check server syntax
        run: npm run server:check

      - name: Test server
        run: npm run server:test

      - name: TypeScript build
        run: npx tsc

      - name: Vite production build
        run: npx vite build

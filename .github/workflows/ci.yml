name: Current main dependency snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Prepare portable validation environment
        run: |
          mkdir -p validation-runtime/bin
          cp "$(command -v node)" validation-runtime/bin/node

      - name: Upload dependencies and Node runtime
        uses: actions/upload-artifact@v4
        with:
          name: economy-validation-environment
          path: |
            node_modules/
            validation-runtime/
          include-hidden-files: true
          retention-days: 1

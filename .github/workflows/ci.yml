name: Economy Deployment Documentation Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/production-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout contract branch
        uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
          fetch-depth: 0

      - name: Restore systemd service constant
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md')
          text = path.read_text(encoding='utf-8')
          marker = '- systemd 首选可执行文件：`/var/www/game/economy-api/runtime/bin/node`。'
          addition = marker + '\n- systemd 服务单元固定为 `riversoft-economy-api.service`。'
          if 'riversoft-economy-api.service' not in text:
              if marker not in text:
                  raise SystemExit('missing systemd executable anchor')
              text = text.replace(marker, addition, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit documentation fix
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md
          git commit -m "restore deployment service constant"
          git push origin HEAD:agent/production-contracts

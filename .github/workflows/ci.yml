name: Economy CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify architecture
        run: npm run verify:architecture

      - name: Test Nginx configuration
        run: npm run test:nginx-config

      - name: Check server syntax
        run: npm run server:check

      - name: Test server
        run: npm run server:test

      - name: TypeScript build
        run: npx tsc

      - name: Vite production build
        run: npx vite build

name: Economy CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: economy-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Move migration rules into market section
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/PRODUCT_AND_GAMEPLAY_DESIGN.md')
          text = path.read_text()
          block = '''### 从模型 7 升级到模型 8

          1. 删除全部旧系统商品订单并原额释放人口与储备冻结资金、冻结库存，保留全部玩家订单和玩家资产；
          2. 不重新发行储备种子资金或种子库存，稳定需求补充只在新周期按真实钱包缺口执行；
          3. 重置周期服务结算、类别分配和旧单积压，保留价格传导关系历史；
          4. 启用总基础预算 12% 的稳定需求、三周期目标钱包、85%／15% 稳定预算、最低 5% 储备买盘和证据置信度压力；
          5. 世界版本保持 14、客户端状态版本保持 16，同一模型版本迁移只能执行一次。

          '''.replace('          ', '')
          wrong = '## 6. 资产与财富榜\n\n' + block + '服务器统一计算：'
          right = block + '## 6. 资产与财富榜\n\n服务器统一计算：'
          if wrong not in text:
              raise SystemExit('migration section is not in the expected wrong location')
          path.write_text(text.replace(wrong, right))
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/fix-model8-doc.yml

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        run: npm run test:browser

      - name: Commit verified document fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "修正市场模型迁移文档位置"
          git push origin HEAD:agent/deflation-stabilizer-model-8

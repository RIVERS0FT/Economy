name: Economy Contract State Diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/production-contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
      - name: Capture contract state transitions
        run: |
          node --input-type=module <<'JS' > contract-diagnostic.json
          import { createWorld, ensurePlayer } from './server/src/domain.js';
          import { applyProductionContractAction, createProductionContractClientState } from './server/src/contracts.js';

          const now = 1_800_000_000_000;
          const world = createWorld(now);
          const publisherUser = { id: 101, email: 'publisher@example.com', name: '发布者' };
          const accepterUser = { id: 202, email: 'accepter@example.com', name: '承接者' };
          const publisher = ensurePlayer(world, publisherUser, now);
          const accepter = ensurePlayer(world, accepterUser, now);
          publisher.credits = 100_000;
          accepter.credits = 100_000;
          publisher.inventories.wheat.available = 1_000;
          accepter.inventories.wheat.available = 1_000;

          const created = applyProductionContractAction(world, publisherUser, 'createProductionContract', {
            publisherRole: 'supplier',
            productId: 'wheat',
            quantityPerDelivery: 10,
            unitPrice: 5,
            deliveryIntervalMs: 30 * 60 * 1000,
            totalDeliveries: 4,
            firstDeliveryDelayMs: 30 * 60 * 1000,
          }, now);
          const createdRef = world.productionContracts[0];
          const accepted = applyProductionContractAction(world, accepterUser, 'acceptProductionContract', { contractId: createdRef.id }, now + 1);
          const current = world.productionContracts[0];
          const client = createProductionContractClientState(world, publisherUser.id, now + 2);
          console.log(JSON.stringify({
            created,
            accepted,
            staleReferenceStatus: createdRef.status,
            currentContract: {
              status: current.status,
              publisherId: current.publisherId,
              buyerId: current.buyerId,
              supplierId: current.supplierId,
              roundStatus: current.roundStatus,
            },
            clientSummary: client.productionContractSummary,
            clientContracts: client.productionContracts.map((item) => ({ id: item.id, status: item.status, isBuyer: item.isBuyer, isSupplier: item.isSupplier })),
          }, null, 2));
          JS
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: contract-state-diagnostic
          path: contract-diagnostic.json
          retention-days: 1

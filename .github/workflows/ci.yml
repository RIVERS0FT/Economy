name: Apply Global Interaction Modality

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-global-interaction-modality
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/global-interaction-modality
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract and apply prepared patch
        shell: bash
        run: |
          set -euo pipefail
          {
            python3 - <<'PYTHON'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-interaction-modality.yml').read_text()
          marker = "python3 - <<'PYTHON'\n"
          if marker not in workflow:
              raise RuntimeError('未找到补丁脚本起点')
          raw_script = workflow.split(marker, 1)[1]
          end_marker = '\n          PYTHON\n'
          if end_marker not in raw_script:
              raise RuntimeError('未找到补丁脚本终点')
          raw_script = raw_script.split(end_marker, 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in raw_script.splitlines()
          ) + '\n'
          Path('/tmp/apply-interaction-modality.py').write_text(script)
          PYTHON
            python3 /tmp/apply-interaction-modality.py
            python3 - <<'PYTHON'
          from pathlib import Path

          style_path = Path('src/styles/design-system.css')
          style = style_path.read_text()
          generic_hover = "button:hover:not(:disabled),\n.ui-button:hover:not(:disabled) {\n  transform: translateY(-1px);\n  filter: brightness(1.04);\n}\n\n"
          while generic_hover in style:
              style = style.replace(generic_hover, '')
          style_path.write_text(style)

          verifier_path = Path('scripts/verify-interaction-modality.mjs')
          verifier = verifier_path.read_text()
          old = "  forbidText('src/styles/design-system.css', 'button:hover:not(:disabled)');"
          new = "  forbidText('src/styles/design-system.css', 'button:hover:not(:disabled),\\n.ui-button:hover:not(:disabled) {');"
          if old not in verifier:
              raise RuntimeError('交互验证器缺少通用按钮 hover 子串检查')
          verifier_path.write_text(verifier.replace(old, new, 1))
          PYTHON
          } 2>&1 | tee /tmp/apply-interaction-modality.log

      - name: Persist apply failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .agent
          cp /tmp/apply-interaction-modality.log .agent/apply-interaction-modality.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .agent/apply-interaction-modality.log
          if ! git diff --cached --quiet; then
            git commit -m '记录交互协议应用失败'
            git push origin HEAD:agent/global-interaction-modality
          fi

      - name: Generate hover baseline
        shell: bash
        run: |
          set -o pipefail
          node scripts/verify-interaction-modality.mjs --write-baseline 2>&1 | tee /tmp/interaction-baseline.log

      - name: Persist baseline failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .agent
          cp /tmp/interaction-baseline.log .agent/interaction-baseline.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .agent/interaction-baseline.log
          if ! git diff --cached --quiet; then
            git commit -m '记录交互基线验证失败'
            git push origin HEAD:agent/global-interaction-modality
          fi

      - name: Verify focused architecture
        run: |
          node scripts/verify-interaction-modality.mjs
          node scripts/verify-mobile-touch-feedback.mjs
          node scripts/verify-unified-factory-recipes-grid.mjs
          npm run typecheck

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify interaction browsers
        run: npx playwright test tests/browser/facility-detail-sheet.spec.ts tests/browser/input-modality.spec.ts --project=chromium

      - name: Restore CI and commit real changes
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm .github/workflows/apply-interaction-modality.yml
          rm -rf .agent
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m '统一全局输入方式交互协议'
          git push origin HEAD:agent/global-interaction-modality

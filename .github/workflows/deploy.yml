name: Deploy Economy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-economy-website
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build website and test authoritative API
        run: |
          exec > >(tee /tmp/economy-build.log) 2>&1
          set -euo pipefail
          npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-deploy.log) 2>&1
          set -euo pipefail
          test -n "$SERVER_USER"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          sudo -n true
          test -d /var/www/game/economy && test -w /var/www/game/economy
          sudo -n install -d -o "$USER" -g "$(id -gn)" /var/www/game/economy-api
          test -w /var/www/game/economy-api
          command -v node >/dev/null
          command -v python3 >/dev/null
          command -v curl >/dev/null
          REMOTE

      - name: Upload website and game API
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            server/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy-api/"

      - name: Install authoritative game service
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-api-install.log) 2>&1
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "sudo -n python3 - /var/www/game/economy-api '$SERVER_USER'" \
            < scripts/install-economy-api.py

      - name: Configure Nginx routes
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-proxy-configure.log) 2>&1
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            'sudo -n python3 -' < scripts/configure-economy-nginx.py

      - name: Verify website, account routes, and game API
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-verify.log) 2>&1
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          curl --fail --silent --show-error http://127.0.0.1:3002/health >/dev/null
          curl --fail --silent --show-error -H "Host: game.riversoft.top" http://127.0.0.1/economy/ >/dev/null
          test -f /var/www/game/economy/index.html
          REMOTE

          curl --fail --silent --show-error \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --retry 3 --retry-delay 2 \
            https://game.riversoft.top/economy/ >/dev/null

          AUTH_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-auth-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            https://game.riversoft.top/economy-api/me || true)"
          if [ "$AUTH_STATUS" != "200" ] && [ "$AUTH_STATUS" != "401" ]; then
            cat /tmp/economy-auth-response.json 2>/dev/null || true
            echo AUTH_PROXY_UNAVAILABLE
            exit 1
          fi

          GAME_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-game-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            https://game.riversoft.top/economy-api/game/state || true)"
          if [ "$GAME_STATUS" != "401" ]; then
            cat /tmp/economy-game-response.json 2>/dev/null || true
            echo ECONOMY_GAME_API_PROXY_UNAVAILABLE
            exit 1
          fi

          LOGIN_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-login-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{}' \
            https://game.riversoft.top/economy-api/login || true)"
          if [ "$LOGIN_STATUS" != "400" ]; then
            cat /tmp/economy-login-response.json 2>/dev/null || true
            echo ECONOMY_LOGIN_PROXY_UNAVAILABLE
            exit 1
          fi

      - name: Report deployment status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="Economy website and authoritative game API deployed"
          else
            STATE="failure"
            DESCRIPTION="Economy deployment failed"
            DETAIL="$({
              cat /tmp/economy-build.log 2>/dev/null || true
              cat /tmp/economy-deploy.log 2>/dev/null || true
              cat /tmp/economy-api-install.log 2>/dev/null || true
              cat /tmp/economy-proxy-configure.log 2>/dev/null || true
              cat /tmp/economy-verify.log 2>/dev/null || true
            } | grep -Eai 'TS[0-9]+|ECONOMY_API_INSTALL_FAILED|ECONOMY_PROXY_CONFIGURATION_FAILED|ECONOMY_GAME_API_PROXY_UNAVAILABLE|AUTH_PROXY_UNAVAILABLE|ECONOMY_LOGIN_PROXY_UNAVAILABLE|permission denied|connection refused|failed|error' | tail -n 1 | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-125 || true)"
            if [ -n "$DETAIL" ]; then DESCRIPTION="$DETAIL"; fi
          fi

          TARGET_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          python3 - "$STATE" "$DESCRIPTION" "$TARGET_URL" <<'PYTHON_SCRIPT' > /tmp/deploy-status.json
          import json
          import sys
          print(json.dumps({
              "state": sys.argv[1],
              "description": sys.argv[2],
              "context": "deploy/economy",
              "target_url": sys.argv[3],
          }))
          PYTHON_SCRIPT

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @/tmp/deploy-status.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" > /dev/null

name: Deploy Economy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-economy-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build website
        run: npm run build

      - name: Install deployment tools
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Deploy Economy subdomain
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail

          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"

          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            "mkdir -p /var/www/economy /tmp/economy-deploy"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:/var/www/economy/"

          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            deploy/nginx/economy.riversoft.top.conf \
            "$SERVER_USER@$SERVER_HOST:/tmp/economy-deploy/economy.riversoft.top.conf"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail

          SITE_NAME="economy.riversoft.top"
          SITE_AVAILABLE="/etc/nginx/sites-available/$SITE_NAME"
          SITE_ENABLED="/etc/nginx/sites-enabled/$SITE_NAME"
          CERT_PATH="/etc/letsencrypt/live/$SITE_NAME/fullchain.pem"

          if [ ! -f "$SITE_AVAILABLE" ]; then
            sudo install -m 0644 \
              /tmp/economy-deploy/economy.riversoft.top.conf \
              "$SITE_AVAILABLE"
          fi

          sudo ln -sfn "$SITE_AVAILABLE" "$SITE_ENABLED"
          sudo nginx -t
          sudo systemctl reload nginx

          if [ ! -f "$CERT_PATH" ]; then
            if ! command -v certbot >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y certbot python3-certbot-nginx
            fi

            sudo certbot --nginx \
              --domain economy.riversoft.top \
              --non-interactive \
              --agree-tos \
              --register-unsafely-without-email \
              --redirect || true
          fi

          sudo nginx -t
          sudo systemctl reload nginx
          REMOTE_SCRIPT

      - name: Verify public website
        run: |
          set -e
          if curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            https://economy.riversoft.top/ > /dev/null; then
            exit 0
          fi

          curl --fail --silent --show-error --retry 5 --retry-delay 3 \
            http://economy.riversoft.top/ > /dev/null

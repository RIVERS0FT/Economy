name: Deploy Economy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-economy-website
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        id: install_dependencies
        run: |
          exec > >(tee /tmp/economy-install-dependencies.log) 2>&1
          set -euo pipefail
          npm ci

      - name: Build website and test authoritative API
        id: build
        run: |
          exec > >(tee /tmp/economy-build.log) 2>&1
          set -euo pipefail
          npm run build

      - name: Install Chromium
        id: install_chromium
        run: |
          exec > >(tee /tmp/economy-install-chromium.log) 2>&1
          set -euo pipefail
          npx playwright install --with-deps chromium

      - name: Test browser runtime before deployment
        id: browser_test
        shell: bash
        run: |
          exec > >(tee /tmp/economy-browser-test.log) 2>&1
          set -euo pipefail
          npm run test:browser

      - name: Ensure rsync is available
        id: ensure_rsync
        run: |
          exec > >(tee /tmp/economy-rsync.log) 2>&1
          set -euo pipefail
          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Configure SSH
        id: configure_ssh
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          exec > >(tee /tmp/economy-ssh.log) 2>&1
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Back up production database before world 15 migration
        id: backup_database
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-database-backup.log) 2>&1
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            'if [ "$(id -u)" -eq 0 ]; then exec python3 -; elif command -v sudo >/dev/null 2>&1 && sudo -n true; then exec sudo -n python3 -; else echo ECONOMY_DEPLOY_PRIVILEGES_UNAVAILABLE >&2; exit 1; fi' <<'PYTHON'
          import datetime
          import json
          import os
          import sqlite3
          from pathlib import Path

          database = Path('/var/lib/riversoft-economy/economy.sqlite')
          target_world_version = 15
          if not database.exists():
              print('ECONOMY_WORLD_15_BACKUP_SKIPPED_NO_DATABASE')
              raise SystemExit(0)

          with sqlite3.connect(database) as source:
              current_version = 0
              try:
                  row = source.execute(
                      "SELECT state_json FROM economy_world WHERE id = 1"
                  ).fetchone()
              except sqlite3.OperationalError as error:
                  if 'no such table' not in str(error).lower():
                      raise
                  row = None
              if row:
                  current_version = int(json.loads(row[0]).get('version') or 0)
              if current_version >= target_world_version:
                  print(f'ECONOMY_WORLD_15_BACKUP_SKIPPED_CURRENT_VERSION={current_version}')
                  raise SystemExit(0)

              backup_dir = database.parent / 'backups'
              backup_dir.mkdir(mode=0o700, parents=True, exist_ok=True)
              timestamp = datetime.datetime.now(datetime.timezone.utc).strftime('%Y%m%dT%H%M%SZ')
              backup_path = backup_dir / f'economy-pre-world-v{target_world_version}-{timestamp}.sqlite'
              with sqlite3.connect(backup_path) as destination:
                  source.backup(destination)
                  quick_check = destination.execute('PRAGMA quick_check').fetchone()[0]
                  if quick_check != 'ok':
                      raise RuntimeError(f'backup quick check failed: {quick_check}')
              os.chmod(backup_path, 0o600)
              backups = sorted(backup_dir.glob('economy-pre-world-v15-*.sqlite'), reverse=True)
              for stale in backups[10:]:
                  stale.unlink()
              print(f'ECONOMY_WORLD_15_BACKUP_CREATED={backup_path}')
          PYTHON

      - name: Prepare remote directories
        id: prepare_remote
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-deploy.log) 2>&1
          set -euo pipefail
          test -n "$SERVER_USER"
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          deploy_user="$(id -un)"
          deploy_group="$(id -gn)"

          run_privileged() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            elif command -v sudo >/dev/null 2>&1 && sudo -n true; then
              sudo -n "$@"
            else
              echo ECONOMY_DEPLOY_PRIVILEGES_UNAVAILABLE >&2
              exit 1
            fi
          }

          run_privileged install -d -o "$deploy_user" -g "$deploy_group" \
            /var/www/game/economy \
            /var/www/game/economy-api

          test -w /var/www/game/economy || { echo ECONOMY_WEB_DIRECTORY_NOT_WRITABLE >&2; exit 1; }
          test -w /var/www/game/economy-api || { echo ECONOMY_API_DIRECTORY_NOT_WRITABLE >&2; exit 1; }
          command -v python3 >/dev/null || { echo ECONOMY_REMOTE_PYTHON_MISSING >&2; exit 1; }
          command -v curl >/dev/null || { echo ECONOMY_REMOTE_CURL_MISSING >&2; exit 1; }
          REMOTE

      - name: Prepare portable Node runtime
        id: prepare_runtime
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-runtime.log) 2>&1
          set -euo pipefail

          remote_machine="$(ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" uname -m)"
          case "$remote_machine" in
            x86_64|amd64) node_arch="x64" ;;
            aarch64|arm64) node_arch="arm64" ;;
            *) echo "ECONOMY_UNSUPPORTED_SERVER_ARCHITECTURE: $remote_machine" >&2; exit 1 ;;
          esac

          node_version="$(node -p 'process.versions.node')"
          archive="node-v${node_version}-linux-${node_arch}.tar.xz"
          runtime_dir="/tmp/economy-node-runtime"
          rm -rf "$runtime_dir"
          mkdir -p "$runtime_dir"

          curl --fail --silent --show-error --location \
            "https://nodejs.org/dist/v${node_version}/${archive}" \
            --output "/tmp/${archive}" || { echo ECONOMY_NODE_RUNTIME_DOWNLOAD_FAILED >&2; exit 1; }
          tar -xJf "/tmp/${archive}" --strip-components=1 -C "$runtime_dir"
          "$runtime_dir/bin/node" -e 'require("node:sqlite"); console.log(process.versions.node)'

      - name: Upload website and game API
        id: upload_assets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-upload.log) 2>&1
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            server/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy-api/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            /tmp/economy-node-runtime/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy-api/runtime/"

      - name: Install authoritative game service
        id: install_service
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-api-install.log) 2>&1
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "if [ \$(id -u) -eq 0 ]; then exec python3 - /var/www/game/economy-api '$SERVER_USER'; elif command -v sudo >/dev/null 2>&1 && sudo -n true; then exec sudo -n python3 - /var/www/game/economy-api '$SERVER_USER'; else echo ECONOMY_DEPLOY_PRIVILEGES_UNAVAILABLE >&2; exit 1; fi" \
            < scripts/install-economy-api.py

      - name: Configure Nginx routes
        id: configure_nginx
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-proxy-configure.log) 2>&1
          set -euo pipefail
          for script in scripts/configure-economy-nginx.py scripts/configure-economy-registration-nginx.py; do
            ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
              'if [ "$(id -u)" -eq 0 ]; then exec python3 -; elif command -v sudo >/dev/null 2>&1 && sudo -n true; then exec sudo -n python3 -; else echo ECONOMY_DEPLOY_PRIVILEGES_UNAVAILABLE >&2; exit 1; fi' \
              < "$script"
          done

      - name: Verify website, account routes, and game API
        id: verify_deployment
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-verify.log) 2>&1
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          test -x /var/www/game/economy-api/runtime/bin/node
          curl --fail --silent --show-error http://127.0.0.1:3002/health >/dev/null
          curl --fail --silent --show-error -H "Host: game.riversoft.top" http://127.0.0.1/economy/ >/dev/null
          test -f /var/www/game/economy/index.html
          test -s /var/lib/riversoft-economy/registration-secret
          REMOTE

          curl --fail --silent --show-error \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --retry 3 --retry-delay 2 \
            https://game.riversoft.top/economy/ >/dev/null

          AUTH_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-auth-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            https://game.riversoft.top/economy-api/me || true)"
          if [ "$AUTH_STATUS" != "200" ] && [ "$AUTH_STATUS" != "401" ]; then
            cat /tmp/economy-auth-response.json 2>/dev/null || true
            echo AUTH_PROXY_UNAVAILABLE
            exit 1
          fi

          GAME_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-game-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            https://game.riversoft.top/economy-api/game/state || true)"
          if [ "$GAME_STATUS" != "401" ]; then
            cat /tmp/economy-game-response.json 2>/dev/null || true
            echo ECONOMY_GAME_API_PROXY_UNAVAILABLE
            exit 1
          fi

          LOGIN_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-login-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --request POST \
            --header 'Content-Type: application/json' \
            --data '{}' \
            https://game.riversoft.top/economy-api/login || true)"
          if [ "$LOGIN_STATUS" != "400" ]; then
            cat /tmp/economy-login-response.json 2>/dev/null || true
            echo ECONOMY_LOGIN_PROXY_UNAVAILABLE
            exit 1
          fi

          REGISTRATION_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-registration-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --request POST \
            --header 'Content-Type: application/json' \
            --header 'Idempotency-Key: deploy-registration-route-check' \
            --data '{}' \
            https://game.riversoft.top/economy-api/registration/email-code || true)"
          if [ "$REGISTRATION_STATUS" != "400" ]; then
            cat /tmp/economy-registration-response.json 2>/dev/null || true
            echo ECONOMY_REGISTRATION_PROXY_UNAVAILABLE
            exit 1
          fi

      - name: Collect failed step log
        if: failure()
        shell: bash
        env:
          INSTALL_DEPENDENCIES_OUTCOME: ${{ steps.install_dependencies.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          INSTALL_CHROMIUM_OUTCOME: ${{ steps.install_chromium.outcome }}
          BROWSER_TEST_OUTCOME: ${{ steps.browser_test.outcome }}
          ENSURE_RSYNC_OUTCOME: ${{ steps.ensure_rsync.outcome }}
          CONFIGURE_SSH_OUTCOME: ${{ steps.configure_ssh.outcome }}
          BACKUP_DATABASE_OUTCOME: ${{ steps.backup_database.outcome }}
          PREPARE_REMOTE_OUTCOME: ${{ steps.prepare_remote.outcome }}
          PREPARE_RUNTIME_OUTCOME: ${{ steps.prepare_runtime.outcome }}
          UPLOAD_ASSETS_OUTCOME: ${{ steps.upload_assets.outcome }}
          INSTALL_SERVICE_OUTCOME: ${{ steps.install_service.outcome }}
          CONFIGURE_NGINX_OUTCOME: ${{ steps.configure_nginx.outcome }}
          VERIFY_DEPLOYMENT_OUTCOME: ${{ steps.verify_deployment.outcome }}
        run: |
          set -euo pipefail
          failure_dir="$RUNNER_TEMP/economy-failure-log"
          rm -rf "$failure_dir"
          mkdir -p "$failure_dir"

          collect_failed_log() {
            local outcome="$1"
            local source="$2"
            local target="$3"
            if [ "$outcome" != "failure" ]; then
              return
            fi
            if [ -s "$source" ]; then
              cp "$source" "$failure_dir/$target"
            else
              printf '步骤失败，但未生成可读取的命令日志：%s\n' "$target" > "$failure_dir/$target"
            fi
          }

          collect_failed_log "$INSTALL_DEPENDENCIES_OUTCOME" /tmp/economy-install-dependencies.log install-dependencies.log
          collect_failed_log "$BUILD_OUTCOME" /tmp/economy-build.log build.log
          collect_failed_log "$INSTALL_CHROMIUM_OUTCOME" /tmp/economy-install-chromium.log install-chromium.log
          collect_failed_log "$BROWSER_TEST_OUTCOME" /tmp/economy-browser-test.log browser-test.log
          collect_failed_log "$ENSURE_RSYNC_OUTCOME" /tmp/economy-rsync.log rsync.log
          collect_failed_log "$CONFIGURE_SSH_OUTCOME" /tmp/economy-ssh.log configure-ssh.log
          collect_failed_log "$BACKUP_DATABASE_OUTCOME" /tmp/economy-database-backup.log database-backup.log
          collect_failed_log "$PREPARE_REMOTE_OUTCOME" /tmp/economy-deploy.log prepare-remote.log
          collect_failed_log "$PREPARE_RUNTIME_OUTCOME" /tmp/economy-runtime.log prepare-runtime.log
          collect_failed_log "$UPLOAD_ASSETS_OUTCOME" /tmp/economy-upload.log upload-assets.log
          collect_failed_log "$INSTALL_SERVICE_OUTCOME" /tmp/economy-api-install.log install-service.log
          collect_failed_log "$CONFIGURE_NGINX_OUTCOME" /tmp/economy-proxy-configure.log configure-nginx.log
          collect_failed_log "$VERIFY_DEPLOYMENT_OUTCOME" /tmp/economy-verify.log verify-deployment.log

          if ! compgen -G "$failure_dir/*" > /dev/null; then
            printf '失败发生在非 shell Action 步骤；完整输出保留在 GitHub Actions job log。\n' > "$failure_dir/action-step-failure.txt"
          fi

      - name: Upload failed step log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: economy-deploy-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/economy-failure-log
          if-no-files-found: warn
          retention-days: 3
          compression-level: 9

      - name: Report deployment status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="Economy website and authoritative game API deployed"
          else
            STATE="failure"
            DESCRIPTION="Economy deployment failed"
            DETAIL="$({
              cat /tmp/economy-install-dependencies.log 2>/dev/null || true
              cat /tmp/economy-build.log 2>/dev/null || true
              cat /tmp/economy-install-chromium.log 2>/dev/null || true
              cat /tmp/economy-browser-test.log 2>/dev/null || true
              cat /tmp/economy-rsync.log 2>/dev/null || true
              cat /tmp/economy-ssh.log 2>/dev/null || true
              cat /tmp/economy-database-backup.log 2>/dev/null || true
              cat /tmp/economy-deploy.log 2>/dev/null || true
              cat /tmp/economy-runtime.log 2>/dev/null || true
              cat /tmp/economy-upload.log 2>/dev/null || true
              cat /tmp/economy-api-install.log 2>/dev/null || true
              cat /tmp/economy-proxy-configure.log 2>/dev/null || true
              cat /tmp/economy-verify.log 2>/dev/null || true
            } | grep -Eai 'TS[0-9]+|ECONOMY_[A-Z0-9_]+|AUTH_PROXY_UNAVAILABLE|permission denied|command not found|connection refused|failed|error' | tail -n 1 | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-125 || true)"
            if [ -n "$DETAIL" ]; then DESCRIPTION="$DETAIL"; fi
          fi

          TARGET_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          python3 - "$STATE" "$DESCRIPTION" "$TARGET_URL" <<'PYTHON_SCRIPT' > /tmp/deploy-status.json
          import json
          import sys
          print(json.dumps({
              "state": sys.argv[1],
              "description": sys.argv[2],
              "context": "deploy/economy",
              "target_url": sys.argv[3],
          }))
          PYTHON_SCRIPT

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @/tmp/deploy-status.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" > /dev/null

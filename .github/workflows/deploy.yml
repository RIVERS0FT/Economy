name: Deploy Economy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-economy-website
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build website
        run: |
          exec > >(tee /tmp/economy-build.log) 2>&1
          set -euo pipefail
          npm run build

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Upload static website
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          exec > >(tee /tmp/economy-deploy.log) 2>&1
          set -euo pipefail

          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"

          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            'test -d /var/www/game/economy && test -w /var/www/game/economy || { echo DEPLOY_DIRECTORY_NOT_WRITABLE; exit 1; }'

          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:/var/www/game/economy/"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            'test -f /var/www/game/economy/index.html'

      - name: Ensure account reverse proxy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-proxy-configure.log) 2>&1
          set -euo pipefail

          if ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" 'sudo -n true' 2>/dev/null; then
            ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
              "$SERVER_USER@$SERVER_HOST" \
              'sudo -n python3 -' < scripts/configure-economy-nginx.py
          else
            echo PASSWORDLESS_SUDO_UNAVAILABLE_USING_EXISTING_PROXY
          fi

      - name: Verify Nginx route, HTTPS certificate, and account proxy
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-verify.log) 2>&1
          set -euo pipefail

          if ! ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            'command -v curl >/dev/null 2>&1 || { echo SERVER_CURL_NOT_AVAILABLE; exit 1; }; curl --fail --silent --show-error -H "Host: game.riversoft.top" http://127.0.0.1/economy/ > /dev/null'; then
            echo NGINX_LOCAL_ROUTE_FAILED
            exit 1
          fi

          if ! curl --fail --silent --show-error \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --retry 3 --retry-delay 2 \
            https://game.riversoft.top/economy/ > /dev/null; then
            echo HTTPS_CERT_OR_ROUTE_FAILED
            exit 1
          fi

          AUTH_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-auth-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            https://game.riversoft.top/economy-api/me || true)"

          if [ "$AUTH_STATUS" != "200" ] && [ "$AUTH_STATUS" != "401" ]; then
            cat /tmp/economy-auth-response.json 2>/dev/null || true
            echo AUTH_PROXY_UNAVAILABLE
            exit 1
          fi

          REGISTER_STATUS="$(curl --silent --show-error \
            --output /tmp/economy-register-response.json \
            --write-out '%{http_code}' \
            --resolve "game.riversoft.top:443:$SERVER_HOST" \
            --request POST \
            --header 'Origin: https://game.riversoft.top' \
            --header 'Content-Type: application/json' \
            --data '{}' \
            https://game.riversoft.top/economy-api/register || true)"

          if [ "$REGISTER_STATUS" != "400" ]; then
            cat /tmp/economy-register-response.json 2>/dev/null || true
            echo ECONOMY_REGISTER_PROXY_UNAVAILABLE
            exit 1
          fi

      - name: Report deployment status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="Economy deployment and account proxy succeeded"
          else
            STATE="failure"
            DESCRIPTION="Economy deployment failed"

            DETAIL="$({
              cat /tmp/economy-build.log 2>/dev/null || true
              cat /tmp/economy-deploy.log 2>/dev/null || true
              cat /tmp/economy-proxy-configure.log 2>/dev/null || true
              cat /tmp/economy-verify.log 2>/dev/null || true
            } | grep -Eai 'TS[0-9]+|DEPLOY_DIRECTORY_NOT_WRITABLE|ECONOMY_PROXY_CONFIGURATION_FAILED|NGINX_LOCAL_ROUTE_FAILED|HTTPS_CERT_OR_ROUTE_FAILED|AUTH_PROXY_UNAVAILABLE|ECONOMY_REGISTER_PROXY_UNAVAILABLE|SERVER_CURL_NOT_AVAILABLE|permission denied|invalid format|load key|rsync error|could not resolve|connection refused|connection timed out|certificate|failed|error' | tail -n 1 | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-125 || true)"

            if [ -n "$DETAIL" ]; then
              DESCRIPTION="$DETAIL"
            fi
          fi

          TARGET_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          python3 - "$STATE" "$DESCRIPTION" "$TARGET_URL" <<'PYTHON_SCRIPT' > /tmp/deploy-status.json
          import json
          import sys

          state = sys.argv[1]
          description = sys.argv[2]
          context = "deploy/economy"
          if state != "success":
              context += ": " + description[:70]

          print(json.dumps({
              "state": state,
              "description": description,
              "context": context,
              "target_url": sys.argv[3],
          }))
          PYTHON_SCRIPT

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @/tmp/deploy-status.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$GITHUB_SHA" > /dev/null

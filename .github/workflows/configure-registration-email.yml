name: Configure Economy Registration Email

on:
  workflow_run:
    workflows:
      - Deploy Economy Website
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: configure-economy-registration-email
  cancel-in-progress: true

permissions:
  contents: read
  statuses: write

jobs:
  configure:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Validate running Resend configuration
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          exec > >(tee /tmp/economy-email-configure.log) 2>&1
          set -euo pipefail
          test -n "$SERVER_USER"

          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" python3 - <<'PYTHON'
          import subprocess
          import time
          import urllib.request
          from pathlib import Path

          service_name = 'riversoft-economy-api.service'
          pid = int(subprocess.check_output(
              ['systemctl', 'show', service_name, '--property=MainPID', '--value'],
              text=True,
          ).strip())
          if pid <= 0:
              raise SystemExit('ECONOMY_EMAIL_SERVICE_NOT_RUNNING')

          process_environment = {}
          for pair in Path(f'/proc/{pid}/environ').read_bytes().split(b'\0'):
              if b'=' in pair:
                  name, value = pair.split(b'=', 1)
                  process_environment[name.decode('utf-8', 'replace')] = value
          for required in ('RESEND_API_KEY', 'EMAIL_FROM'):
              if not process_environment.get(required):
                  raise SystemExit(f'ECONOMY_PROCESS_{required}_MISSING')

          last_error = None
          for _ in range(10):
              try:
                  with urllib.request.urlopen('http://127.0.0.1:3002/health', timeout=3) as response:
                      if response.status == 200:
                          break
              except Exception as error:
                  last_error = error
              time.sleep(0.5)
          else:
              raise SystemExit(f'ECONOMY_EMAIL_SERVICE_HEALTH_FAILED: {last_error}')

          print('ECONOMY_EMAIL_CONFIGURATION_LOADED')
          PYTHON

      - name: Report email configuration status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="Economy registration email configuration loaded"
          else
            STATE="failure"
            DESCRIPTION="Economy registration email configuration failed"
            DETAIL="$(grep -Eai 'ECONOMY_[A-Z0-9_]+|permission denied|connection refused|failed|error' /tmp/economy-email-configure.log 2>/dev/null | tail -n 1 | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g' | cut -c1-125 || true)"
            if [ -n "$DETAIL" ]; then DESCRIPTION="$DETAIL"; fi
          fi

          TARGET_URL="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          python3 - "$STATE" "$DESCRIPTION" "$TARGET_URL" <<'PYTHON' > /tmp/economy-email-status.json
          import json
          import sys
          print(json.dumps({
              'state': sys.argv[1],
              'description': sys.argv[2],
              'context': 'deploy/economy-email',
              'target_url': sys.argv[3],
          }))
          PYTHON

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data-binary @/tmp/economy-email-status.json \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" > /dev/null

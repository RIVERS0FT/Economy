name: Apply Profit Verifier Fix

on:
  push:
    branches:
      - codex/fix-profit-verifier

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/fix-profit-verifier

      - name: Update cross-verifier and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-unified-factory-recipes-grid.mjs')
          text = path.read_text()
          old = "  '摘要使用两列，本轮现金利润占满一行并优先显示',"
          new = "  '摘要桌面使用四列，容器变窄后使用两列，单周期利润占满一行并优先显示',"
          if text.count(old) != 1:
              raise SystemExit(f'expected one old assertion, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          rm .github/workflows/apply-profit-verifier-fix.yml

      - name: Commit fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/verify-unified-factory-recipes-grid.mjs .github/workflows/apply-profit-verifier-fix.yml
          git commit -m "同步工厂利润布局交叉验证"
          git push origin HEAD:codex/fix-profit-verifier

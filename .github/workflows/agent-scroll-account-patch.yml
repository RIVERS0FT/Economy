name: Agent scroll ownership patch

on:
  push:
    branches:
      - agent/fix-scroll-ownership-and-stress-accounts

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-scroll-ownership-and-stress-accounts
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply repository patch
        run: node scripts/agent-scroll-account-patch.mjs
      - name: Install dependencies
        run: npm ci
      - name: Validate targeted changes
        run: |
          node scripts/verify-stress-test-accounts.mjs
          node scripts/verify-scroll-ownership.mjs
          node scripts/verify-virtual-list-scroll-chaining.mjs
          npm run typecheck
      - name: Commit patched files
        run: |
          rm -f .github/workflows/agent-scroll-account-patch.yml scripts/agent-scroll-account-patch.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix nested scroll ownership and reuse stress accounts"
          git push origin HEAD:agent/fix-scroll-ownership-and-stress-accounts

name: Agent scroll ownership patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fix-scroll-ownership-and-stress-accounts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-scroll-ownership-and-stress-accounts
          fetch-depth: 1
          show-progress: false
      - name: Apply repository patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/agent-scroll-account-patch.mjs')
          source = path.read_text()
          source = source.replace(
              "'当前视口真正发生滚动时必须同时调用 `preventDefault()` 与 `stopPropagation()`'",
              "'当前视口真正发生滚动时必须同时调用 \\`preventDefault()\\` 与 \\`stopPropagation()\\`'",
          )
          path.write_text(source)
          PY
          node scripts/agent-scroll-account-patch.mjs
      - name: Commit patched files
        run: |
          rm -f .github/workflows/agent-scroll-account-patch.yml scripts/agent-scroll-account-patch.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix nested scroll ownership and reuse stress accounts"
          git push origin HEAD:agent/fix-scroll-ownership-and-stress-accounts

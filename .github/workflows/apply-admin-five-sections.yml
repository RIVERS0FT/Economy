name: Apply admin five-section refactor

on:
  push:
    branches:
      - admin-five-sections

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: admin-five-sections
          fetch-depth: 0

      - name: Apply administrator information architecture
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def write(path: str, content: str) -> None:
              Path(path).write_text(content, encoding='utf-8')

          def replace(path: str, old: str, new: str, count: int = 1) -> None:
              target = Path(path)
              content = target.read_text(encoding='utf-8')
              if old not in content:
                  raise RuntimeError(f'{path} missing replacement source: {old[:120]!r}')
              target.write_text(content.replace(old, new, count), encoding='utf-8')

          def replace_between(path: str, start: str, end: str, new: str) -> None:
              target = Path(path)
              content = target.read_text(encoding='utf-8')
              start_index = content.find(start)
              if start_index < 0:
                  raise RuntimeError(f'{path} missing start marker: {start!r}')
              end_index = content.find(end, start_index)
              if end_index < 0:
                  raise RuntimeError(f'{path} missing end marker: {end!r}')
              target.write_text(content[:start_index] + new + content[end_index:], encoding='utf-8')

          write('src/app/AdminApp.tsx', r'''import { useCallback, useEffect, useState } from 'react';
          import { adminApi, type ExtendedAdminSummary } from '../api/admin';
          import { AdminBanPanel } from '../components/AdminBanPanel';
          import { AdminGiftCodesSection } from '../components/AdminGiftCodesSection';
          import { AdminOverview } from '../components/AdminOverview';
          import { AdminPlayerSection } from '../components/AdminPlayerSection';
          import { AdminPopulationSection } from '../components/AdminPopulationSection';
          import {
            AdminMobileNavigation,
            AdminSidebar,
            type AdminSectionId,
          } from '../components/shell/AdminSidebar';
          import { AdminDesktopBar } from '../components/shell/AdminDesktopBar';
          import { SignedInShell } from '../components/shell/SignedInShell';
          import { CurrencyText } from '../components/ui/CurrencyAmount';
          import { Button, PageLayout } from '../components/ui/layout';
          import type { AuthUser } from '../types';

          const ADMIN_SECTION_COPY: Record<AdminSectionId, { title: string; description: string }> = {
            overview: { title: '世界概览', description: '查看 Economy 世界状态、核心运营指标与玩家社区入口。' },
            players: { title: '玩家运营', description: '分析玩家活跃、留存、经营成长、参与结构与财富分布。' },
            population: { title: '人口经济', description: '查看人口健康、就业资金流并执行受控人口政策调控。' },
            'gift-codes': { title: '礼品码', description: '创建、停用礼品码并审阅玩家兑换记录。' },
            bans: { title: '账号封禁', description: '复核同 IP 多账号事件并调整账号封禁状态。' },
          };

          const INITIAL_REFRESH_TOKENS: Record<AdminSectionId, number> = {
            overview: 0,
            players: 0,
            population: 0,
            'gift-codes': 0,
            bans: 0,
          };

          export function AdminApp({ user }: { user: AuthUser }) {
            const [activeSection, setActiveSection] = useState<AdminSectionId>('overview');
            const [visitedSections, setVisitedSections] = useState<Set<AdminSectionId>>(() => new Set(['overview']));
            const [refreshTokens, setRefreshTokens] = useState(INITIAL_REFRESH_TOKENS);
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
            const [summary, setSummary] = useState<ExtendedAdminSummary | null>(null);
            const [error, setError] = useState('');
            const [notice, setNotice] = useState('');

            const loadOverview = useCallback(async () => {
              try {
                setSummary(await adminApi.summary());
                setError('');
              } catch (reason) {
                setError(reason instanceof Error ? reason.message : '无法加载世界概览');
              }
            }, []);

            useEffect(() => {
              setVisitedSections((current) => {
                if (current.has(activeSection)) return current;
                const next = new Set(current);
                next.add(activeSection);
                return next;
              });
              if (activeSection === 'overview') void loadOverview();
              if (activeSection === 'bans') {
                setRefreshTokens((current) => ({ ...current, bans: current.bans + 1 }));
              }
            }, [activeSection, loadOverview]);

            if (user.role !== 'admin') {
              return <main className="admin-shell admin-denied"><section><h1>无权访问</h1><p>当前账号不是 Economy 管理员。</p><a href="/economy/">返回游戏</a></section></main>;
            }

            function refreshActiveSection() {
              setNotice('');
              setError('');
              if (activeSection === 'overview') void loadOverview();
              setRefreshTokens((current) => ({
                ...current,
                [activeSection]: current[activeSection] + 1,
              }));
            }

            return (
              <SignedInShell
                rootClassName="admin-shell"
                workspaceClassName="admin-workspace"
                pageViewportClassName="admin-page-scroll"
                pageFrameClassName="admin-page-frame"
                chromeOverlayClassName="admin-mobile-chrome-layer"
                adminChromeLayer
                sidebarCollapsed={sidebarCollapsed}
                sidebar={(
                  <AdminSidebar
                    email={user.email}
                    activeSection={activeSection}
                    collapsed={sidebarCollapsed}
                    onToggleCollapsed={() => setSidebarCollapsed((current) => !current)}
                    onSelect={setActiveSection}
                  />
                )}
                chrome={(
                  <>
                    <AdminDesktopBar
                      title={ADMIN_SECTION_COPY[activeSection].title}
                      description={ADMIN_SECTION_COPY[activeSection].description}
                      email={user.email}
                      worldVersion={summary?.worldVersion}
                      apiStatus={summary?.apiStatus}
                      onRefresh={refreshActiveSection}
                    />
                    <AdminMobileNavigation activeSection={activeSection} onSelect={setActiveSection} />
                  </>
                )}
              >
                <PageLayout
                  title={ADMIN_SECTION_COPY[activeSection].title}
                  description={ADMIN_SECTION_COPY[activeSection].description}
                  actions={<Button variant="secondary" onClick={refreshActiveSection}>刷新当前分区</Button>}
                >
                  {error ? <div className="admin-alert danger" role="alert"><CurrencyText>{error}</CurrencyText></div> : null}
                  {notice ? <div className="admin-alert" role="status"><CurrencyText>{notice}</CurrencyText></div> : null}

                  {visitedSections.has('overview') ? (
                    <div className="admin-section-view" hidden={activeSection !== 'overview'}>
                      <AdminOverview
                        active={activeSection === 'overview'}
                        summary={summary}
                        refreshToken={refreshTokens.overview}
                        onNotice={setNotice}
                        onError={setError}
                      />
                    </div>
                  ) : null}

                  {visitedSections.has('players') ? (
                    <div className="admin-section-view" hidden={activeSection !== 'players'}>
                      <AdminPlayerSection
                        active={activeSection === 'players'}
                        refreshToken={refreshTokens.players}
                        onError={setError}
                      />
                    </div>
                  ) : null}

                  {visitedSections.has('population') ? (
                    <div className="admin-section-view" hidden={activeSection !== 'population'}>
                      <AdminPopulationSection
                        active={activeSection === 'population'}
                        refreshToken={refreshTokens.population}
                        onNotice={setNotice}
                        onError={setError}
                      />
                    </div>
                  ) : null}

                  {visitedSections.has('gift-codes') ? (
                    <div className="admin-section-view" hidden={activeSection !== 'gift-codes'}>
                      <AdminGiftCodesSection
                        active={activeSection === 'gift-codes'}
                        refreshToken={refreshTokens['gift-codes']}
                        onNotice={setNotice}
                        onError={setError}
                      />
                    </div>
                  ) : null}

                  {visitedSections.has('bans') ? (
                    <div className="admin-section-view" hidden={activeSection !== 'bans'}>
                      <AdminBanPanel onNotice={setNotice} refreshToken={refreshTokens.bans} />
                    </div>
                  ) : null}
                </PageLayout>
              </SignedInShell>
            );
          }
          ''').replace('\n          ', '\n').lstrip())

          write('src/components/AdminOverview.tsx', r'''import type { ExtendedAdminSummary } from '../api/admin';
          import { AdminCommunityLinkPanel } from './AdminCommunityLinkPanel';
          import { MetricCard } from './ui/layout';

          export function AdminOverview({
            active,
            summary,
            refreshToken,
            onNotice,
            onError,
          }: {
            active: boolean;
            summary: ExtendedAdminSummary | null;
            refreshToken: number;
            onNotice: (message: string) => void;
            onError: (message: string) => void;
          }) {
            return (
              <div className="admin-section-stack admin-overview-console">
                <section className="admin-summary-grid" aria-label="世界概览">
                  <MetricCard label="玩家数量" value={summary?.playerCount ?? '--'} />
                  <MetricCard label="未完成订单" value={summary?.openOrderCount ?? '--'} />
                  <MetricCard label="商品订单" value={summary?.commodityOrderCount ?? '--'} />
                  <MetricCard label="工厂订单" value={summary?.facilityOrderCount ?? '--'} />
                  <MetricCard label="进行中拍卖" value={summary?.openAuctionCount ?? '--'} />
                  <MetricCard label="开放／履约合同" value={summary?.openContractCount ?? '--'} />
                </section>

                <AdminCommunityLinkPanel
                  active={active}
                  refreshToken={refreshToken}
                  onNotice={onNotice}
                  onError={onError}
                />
              </div>
            );
          }
          ''').replace('\n          ', '\n').lstrip())

          write('src/components/AdminCommunityLinkPanel.tsx', r'''import { useCallback, useEffect, useState } from 'react';
          import { adminApi } from '../api/admin';
          import { TextInput } from './ui/FormControls';
          import { Button, Panel, WidgetHeading } from './ui/layout';

          export function AdminCommunityLinkPanel({
            active,
            refreshToken,
            onNotice,
            onError,
          }: {
            active: boolean;
            refreshToken: number;
            onNotice: (message: string) => void;
            onError: (message: string) => void;
          }) {
            const [qqGroupUrl, setQqGroupUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);

            const loadCommunityLink = useCallback(async () => {
              setLoading(true);
              try {
                const communityLink = await adminApi.communityLink();
                setQqGroupUrl(communityLink.qqGroupUrl);
                onError('');
              } catch (reason) {
                onError(reason instanceof Error ? reason.message : '无法加载玩家社区入口');
              } finally {
                setLoading(false);
              }
            }, [onError]);

            useEffect(() => {
              if (!active) return;
              void loadCommunityLink();
            }, [active, loadCommunityLink, refreshToken]);

            async function saveCommunityLink() {
              if (saving) return;
              setSaving(true);
              try {
                const saved = await adminApi.updateCommunityLink(qqGroupUrl.trim());
                setQqGroupUrl(saved.qqGroupUrl);
                onNotice('QQ群跳转链接已保存，玩家侧边栏将读取新地址。');
              } catch (reason) {
                onNotice(reason instanceof Error ? reason.message : '保存QQ群跳转链接失败');
              } finally {
                setSaving(false);
              }
            }

            return (
              <Panel className="admin-panel admin-community-link-panel admin-overview-community">
                <WidgetHeading title="玩家社区入口" />
                <p>配置桌面侧边栏“加入 QQ 群”按钮的跳转地址，仅接受 HTTPS 链接。</p>
                <TextInput
                  label="QQ群跳转链接"
                  type="url"
                  inputMode="url"
                  maxLength={2048}
                  value={qqGroupUrl}
                  disabled={loading}
                  onChange={(event) => setQqGroupUrl(event.target.value)}
                  placeholder="https://qm.qq.com/q/..."
                />
                <Button disabled={saving || loading} onClick={() => void saveCommunityLink()}>
                  {saving ? '正在保存…' : loading ? '正在读取…' : '保存链接'}
                </Button>
              </Panel>
            );
          }
          ''').replace('\n          ', '\n').lstrip())

          write('src/components/AdminPlayerSection.tsx', r'''import { useCallback, useEffect, useState } from 'react';
          import {
            adminApi,
            type AdminPlayerStatistics as AdminPlayerStatisticsData,
            type AdminPlayerStatisticsRange,
          } from '../api/admin';
          import { AdminPlayerStatistics } from './AdminPlayerStatistics';
          import { Button, Panel, WidgetHeading } from './ui/layout';

          const RANGES: AdminPlayerStatisticsRange[] = ['7d', '30d', '90d'];

          export function AdminPlayerSection({
            active,
            refreshToken,
            onError,
          }: {
            active: boolean;
            refreshToken: number;
            onError: (message: string) => void;
          }) {
            const [statistics, setStatistics] = useState<AdminPlayerStatisticsData | null>(null);
            const [range, setRange] = useState<AdminPlayerStatisticsRange>('30d');
            const [loading, setLoading] = useState(false);

            const loadStatistics = useCallback(async (nextRange: AdminPlayerStatisticsRange) => {
              setLoading(true);
              try {
                setStatistics(await adminApi.playerStatistics(nextRange));
                onError('');
              } catch (reason) {
                onError(reason instanceof Error ? reason.message : '无法加载玩家运营统计');
              } finally {
                setLoading(false);
              }
            }, [onError]);

            useEffect(() => {
              if (!active) return;
              void loadStatistics(range);
            }, [active, loadStatistics, range, refreshToken]);

            return (
              <div className="admin-section-stack admin-player-console">
                <Panel className="admin-panel admin-player-statistics-panel">
                  <WidgetHeading
                    title="玩家运营分析"
                    action={(
                      <div className="admin-player-statistics__range" role="group" aria-label="玩家统计时间范围">
                        {RANGES.map((option) => (
                          <Button
                            className={option === range ? 'is-active' : ''}
                            disabled={loading && option === range}
                            key={option}
                            variant="compact"
                            aria-pressed={option === range}
                            onClick={() => setRange(option)}
                          >
                            {option.replace('d', ' 日')}
                          </Button>
                        ))}
                      </div>
                    )}
                  />
                  <AdminPlayerStatistics statistics={statistics} loading={loading} />
                </Panel>
              </div>
            );
          }
          ''').replace('\n          ', '\n').lstrip())

          write('src/components/AdminPopulationSection.tsx', r'''import { useCallback, useEffect, useState } from 'react';
          import { adminApi, type PopulationEconomyAdminSummary } from '../api/admin';
          import { AdminPopulationControl } from './AdminPopulationControl';
          import { EmptyState, Panel, WidgetHeading } from './ui/layout';

          export function AdminPopulationSection({
            active,
            refreshToken,
            onNotice,
            onError,
          }: {
            active: boolean;
            refreshToken: number;
            onNotice: (message: string) => void;
            onError: (message: string) => void;
          }) {
            const [economy, setEconomy] = useState<PopulationEconomyAdminSummary | null>(null);
            const [loading, setLoading] = useState(false);

            const loadPopulationEconomy = useCallback(async () => {
              setLoading(true);
              try {
                const summary = await adminApi.populationEconomy();
                setEconomy(summary.populationEconomy);
                onError('');
              } catch (reason) {
                onError(reason instanceof Error ? reason.message : '无法加载人口经济');
              } finally {
                setLoading(false);
              }
            }, [onError]);

            useEffect(() => {
              if (!active) return;
              void loadPopulationEconomy();
            }, [active, loadPopulationEconomy, refreshToken]);

            return (
              <div className="admin-section-stack admin-population-console">
                <Panel className="admin-panel admin-population-economy">
                  <WidgetHeading title="人口经济总览" />
                  {economy ? (
                    <AdminPopulationControl
                      economy={economy}
                      onChanged={loadPopulationEconomy}
                      onNotice={onNotice}
                    />
                  ) : <EmptyState>{loading ? '正在加载人口经济…' : '人口经济数据尚未初始化。'}</EmptyState>}
                </Panel>
              </div>
            );
          }
          ''').replace('\n          ', '\n').lstrip())

          write('src/components/AdminGiftCodesSection.tsx', r'''import { type ChangeEvent, useCallback, useEffect, useRef, useState } from 'react';
          import {
            adminApi,
            createAdminRequestKey,
            type GiftRedemptionRecord,
          } from '../api/admin';
          import { GameApiError } from '../api/game';
          import { CurrencyAmount } from './ui/CurrencyAmount';
          import { IntegerInput, TextArea, TextInput } from './ui/FormControls';
          import {
            Button,
            EmptyState,
            Panel,
            StatusTag,
            WidgetHeading,
          } from './ui/layout';
          import { VirtualList } from './ui/VirtualList';
          import type { GiftCodeAdminRecord } from '../types';
          import { formatCurrency, formatDate, formatTime } from '../utils/formatters';
          import { parseIntegerDraft } from '../utils/integerDraft';

          function giftCodeKey(gift: GiftCodeAdminRecord) { return gift.id; }
          function redemptionKey(record: GiftRedemptionRecord) { return `${record.user_id}-${record.redeemed_at}`; }

          function downloadGiftCodes(codes: string[]) {
            if (codes.length === 0) return;
            const blob = new Blob([`${codes.join('\n')}\n`], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            link.href = url;
            link.download = `economy-gift-codes-${timestamp}.txt`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            window.setTimeout(() => URL.revokeObjectURL(url), 1_000);
          }

          export function AdminGiftCodesSection({
            active,
            refreshToken,
            onNotice,
            onError,
          }: {
            active: boolean;
            refreshToken: number;
            onNotice: (message: string) => void;
            onError: (message: string) => void;
          }) {
            const [giftCodes, setGiftCodes] = useState<GiftCodeAdminRecord[]>([]);
            const [giftCodeTotal, setGiftCodeTotal] = useState(0);
            const [giftCodeCursor, setGiftCodeCursor] = useState<string | null>(null);
            const [loadingMoreGiftCodes, setLoadingMoreGiftCodes] = useState(false);
            const [code, setCode] = useState('');
            const [giftCount, setGiftCount] = useState(1);
            const [giftCountInput, setGiftCountInput] = useState('1');
            const [rewardCredits, setRewardCredits] = useState(100);
            const [rewardCreditsInput, setRewardCreditsInput] = useState('100');
            const [maxRedemptions, setMaxRedemptions] = useState(100);
            const [maxRedemptionsInput, setMaxRedemptionsInput] = useState('100');
            const [expiresAt, setExpiresAt] = useState('');
            const [note, setNote] = useState('');
            const [createdCodes, setCreatedCodes] = useState<string[]>([]);
            const [creatingGift, setCreatingGift] = useState(false);
            const giftRequestKeyRef = useRef('');
            const [redemptions, setRedemptions] = useState<GiftRedemptionRecord[]>([]);
            const [redemptionTotal, setRedemptionTotal] = useState(0);
            const [redemptionCursor, setRedemptionCursor] = useState<string | null>(null);
            const [loadingMoreRedemptions, setLoadingMoreRedemptions] = useState(false);
            const [selectedGiftId, setSelectedGiftId] = useState<number | null>(null);

            const parsedGiftCount = parseIntegerDraft(giftCountInput, { min: 1, max: 50_000 });
            const parsedRewardCredits = parseIntegerDraft(rewardCreditsInput, { min: 1, max: 1_000_000 });
            const parsedMaxRedemptions = parseIntegerDraft(maxRedemptionsInput, { min: 1, max: 1_000_000 });
            const giftFormValid = parsedGiftCount !== null
              && parsedRewardCredits !== null
              && parsedMaxRedemptions !== null;

            const loadGiftCodes = useCallback(async () => {
              const nextCodesPage = await adminApi.giftCodes();
              setGiftCodes(nextCodesPage.items);
              setGiftCodeTotal(nextCodesPage.total);
              setGiftCodeCursor(nextCodesPage.nextCursor);
            }, []);

            useEffect(() => {
              if (!active) return;
              void loadGiftCodes().then(() => onError('')).catch((reason) => {
                onError(reason instanceof Error ? reason.message : '无法加载礼品码');
              });
            }, [active, loadGiftCodes, onError, refreshToken]);

            function resetGiftRequestKey() {
              giftRequestKeyRef.current = '';
            }

            function updateGiftCount(value: string) {
              resetGiftRequestKey();
              setGiftCountInput(value);
              const parsed = parseIntegerDraft(value, { min: 1, max: 50_000 });
              if (parsed !== null) setGiftCount(parsed);
            }

            function updateRewardCredits(value: string) {
              resetGiftRequestKey();
              setRewardCreditsInput(value);
              const parsed = parseIntegerDraft(value, { min: 1, max: 1_000_000 });
              if (parsed !== null) setRewardCredits(parsed);
            }

            function updateMaxRedemptions(value: string) {
              resetGiftRequestKey();
              setMaxRedemptionsInput(value);
              const parsed = parseIntegerDraft(value, { min: 1, max: 1_000_000 });
              if (parsed !== null) setMaxRedemptions(parsed);
            }

            async function createGift() {
              if (creatingGift) return;
              if (parsedGiftCount === null) {
                onNotice('生成数量必须为 1～50000');
                return;
              }
              if (parsedRewardCredits === null || parsedMaxRedemptions === null) {
                onNotice('奖励货币和每码最大兑换次数必须为 1～1000000 的整数');
                return;
              }

              const requestKey = giftRequestKeyRef.current || createAdminRequestKey();
              giftRequestKeyRef.current = requestKey;
              setCreatingGift(true);
              try {
                const payload = {
                  rewardCredits: parsedRewardCredits,
                  maxRedemptions: parsedMaxRedemptions,
                  expiresAt: expiresAt ? new Date(expiresAt).getTime() : null,
                  note,
                };
                const nextCodes = parsedGiftCount === 1
                  ? [(await adminApi.createGiftCode({ ...payload, code: code.trim() || undefined }, requestKey)).code]
                  : (await adminApi.createGiftCodeBatch({ ...payload, count: parsedGiftCount }, requestKey)).codes;
                giftRequestKeyRef.current = '';
                setCreatedCodes(nextCodes);
                setCode('');
                onNotice(`已创建 ${nextCodes.length} 个礼品码。明文仅保留在本次页面中，请立即下载 TXT。`);
                await loadGiftCodes();
              } catch (reason) {
                if (reason instanceof GameApiError) giftRequestKeyRef.current = '';
                onNotice(reason instanceof GameApiError
                  ? reason.message
                  : '请求连接中断；保持参数不变再次点击，会使用同一幂等键安全重试本批次。');
              } finally {
                setCreatingGift(false);
              }
            }

            async function disableGift(id: number) {
              try {
                await adminApi.disableGiftCode(id);
                onNotice(`礼品码 #${id} 已停用`);
                await loadGiftCodes();
              } catch (reason) {
                onNotice(reason instanceof Error ? reason.message : '停用礼品码失败');
              }
            }

            async function loadMoreGiftCodes() {
              if (!giftCodeCursor || loadingMoreGiftCodes) return;
              setLoadingMoreGiftCodes(true);
              try {
                const page = await adminApi.giftCodes(giftCodeCursor);
                setGiftCodes((current) => [...current, ...page.items]);
                setGiftCodeTotal(page.total);
                setGiftCodeCursor(page.nextCursor);
              } catch (reason) {
                onNotice(reason instanceof Error ? reason.message : '读取更多礼品码失败');
              } finally {
                setLoadingMoreGiftCodes(false);
              }
            }

            async function showRedemptions(id: number) {
              try {
                const page = await adminApi.redemptions(id);
                setSelectedGiftId(id);
                setRedemptions(page.items);
                setRedemptionTotal(page.total);
                setRedemptionCursor(page.nextCursor);
              } catch (reason) {
                onNotice(reason instanceof Error ? reason.message : '读取兑换记录失败');
              }
            }

            async function loadMoreRedemptions() {
              if (selectedGiftId === null || !redemptionCursor || loadingMoreRedemptions) return;
              setLoadingMoreRedemptions(true);
              try {
                const page = await adminApi.redemptions(selectedGiftId, redemptionCursor);
                setRedemptions((current) => [...current, ...page.items]);
                setRedemptionTotal(page.total);
                setRedemptionCursor(page.nextCursor);
              } catch (reason) {
                onNotice(reason instanceof Error ? reason.message : '读取更多兑换记录失败');
              } finally {
                setLoadingMoreRedemptions(false);
              }
            }

            return (
              <div className="admin-section-stack admin-gift-console">

name: Apply leaderboard gross sell volume

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - '.github/automation/apply-leaderboard-gross-sell-volume.mjs'
      - '.github/workflows/apply-leaderboard-gross-sell-volume.yml'

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply leaderboard changes
        run: node .github/automation/apply-leaderboard-gross-sell-volume.mjs

      - name: Build and test
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        run: npm run test:browser

      - name: Validate patch formatting
        run: git diff --check

      - name: Commit verified changes
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm .github/automation/apply-leaderboard-gross-sell-volume.mjs
          rm .github/workflows/apply-leaderboard-gross-sell-volume.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/PRODUCT_AND_GAMEPLAY_DESIGN.md server/src/leaderboards.js server/test/leaderboards.test.js scripts/verify-leaderboards.mjs src/leaderboardTypes.ts src/pages/LeaderboardPage.tsx .github
          git commit -m "交易榜改用实际卖出成交额并采用北京时间"
          git push origin "HEAD:${HEAD_BRANCH}"

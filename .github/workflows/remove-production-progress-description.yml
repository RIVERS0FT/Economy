name: Remove production progress description

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - progress-description-validation.log

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: remove-production-progress-description
  cancel-in-progress: true

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/remove-production-progress-description'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out change branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-production-progress-description
          fetch-depth: 0

      - name: Apply source, design, and verification changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, content):
              Path(path).write_text(content, encoding='utf-8')

          component_path = 'src/components/facilities/FacilityProductionFormula.tsx'
          component = read(component_path)
          component, count = re.subn(
              r'\n        <div className="facility-formula-summary">.*?\n        </div>',
              '',
              component,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('未找到唯一的生产进度条下方汇总区')
          write(component_path, component)

          css_path = 'src/styles/facility-production-formula.css'
          css = read(css_path)
          css = css.replace(
              '/* Factory production formula: recipe, cycle/cost metadata, progress, and cluster summary. */',
              '/* Factory production formula: recipe, cycle/cost metadata, and progress. */',
          )
          css = css.replace(
              '.facility-formula-input-group,\n.facility-formula-output-group,\n.facility-formula-summary-output {',
              '.facility-formula-input-group,\n.facility-formula-output-group {',
          )
          css = css.replace(
              '.facility-formula-output-group,\n.facility-formula-summary-output {',
              '.facility-formula-output-group {',
          )
          css = css.replace(
              '.facility-formula-output .facility-formula-item-group,\n.facility-formula-summary-output .facility-formula-item-group {',
              '.facility-formula-output .facility-formula-item-group {',
          )
          css = css.replace(
              '.facility-formula-inventory,\n.facility-formula-summary-cost,\n.facility-formula-meta-unit {',
              '.facility-formula-inventory,\n.facility-formula-meta-unit {',
          )
          css = css.replace(
              '.facility-formula-center .facility-formula-meta-unit:last-child,\n.facility-formula-summary-cost {',
              '.facility-formula-center .facility-formula-meta-unit:last-child {',
          )
          css, count = re.subn(
              r'\n\.facility-formula-summary \{.*?(?=\n@media \(min-width: 961px\))',
              '',
              css,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('未找到生产公式汇总样式区')
          css = re.sub(
              r'\n\s*\.facility-formula-summary \{\n\s*font-size: 0\.68rem;\n\s*\}',
              '',
              css,
              count=1,
          )
          write(css_path, css)

          industry_path = 'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md'
          industry = read(industry_path)
          old = '- 生产公式顶部和下方汇总中的输入、输出和运行成本都按 `participatingCount` 计算；周期保持配方周期。多输入、多输出必须逐项乘以参与数量；没有正在运行的参与数量时显示“当前无工厂参与生产”。'
          new = '- 生产公式顶部的输入、输出和运行成本都按 `participatingCount` 计算；周期保持配方周期。多输入、多输出必须逐项乘以参与数量。生产进度条是公式容器最后一个可见元素，进度条下方不得显示当前周期、恢复运行、产出、成本或其他说明文字。'
          if old not in industry:
              raise SystemExit('产业设计缺少旧的进度条下方汇总规则')
          industry = industry.replace(old, new)
          industry = industry.replace(
              '- 丢失多输入、多输出、逐输入库存、`+` 分隔或集群多输出汇总能力；',
              '- 丢失多输入、多输出、逐输入库存、`+` 分隔或按集群规模展示多输出的能力；\n- 在生产进度条下方恢复当前周期、恢复运行、产出、成本或其他可见说明文字；',
          )
          write(industry_path, industry)

          ui_path = 'docs/UI_DESIGN_SYSTEM.md'
          ui = read(ui_path)
          ui = ui.replace(
              '| `src/styles/facility-production-formula.css` | 工厂生产公式、多输入输出、周期成本图标、进度条和集群汇总布局 |',
              '| `src/styles/facility-production-formula.css` | 工厂生产公式、多输入输出、周期成本图标和进度条布局 |',
          )
          old = '- 生产公式下方使用紧凑单行或自动换行的集群汇总；多输出逐项显示，成本继续使用成本 SVG，不显示“成本”文字标签。'
          new = '- 生产进度条是生产公式容器最后一个可见元素；进度条下方不得显示当前周期、恢复运行、产出、成本或其他说明文字。完整生产语义只保留在公式容器的无障碍名称中。'
          if old not in ui:
              raise SystemExit('UI 设计缺少旧的进度条下方汇总规则')
          ui = ui.replace(old, new)
          ui = ui.replace(
              '- 破坏输入／中央信息／输出三列语义、`+` 分隔、逐输入库存、多输出或集群多输出汇总；',
              '- 破坏输入／中央信息／输出三列语义、`+` 分隔、逐输入库存或按集群规模展示多输出的能力；\n- 在生产进度条下方恢复当前周期、恢复运行、产出、成本或其他可见说明文字；',
          )
          write(ui_path, ui)

          verify_path = 'scripts/verify-facility-groups.mjs'
          verify = read(verify_path)
          verify = verify.replace("  'facility-formula-summary',\n", '')
          verify = verify.replace(
              "for (const forbidden of [\n  'facility-formula-arrow',",
              "for (const forbidden of [\n  'facility-formula-summary',\n  'facility-formula-arrow',",
          )
          verify = verify.replace(
              "  '当前无工厂参与生产',",
              "  '进度条下方不得显示当前周期、恢复运行、产出、成本或其他说明文字',",
          )
          verify = verify.replace(
              "  '生产进度条',\n  '完整文本无障碍描述',",
              "  '生产进度条',\n  '进度条下方不得显示当前周期、恢复运行、产出、成本或其他说明文字',\n  '完整文本无障碍描述',",
          )
          marker = "requireText('src/main.tsx', \"import './styles/facility-production-formula.css';\");"
          verify = verify.replace(
              marker,
              "forbidText('src/styles/facility-production-formula.css', '.facility-formula-summary');\n\n" + marker,
          )
          write(verify_path, verify)

          for verify_path in [
              'scripts/verify-page-content.mjs',
              'scripts/verify-warehouse-expansion.mjs',
          ]:
              verify = read(verify_path)
              verify = verify.replace("  'facility-formula-summary',\n", '')
              component_marker = "]) requireText('src/components/facilities/FacilityProductionFormula.tsx', text);"
              verify = verify.replace(
                  component_marker,
                  component_marker + "\nforbidText('src/components/facilities/FacilityProductionFormula.tsx', 'facility-formula-summary');",
                  1,
              )
              if verify_path.endswith('verify-warehouse-expansion.mjs'):
                  css_marker = "]) requireText('src/styles/facility-production-formula.css', text);"
                  verify = verify.replace(
                      css_marker,
                      css_marker + "\nforbidText('src/styles/facility-production-formula.css', '.facility-formula-summary');",
                      1,
                  )
              write(verify_path, verify)
          PY

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run complete build
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/progress-description-validation.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/progress-description-validation.log progress-description-validation.log
            git config user.name "RIVERSOFT automation"
            git config user.email "actions@users.noreply.github.com"
            git add progress-description-validation.log
            git commit -m "Record progress description validation failure"
            git push origin HEAD:agent/remove-production-progress-description
            exit "$status"
          fi

      - name: Commit validated change
        shell: bash
        run: |
          git config user.name "RIVERSOFT automation"
          git config user.email "actions@users.noreply.github.com"
          rm -f package-lock.json progress-description-validation.log
          git add src/components/facilities/FacilityProductionFormula.tsx \
            src/styles/facility-production-formula.css \
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            docs/UI_DESIGN_SYSTEM.md \
            scripts/verify-facility-groups.mjs \
            scripts/verify-page-content.mjs \
            scripts/verify-warehouse-expansion.mjs
          git add -u progress-description-validation.log
          git diff --cached --check
          git commit -m "Remove production progress descriptions"
          git fetch origin agent/remove-production-progress-description
          git rebase origin/agent/remove-production-progress-description
          git push origin HEAD:agent/remove-production-progress-description

name: Apply Deploy Failure Artifact Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'codex/deploy-failure-artifact'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/deploy-failure-artifact

      - name: Apply embedded patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/patch-deploy-failure-artifact.yml').read_text()
          start = "          python3 - <<'PY'\n"
          end = "\n          PY\n\n      - name: Validate targeted rules"
          script = workflow.split(start, 1)[1].split(end, 1)[0]
          exec(compile(dedent(script), 'embedded-deploy-log-patch.py', 'exec'))
          PY

      - name: Upload patched files
        uses: actions/upload-artifact@v7
        with:
          name: deploy-failure-artifact-patched-files-${{ github.run_id }}
          path: |
            .github/workflows/deploy.yml
            docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md
            scripts/verify-runtime-reliability.mjs
          if-no-files-found: error
          retention-days: 1
          compression-level: 9

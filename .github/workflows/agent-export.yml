name: Apply population five-state patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-population-five-state-patch
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/population-five-states' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/population-five-states
          fetch-depth: 0
      - name: Rebuild validated patch
        run: |
          cat .agent/population-five-states-*.b64 | base64 -d | gzip -d > /tmp/population-five-states.patch
          echo "29f095d2be8d4a642dd355a1ae7bec093653058d36dc2282b7fb8a2192f8b1cc  /tmp/population-five-states.patch" | sha256sum -c -
      - name: Apply implementation
        run: |
          cat > .github/workflows/agent-export.yml <<'WORKFLOW'
          name: Agent repository export

          on:
            pull_request:
              branches: [main]

          permissions:
            contents: read

          jobs:
            export:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Create repository archive
                  run: zip -qr economy-repo.zip . -x '.git/*'
                - uses: actions/upload-artifact@v4
                  with:
                    name: economy-repo
                    path: economy-repo.zip
                    retention-days: 1
          WORKFLOW
          sed -i 's/^          //' .github/workflows/agent-export.yml
          git add .github/workflows/agent-export.yml
          git apply --index /tmp/population-five-states.patch
          rm -rf .agent
          git checkout HEAD -- .github/workflows/agent-export.yml
          git add -A
          git diff --cached --check
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "implement population five-state budgets"
          git push origin HEAD:agent/population-five-states

name: Fix Server Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/population-demand-price-transmission
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Align migration and version tests
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const replacements = {
            'server/test/asset-events.test.js': [
              ["client state version 13 excludes", "client state version 14 excludes"],
              ["assert.equal(state.version, 13);", "assert.equal(state.version, 14);"],
            ],
            'server/test/warehouse.test.js': [
              ["warehouse state defaults to level 1 and client version 13", "warehouse state defaults to level 1 and client version 14"],
              ["assert.equal(state.version, 13);", "assert.equal(state.version, 14);"],
            ],
            'server/test/domain.test.js': [
              ["id: 'legacy-order', side: 'buy', ownerType: 'market', ownerName: '市场',", "id: 'legacy-order', side: 'sell', ownerType: 'player', ownerId: 1, ownerName: 'Alice',"],
            ],
          };
          for (const [path, changes] of Object.entries(replacements)) {
            let source = fs.readFileSync(path, 'utf8');
            for (const [from, to] of changes) {
              if (!source.includes(from)) throw new Error(`${path} missing ${from}`);
              source = source.replace(from, to);
            }
            fs.writeFileSync(path, source);
          }
          NODE
      - name: Run server tests
        run: npm run server:test
      - name: Commit test updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/test/asset-events.test.js server/test/warehouse.test.js server/test/domain.test.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "同步版本 14 与订单迁移测试"
          git push origin HEAD:agent/population-demand-price-transmission

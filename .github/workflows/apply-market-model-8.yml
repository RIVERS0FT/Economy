name: Apply Market Model 8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply model 8 changes
        shell: bash
        run: |
          set -o pipefail
          rm -f .model8-error.log .model8-build-error.log
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-market-model-8.mjs')
          text = path.read_text()
          old = """insertAfterRequired(
            'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
            '> 市场需求模型版本：8\\n',
          """
          new = """insertAfterRequired(
            'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
            '> 世界状态版本：14\\n',
          """
          if old not in text:
              raise SystemExit('missing server design insertion block')
          text = text.replace(old, new)
          text = text.replace(
              '就业收入预算继续按 70% 直接需求／30% 派生流动性分配。',
              '就业收入预算继续保持 70% 用于最终消费的直接需求，30% 用于沿正式配方反向推导的派生流动性。',
          )
          text = text.replace('人口消费成交本身不发行普通货币。', '人口消费成交不再发行普通货币。')
          path.write_text(text)
          PY
          node scripts/apply-market-model-8.mjs 2>&1 | tee /tmp/model8-apply.log
      - name: Preserve applicator error
        if: failure()
        run: |
          cp /tmp/model8-apply.log .model8-error.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .model8-error.log
          git commit -m "记录模型 8 应用错误"
          git push origin HEAD:agent/deflation-stabilizer-model-8
      - name: Remove temporary applicator
        run: rm scripts/apply-market-model-8.mjs .github/workflows/apply-market-model-8.yml
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/model8-build.log
      - name: Preserve build error
        if: failure()
        run: |
          cp /tmp/model8-build.log .model8-build-error.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .model8-build-error.log
          git commit -m "记录模型 8 构建错误"
          git push origin HEAD:agent/deflation-stabilizer-model-8
      - name: Commit verified changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "稳定市场需求模型"
          git push origin HEAD:agent/deflation-stabilizer-model-8

name: Apply Market Model 8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply model 8 changes
        run: node scripts/apply-market-model-8.mjs
      - name: Remove temporary applicator
        run: rm scripts/apply-market-model-8.mjs .github/workflows/apply-market-model-8.yml
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "稳定市场需求模型"
          git push origin HEAD:agent/deflation-stabilizer-model-8

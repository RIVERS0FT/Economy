name: Apply Market Model 8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply model 8 changes
        shell: bash
        run: |
          set -o pipefail
          rm -f .model8-error.log
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-market-model-8.mjs')
          text = path.read_text()
          old = """insertAfterRequired(
            'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
            '> 市场需求模型版本：8\\n',
          """
          new = """insertAfterRequired(
            'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
            '> 世界状态版本：14\\n',
          """
          if old not in text:
              raise SystemExit('missing server design insertion block')
          path.write_text(text.replace(old, new))
          PY
          node scripts/apply-market-model-8.mjs 2>&1 | tee /tmp/model8-apply.log
      - name: Preserve applicator error
        if: failure()
        run: |
          cp /tmp/model8-apply.log .model8-error.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .model8-error.log
          git commit -m "记录模型 8 应用错误"
          git push origin HEAD:agent/deflation-stabilizer-model-8
      - name: Remove temporary applicator
        run: rm scripts/apply-market-model-8.mjs .github/workflows/apply-market-model-8.yml
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "稳定市场需求模型"
          git push origin HEAD:agent/deflation-stabilizer-model-8

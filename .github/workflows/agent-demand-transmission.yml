name: Agent Demand Transmission

on:
  push:
    branches:
      - agent/population-demand-price-transmission
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[agent-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/population-demand-price-transmission
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Reconstruct and apply change
        run: |
          cat scripts/.demand-part-* | base64 --decode | gzip --decompress > scripts/apply-demand-transmission-change.mjs
          node --check scripts/apply-demand-transmission-change.mjs
          node scripts/apply-demand-transmission-change.mjs

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify full build
        run: npm run build

      - name: Commit generated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "实施人口需求双向价格传导 [agent-applied]"
          git push origin HEAD:agent/population-demand-price-transmission

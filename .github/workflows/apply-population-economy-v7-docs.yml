name: Apply population economy V7 docs

on:
  push:
    branches:
      - codex/population-economy-v7
    paths:
      - scripts/apply-population-economy-v7-docs.py
      - .github/workflows/apply-population-economy-v7-docs.yml

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[apply-population-docs]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
      - name: Apply authoritative documentation patch
        run: python3 scripts/apply-population-economy-v7-docs.py
      - name: Commit documentation and guards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: define population employment and funded demand model"
          git push origin HEAD:codex/population-economy-v7

name: Commit compact factory profit patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'codex/compact-factory-profit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply embedded patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-compact-factory-profit.yml').read_text()
          marker = "          python3 <<'PY'\n"
          block = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          source = '\n'.join(line[10:] if line.startswith('          ') else line for line in block.splitlines())
          exec(compile(source, 'compact-factory-profit-patch.py', 'exec'))
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/facilities/FacilityRecipeProfitAnalysis.tsx \
            src/styles/facility-recipe-profit-analysis.css \
            src/styles/production-surface.css \
            src/styles/facility-detail-sheet.css \
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            scripts/verify-recipe-profit-analysis.mjs \
            scripts/verify-unified-factory-recipes-grid.mjs
          git commit -m "压缩工厂详情利润与顶部布局"
          git push origin HEAD:${{ github.head_ref }}

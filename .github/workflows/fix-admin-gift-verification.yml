name: Fix admin gift verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Move gift list verification to its section
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-market-assets.mjs')
          content = path.read_text(encoding='utf-8')
          old_files = "  'src/pages/MarketPage.tsx','src/pages/ProductionPage.tsx','src/pages/SettingsPage.tsx','src/app/AdminApp.tsx',"
          new_files = "  'src/pages/MarketPage.tsx','src/pages/ProductionPage.tsx','src/pages/SettingsPage.tsx','src/app/AdminApp.tsx','src/components/AdminGiftCodesSection.tsx',"
          if old_files not in content:
              raise RuntimeError('market asset file registry source missing')
          content = content.replace(old_files, new_files, 1)
          old_checks = "for (const text of [\n  'items={giftCodes}','items={redemptions}',\n  'admin-gifts-virtual-table','admin-redemptions-virtual-table',\n]) requireText('src/app/AdminApp.tsx', text);\nfor (const text of ['giftCodes.map(','redemptions.map(','collectibles','ownership']) forbidText('src/app/AdminApp.tsx', text);"
          new_checks = "for (const text of [\n  'items={giftCodes}','items={redemptions}',\n  'admin-gifts-virtual-table','admin-redemptions-virtual-table',\n]) requireText('src/components/AdminGiftCodesSection.tsx', text);\nfor (const text of ['giftCodes.map(','redemptions.map(']) forbidText('src/components/AdminGiftCodesSection.tsx', text);\nfor (const text of ['collectibles','ownership']) forbidText('src/app/AdminApp.tsx', text);"
          if old_checks not in content:
              raise RuntimeError('market asset gift verification source missing')
          path.write_text(content.replace(old_checks, new_checks, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/fix-admin-gift-verification.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "同步礼品分区市场验证"
          git push origin "HEAD:${HEAD_REF}"

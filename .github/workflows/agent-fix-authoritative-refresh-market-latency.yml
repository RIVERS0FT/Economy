name: Apply authoritative refresh and market latency fixes

on:
  push:
    branches:
      - agent/fix-authoritative-refresh-market-latency

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply coordinated fixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label, flags=re.S):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one regex match, found {count}')
              return updated

          # Client API: bounded requests and an HTTP Date based server clock.
          path = 'src/api/game.ts'
          text = read(path)
          text = replace_once(text,
              "const GAME_API_BASE = '/economy-api/game';\nconst stateDeliveryCache = createStateDeliveryCache();",
              "const GAME_API_BASE = '/economy-api/game';\nconst stateDeliveryCache = createStateDeliveryCache();\nconst DEFAULT_READ_TIMEOUT_MS = 8_000;\nconst DEFAULT_WRITE_TIMEOUT_MS = 12_000;",
              'game api timeout constants')
          text = replace_once(text,
              'export interface GameStatePollResponse extends StateDeliveryEnvelope { state?: EconomyState; }',
              'export interface GameStatePollResponse extends StateDeliveryEnvelope { state?: EconomyState; serverTime?: number; }',
              'game state server time type')
          text = replace_once(text,
              "export class GameApiError extends Error {\n  status: number;\n  constructor(status: number, message: string) {\n    super(message);\n    this.name = 'GameApiError';\n    this.status = status;\n  }\n}\n",
              "export class GameApiError extends Error {\n  status: number;\n  constructor(status: number, message: string) {\n    super(message);\n    this.name = 'GameApiError';\n    this.status = status;\n  }\n}\n\nfunction createTimedSignal(source: AbortSignal | null | undefined, timeoutMs: number) {\n  const controller = new AbortController();\n  let timedOut = false;\n  const forwardAbort = () => controller.abort();\n  if (source?.aborted) controller.abort();\n  else source?.addEventListener('abort', forwardAbort, { once: true });\n  const timer = globalThis.setTimeout(() => {\n    timedOut = true;\n    controller.abort();\n  }, timeoutMs);\n  return {\n    signal: controller.signal,\n    didTimeout: () => timedOut,\n    cleanup: () => {\n      globalThis.clearTimeout(timer);\n      source?.removeEventListener('abort', forwardAbort);\n    },\n  };\n}\n",
              'game api timed signal helper')
          text = regex_once(text,
              r"async function request<T>\(path: string, init\?: RequestInit\): Promise<T> \{.*?\n\}\n\nfunction postAction",
              """async function request<T>(path: string, init?: RequestInit): Promise<T> {
  const headers = new Headers(init?.headers);
  if (init?.body) headers.set('Content-Type', 'application/json');
  if (init?.method && init.method !== 'GET') headers.set('Idempotency-Key', createRequestKey());
  const timeoutMs = init?.method && init.method !== 'GET' ? DEFAULT_WRITE_TIMEOUT_MS : DEFAULT_READ_TIMEOUT_MS;
  const timedSignal = createTimedSignal(init?.signal, timeoutMs);
  try {
    const response = await fetch(`${GAME_API_BASE}${path}`, {
      ...init,
      credentials: 'include',
      headers,
      signal: timedSignal.signal,
    });
    if (!response.ok) {
      let message = '游戏服务器请求失败';
      try {
        const payload = (await response.json()) as { message?: string };
        if (payload.message) message = payload.message;
      } catch { /* preserve generic message */ }
      throw new GameApiError(response.status, message);
    }
    const payload = await response.json() as unknown;
    if (!isStateDeliveryPayload(payload)) return payload as T;
    const accepted = stateDeliveryCache.accept(payload);
    const serverTime = Date.parse(response.headers.get('Date') || '');
    return {
      ...accepted,
      ...(Number.isFinite(serverTime) ? { serverTime } : {}),
    } as T;
  } catch (reason) {
    if (timedSignal.didTimeout() && reason instanceof Error && reason.name === 'AbortError') {
      throw new GameApiError(408, '游戏服务器响应超时，请稍后重试');
    }
    throw reason;
  } finally {
    timedSignal.cleanup();
  }
}

function postAction""",
              'game api request implementation')
          write(path, text)

          # View model: cancellable refresh modes, server clock, and market submission phases.
          path = 'src/app/gameViewModel.ts'
          text = read(path)
          text = replace_once(text,
              'export type ActionResult = GameActionResult;\n',
              "export type ActionResult = GameActionResult;\nexport type RefreshMode = 'normal' | 'authoritative';\nexport interface RefreshOptions { mode?: RefreshMode; expectedDeadline?: number; }\nexport type OrderSubmissionPhase = 'idle' | 'submitting' | 'syncing';\n\ninterface RefreshTask {\n  controller: AbortController;\n  startedAt: number;\n  mode: RefreshMode;\n  expectedDeadline?: number;\n  promise: Promise<void>;\n}\n",
              'view model coordination types')
          text = replace_once(text,
              "  isWorking: boolean;\n  inventoryUsed: number;",
              "  isWorking: boolean;\n  orderSubmissionPhase: OrderSubmissionPhase;\n  inventoryUsed: number;",
              'view model order phase field')
          text = replace_once(text,
              "  notify: (message: string) => void;\n  refresh: () => Promise<void>;",
              "  notify: (message: string) => void;\n  estimatedServerNow: () => number;\n  refresh: (options?: RefreshOptions) => Promise<void>;",
              'view model refresh signature')
          text = replace_once(text,
              "  const [isWorking, setIsWorking] = useState(false);\n  const refreshing = useRef(false);\n  const revisionRef = useRef<number | null>(null);\n  const refreshAbortRef = useRef<AbortController | null>(null);\n  const actionsInFlightRef = useRef(0);\n  const workPendingRef = useRef(false);\n  const noticeTimerRef = useRef<number | null>(null);",
              "  const [isWorking, setIsWorking] = useState(false);\n  const [orderSubmissionPhase, setOrderSubmissionPhase] = useState<OrderSubmissionPhase>('idle');\n  const revisionRef = useRef<number | null>(null);\n  const refreshTaskRef = useRef<RefreshTask | null>(null);\n  const serverClockRef = useRef<{ serverTime: number; receivedAt: number } | null>(null);\n  const actionsInFlightRef = useRef(0);\n  const workPendingRef = useRef(false);\n  const orderPendingRef = useRef(false);\n  const noticeTimerRef = useRef<number | null>(null);",
              'view model refs')
          text = regex_once(text,
              r"  const acceptVersionedState = useCallback\(\(\n    incomingRevision: number \| undefined,\n    state: EconomyState \| undefined,\n    action: LocalActivityAction,\n    message\?: string,\n  \) => \{.*?\n  \}, \[acceptState\]\);",
              """  const acceptVersionedState = useCallback((
    incomingRevision: number | undefined,
    state: EconomyState | undefined,
    action: LocalActivityAction,
    message?: string,
    serverTime?: number,
  ) => {
    const currentRevision = revisionRef.current;
    if (!canAcceptRevision(currentRevision, incomingRevision)) return false;
    if (typeof incomingRevision === 'number' && Number.isInteger(incomingRevision)) {
      revisionRef.current = incomingRevision;
    }
    if (Number.isFinite(serverTime)) {
      serverClockRef.current = { serverTime: Number(serverTime), receivedAt: Date.now() };
    }
    if (state) acceptState(state, action, message);
    return true;
  }, [acceptState]);""",
              'view model state acceptance')
          text = regex_once(text,
              r"  const refresh = useCallback\(async \(\) => \{.*?\n  \}, \[acceptVersionedState, handleUnauthorized\]\);",
              """  const refresh = useCallback((options: RefreshOptions = {}) => {
    const mode = options.mode ?? 'normal';
    if (mode === 'normal' && actionsInFlightRef.current > 0) return Promise.resolve();

    const existing = refreshTaskRef.current;
    if (existing) {
      const age = Date.now() - existing.startedAt;
      if (mode === 'normal' || (existing.mode === 'authoritative' && age < 8_000)) {
        return existing.promise;
      }
      existing.controller.abort();
    }

    const controller = new AbortController();
    const promise = (async () => {
      try {
        const response = await getGameState(revisionRef.current, controller.signal);
        if (mode === 'normal' && actionsInFlightRef.current > 0) return;
        acceptVersionedState(response.revision, response.state, 'refresh', undefined, response.serverTime);
        setLoadError('');
      } catch (reason) {
        if (reason instanceof Error && reason.name === 'AbortError') return;
        if (reason instanceof GameApiError && reason.status === 401) { handleUnauthorized(); return; }
        setLoadError(messageFromError(reason));
      } finally {
        if (refreshTaskRef.current?.controller === controller) refreshTaskRef.current = null;
      }
    })();
    refreshTaskRef.current = {
      controller,
      startedAt: Date.now(),
      mode,
      expectedDeadline: options.expectedDeadline,
      promise,
    };
    return promise;
  }, [acceptVersionedState, handleUnauthorized]);""",
              'view model refresh implementation')
          text = replace_once(text,
              "    refreshAbortRef.current?.abort();\n    refreshAbortRef.current = null;\n    refreshing.current = false;\n    revisionRef.current = null;",
              "    refreshTaskRef.current?.controller.abort();\n    refreshTaskRef.current = null;\n    serverClockRef.current = null;\n    revisionRef.current = null;",
              'view model reset effect')
          text = replace_once(text,
              "    refreshAbortRef.current?.abort();\n    if (noticeTimerRef.current !== null) window.clearTimeout(noticeTimerRef.current);",
              "    refreshTaskRef.current?.controller.abort();\n    if (noticeTimerRef.current !== null) window.clearTimeout(noticeTimerRef.current);",
              'view model cleanup effect')
          text = regex_once(text,
              r"  const runAction = useCallback\(async \(action: LocalActivityAction, operation: \(\) => Promise<GameActionResponse>\): Promise<ActionResult> => \{.*?\n  async function showResult\(actionResult: ActionResult \| Promise<ActionResult>\) \{ notify\(\(await actionResult\)\.message\); \}",
              """  const notify = useCallback((message: string) => {
    if (noticeTimerRef.current !== null) window.clearTimeout(noticeTimerRef.current);
    setNotice(message);
    noticeTimerRef.current = window.setTimeout(() => {
      noticeTimerRef.current = null;
      setNotice('');
    }, 3_000);
  }, []);

  const estimatedServerNow = useCallback(() => {
    const clock = serverClockRef.current;
    if (clock) return clock.serverTime + Math.max(0, Date.now() - clock.receivedAt);
    return game?.lastProcessedAt ?? Date.now();
  }, [game?.lastProcessedAt]);

  const syncConfirmedAction = useCallback(async (
    response: GameActionResponse,
    action: LocalActivityAction,
  ) => {
    try {
      const stateResponse = await getGameState(revisionRef.current);
      if (stateResponse.revision < response.revision) {
        throw new Error('服务器状态同步落后于已确认操作');
      }
      acceptVersionedState(
        stateResponse.revision,
        stateResponse.state,
        action,
        response.result.message,
        stateResponse.serverTime,
      );
      setLoadError('');
    } catch (syncReason) {
      if (syncReason instanceof GameApiError && syncReason.status === 401) handleUnauthorized();
      else setLoadError(`操作已完成，但状态同步失败：${messageFromError(syncReason)}`);
    }
  }, [acceptVersionedState, handleUnauthorized]);

  const runAction = useCallback(async (action: LocalActivityAction, operation: () => Promise<GameActionResponse>): Promise<ActionResult> => {
    if (action === 'work' && workPendingRef.current) {
      return { ok: false, message: '工作正在处理中' };
    }
    actionsInFlightRef.current += 1;
    refreshTaskRef.current?.controller.abort();
    if (action === 'work') {
      workPendingRef.current = true;
      setIsWorking(true);
    }
    try {
      const response = await operation();
      await syncConfirmedAction(response, action);
      return response.result;
    } catch (reason) {
      if (reason instanceof GameApiError && reason.status === 401) handleUnauthorized();
      return { ok: false, message: messageFromError(reason) };
    } finally {
      actionsInFlightRef.current = Math.max(0, actionsInFlightRef.current - 1);
      if (action === 'work') {
        workPendingRef.current = false;
        setIsWorking(false);
      }
    }
  }, [handleUnauthorized, syncConfirmedAction]);

  const submitAssetOrder = useCallback(async (
    assetKind: AssetKind,
    assetId: string,
    side: OrderSide,
    quantity: number,
    price: number,
  ): Promise<ActionResult> => {
    if (orderPendingRef.current) return { ok: false, message: '市场订单正在处理中' };
    orderPendingRef.current = true;
    actionsInFlightRef.current += 1;
    refreshTaskRef.current?.controller.abort();
    setOrderSubmissionPhase('submitting');
    try {
      const response = await gameActions.placeAssetOrder(assetKind, assetId, side, quantity, price);
      notify(response.result.message);
      setOrderSubmissionPhase('syncing');
      await syncConfirmedAction(response, 'placeOrder');
      return response.result;
    } catch (reason) {
      if (reason instanceof GameApiError && reason.status === 401) handleUnauthorized();
      const failure = { ok: false, message: messageFromError(reason) };
      notify(failure.message);
      return failure;
    } finally {
      actionsInFlightRef.current = Math.max(0, actionsInFlightRef.current - 1);
      orderPendingRef.current = false;
      setOrderSubmissionPhase('idle');
    }
  }, [handleUnauthorized, notify, syncConfirmedAction]);

  const derived = useMemo(() => (game ? deriveGameData(game) : null), [game]);
  async function showResult(actionResult: ActionResult | Promise<ActionResult>) { notify((await actionResult).message); }""",
              'view model action coordination')
          # Remove the old derived/notify block left immediately after the replacement if present.
          text = text.replace("\n\n  const derived = useMemo(() => (game ? deriveGameData(game) : null), [game]);\n  function notify(message: string) {\n    if (noticeTimerRef.current !== null) window.clearTimeout(noticeTimerRef.current);\n    setNotice(message);\n    noticeTimerRef.current = window.setTimeout(() => {\n      noticeTimerRef.current = null;\n      setNotice('');\n    }, 3_000);\n  }", "", 1)
          text = replace_once(text,

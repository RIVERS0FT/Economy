              """export function createCommodityOrder(world, userId, payload, now) {
  const player = getPlayer(world, userId);
  const side = payload.side === 'buy' ? 'buy' : payload.side === 'sell' ? 'sell' : null;
  const productId = PRODUCTS.has(String(payload.productId || 'wheat')) ? String(payload.productId || 'wheat') : null;
  const quantity = normalizePositiveInteger(payload.quantity, ECONOMY_CONSTANTS.maxOrderQuantity);
  const price = normalizePositiveInteger(payload.price, 1_000_000);
  const reject = (message) => ({ result: result(false, message), order: null });
  if (!side || !productId || !quantity || !price) return reject('订单参数无效');
  const openOrders = world.orders.filter((order) => order.ownerId === userId && isOpenOrder(order));
  if (openOrders.length >= ECONOMY_CONSTANTS.maxOpenOrders) return reject('未完成订单数量已达上限');

  if (side === 'buy') {
    const total = quantity * price;
    if (player.credits < total) return reject('可用资金不足');
    const capacity = player.inventoryCapacity - inventoryUsed(player) - pendingBuyQuantity(world, userId);
    if (capacity < quantity) return reject('仓库容量不足');
    player.credits -= total;
    player.frozenCredits += total;
  } else {
    const inventory = inventoryFor(player, productId);
    if (inventory.available < quantity) return reject('可用商品库存不足');
    inventory.available -= quantity;
    inventory.frozen += quantity;
  }

  const order = {
    id: createId('order'),
    productId,
    side,
    ownerType: 'player',
    ownerId: userId,
    ownerName: player.playerName,
    price,
    quantity,
    remaining: quantity,
    status: 'open',
    createdAt: now,
  };
  world.orders.push(order);
  return { result: result(true, '订单已创建'), order };
}

function placeOrder(world, userId, payload, now) {
  const prepared = createCommodityOrder(world, userId, payload, now);
  if (!prepared.result.ok || !prepared.order) return prepared.result;
  matchOrder(world, prepared.order, now);
  return result(true, prepared.order.status === 'filled' ? '订单已全部成交' : prepared.order.status === 'partial' ? '订单已部分成交' : '订单已进入订单簿');
}

function cancelOrder""",
              'domain core commodity preparation')
          text = regex_once(text,

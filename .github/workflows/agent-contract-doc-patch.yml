name: Agent contract documentation patch

on:
  push:
    branches:
      - agent/production-contracts
    paths:
      - .github/workflows/agent-contract-doc-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Synchronize contract rules
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace(path, old, new, *, required=True):
              text = read(path)
              if old not in text:
                  if required:
                      raise SystemExit(f'{path}: missing replacement anchor: {old[:100]!r}')
                  return
              write(path, text.replace(old, new))

          def insert_before(path, anchor, addition):
              text = read(path)
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise SystemExit(f'{path}: missing insertion anchor: {anchor!r}')
              write(path, text.replace(anchor, addition + '\n\n' + anchor, 1))

          def append_once(path, marker, addition):
              text = read(path)
              if marker in text:
                  return
              write(path, text.rstrip() + '\n\n' + addition.strip() + '\n')

          replace('src/types.ts', '  version: 17;', '  version: 16;')
          replace(
              'src/app/stateDelivery.d.ts',
              "export type StatePartitionName = 'catalog' | 'player' | 'market' | 'auction' | 'leaderboard';",
              "export type StatePartitionName = 'catalog' | 'player' | 'market' | 'auction' | 'contract' | 'leaderboard';",
          )

          replace(
              'README.md',
              'Economy 是一款网页端多人在线经济模拟、产业经营、统一资产交易与藏品／商品／工厂单项或捆绑竞价拍卖游戏。',
              'Economy 是一款网页端多人在线经济模拟、产业经营、统一资产交易、长期生产合作合同与藏品／商品／工厂单项或捆绑竞价拍卖游戏。',
          )
          replace(
              'README.md',
              '→ 通过不可拆分资产包拍卖交易藏品、商品和工厂\n→ 邀请新玩家获得独立宝石',
              '→ 通过不可拆分资产包拍卖交易藏品、商品和工厂\n→ 与其他玩家签订长期周期供货合同，稳定上下游生产合作\n→ 邀请新玩家获得独立宝石',
          )
          replace(
              'README.md',
              '游戏状态使用全局世界修订号排序，并按目录、玩家、市场、拍卖、排行榜五个分区增量同步。首次进入返回五个完整分区；后续请求同时提交全局修订号与各分区内容哈希，只返回哈希变化的分区。',
              '游戏状态使用全局世界修订号排序，并按目录、玩家、市场、拍卖、合同、排行榜六个分区增量同步。首次进入返回六个完整分区；后续请求同时提交全局修订号与各分区内容哈希，只返回哈希变化的分区。',
          )
          replace(
              'README.md',
              '概览｜市场｜生产｜资产｜藏品｜拍卖｜排行｜商店｜设置',
              '概览｜市场｜生产｜资产｜藏品｜拍卖｜合同｜排行｜商店｜设置',
          )
          replace(
              'README.md',
              '- 拍卖：使用资产包编辑器组合藏品、商品和工厂，整包竞价、取消无出价拍卖并查看自动结算结果。\n- 排行：服务器总资产排行榜。',
              '- 拍卖：使用资产包编辑器组合藏品、商品和工厂，整包竞价、取消无出价拍卖并查看自动结算结果。\n- 合同：发布、承接和管理商品与普通货币之间的长期周期供货合同；默认展示进行中的合同。\n- 排行：服务器总资产排行榜。',
          )
          insert_before(
              'README.md',
              '- 藏品目前不计入商品／工厂估值和总资产排行榜，避免没有公开买盘时产生任意估值。',
              '- 长期生产合作合同只涉及商品与普通货币，不涉及藏品、工厂转移、工厂出租或配方控制。合同按周期冻结供应方商品和采购方货款，到期在服务器事务中原子交付；保证金、宽限期和违约赔偿由服务器判定。合同交付不写入统一订单簿行情、商品估值或交易榜，但按卖方累计合同货款收取 1% 市场服务费。',
          )

          page = 'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md'
          replace(page, '> 更新时间：2026-07-22', '> 更新时间：2026-07-24')
          replace(page, '概览｜市场｜生产｜资产｜藏品｜拍卖｜排行｜商店｜设置', '概览｜市场｜生产｜资产｜藏品｜拍卖｜合同｜排行｜商店｜设置')
          replace(
              page,
              '| 拍卖 | `auction` | `AuctionPage` | 藏品、商品与工厂竞价拍卖与结算结果 |\n| 排行 |',
              '| 拍卖 | `auction` | `AuctionPage` | 藏品、商品与工厂竞价拍卖与结算结果 |\n| 合同 | `contracts` | `ContractPage` | 长期商品供货合同的发布、承接、履约与历史 |\n| 排行 |',
          )
          replace(page, '移动底部导航允许横向滚动，九个页面不得', '移动底部导航允许横向滚动，十个页面不得')
          replace(page, '目录、玩家、市场、拍卖和排行榜五个状态分区', '目录、玩家、市场、拍卖、合同和排行榜六个状态分区')
          replace(page, '首次加载合并五个完整分区', '首次加载合并六个完整分区')
          replace(page, '管理员入口、游戏入口和九个页面按需拆包', '管理员入口、游戏入口和十个页面按需拆包')
          replace(page, '五个分区均未变化', '六个分区均未变化')
          replace(page, '## 9. 排行', '## 10. 排行')
          replace(page, '## 10. 商店', '## 11. 商店')
          replace(page, '## 11. 设置与基础教程', '## 12. 设置与基础教程')
          replace(page, '### 11.1 客户端本轮教程', '### 12.1 客户端本轮教程')
          replace(page, '## 12. 商品与工厂目录扩展规则', '## 13. 商品与工厂目录扩展规则')
          replace(page, '## 13. 模块唯一归属', '## 14. 模块唯一归属')
          replace(page, '## 14. 防回退', '## 15. 防回退')
          insert_before(
              page,
              '## 10. 排行',
              '''## 9. 合同

合同页使用路由 ID `contracts` 和 `ContractPage`，唯一职责是长期商品供货合作。页面内部标签固定为“进行中的合同／合同广场／待处理／合同历史”，默认进入“进行中的合同”；右上角提供“发布合同”。顶部摘要只显示有效合同、待处理、未来 24 小时交付和当前玩家公开合同，不重复资产与市场统计。

合同只允许商品与普通货币，不得出现藏品、工厂所有权、工厂出租、指定工厂实例或对方配方控制。发布方向分为长期采购和长期供应；条款包含商品、每批数量、单位价格、交付周期、总批次和首次交付延迟。标题由服务器生成，不提供自由文本。

进行中合同卡必须显示玩家角色、合作方、每批商品、单价、每批货款、已完成批次、下次交付、供应方托管商品和采购方托管货款。异常必须显示明确文字：商品不足、货款不足、仓库空间不足、宽限期或批次后结束申请；颜色不得作为唯一状态表达。供应方可手动或自动准备商品，采购方可手动或自动补充货款。

合同承接时采购方冻结首批货款和单批货款 20% 保证金，供应方冻结同额保证金。到期时服务器原子转移商品和扣除货款；任一步失败不得部分交付。条件不足进入宽限期，宽限结束后由责任方保证金赔付对方。申请结束在当前批次成功后生效；立即终止由发起方承担违约。

合同不会绑定或拆分工厂集群。页面可以根据当前正式配方提供数量参考，但不得把估算写入权威条款。合同交付不更新订单簿最近成交价、价格曲线、估值或交易榜。''',
          )
          replace(
              page,
              '| 藏品发售、竞价和结算结果 | 拍卖 |\n| 总资产排名 |',
              '| 藏品发售、竞价和结算结果 | 拍卖 |\n| 长期商品供货合同、批次履约、保证金和违约 | 合同 |\n| 总资产排名 |',
          )
          append_once(
              page,
              '不得把合同交付写入订单簿行情',
              '''- 不得把合同交付写入订单簿行情、估值或交易榜；
- 不得在合同中加入藏品、工厂转移、工厂出租或自由文本；
- 不得让合同页面默认进入合同广场而隐藏进行中的合同；
- 不得由客户端倒计时直接结算、违约或转移保证金。''',
          )

          append_once(
              'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md',
              '## 10. 长期生产合作合同',
              '''## 10. 长期生产合作合同

长期合同约束周期性交付结果，不出租工厂、不绑定单座工厂，也不允许对方控制工厂集群、运行意图或配方。同类型工厂继续保持单一集群和单一当前配方；合同只能从玩家共享仓库的可用商品中准备本批托管数量。

服务器世界处理顺序固定为先结算已到期生产周期，再执行合同自动准备与到期交付。因此交付时间点刚完成的产出可以用于本批合同。供应方自动准备只能把现有可用库存移动到冻结库存，不能透支未来产量；采购方自动补款只能把现有可用资金移动到冻结资金。

每批合同结算与生产周期一样必须原子执行：同时检查供应方冻结商品、采购方冻结货款和采购方仓库空间，然后一次性转移商品、扣除货款、支付扣费后收入并推进批次。任一条件不足不得部分扣料、部分付款或部分交付。合同不改变 `activeRecipeId`、`pendingRecipeId`、`participatingCount` 或 `cycleStartedAt`。

合同商品冻结计入共享仓库已用容量；合同采购方的下一批承诺数量参与仓库预占，避免到期时挤占无法交付。合同商品不能与卖单、拍卖或另一份合同重复使用。''',
          )

          append_once(
              'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
              '## 长期生产合同运行规则',
              '''## 长期生产合同运行规则

`server/src/contracts.js` 是长期商品供货合同的唯一服务端领域模块，负责发布、承接、托管、自动准备、周期结算、宽限期、保证金赔付和客户端裁剪。合同动作通过现有幂等动作事务执行，响应继续固定为 `{ result: { ok, message }, revision }`。

正式状态分区扩展为 `catalog`、`player`、`market`、`auction`、`contract`、`leaderboard`。`contract` 分区只包含 `productionContracts` 与 `productionContractSummary`；新增分区是客户端状态版本 16 内的向后兼容扩展，世界版本继续为 14。首次加载必须包含六个完整分区，后续按内容哈希只传变化分区。

定时世界处理先执行现有生产和拍卖处理，再处理长期合同；普通状态轮询不负责推进时间。合同到期、自动托管和宽限期终止由正式一秒调度器在 SQLite 事务中执行。合同结算不得写入订单簿、市场价格历史或交易榜。''',
          )
          replace(
              'docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md',
              '`catalog`、`player`、`market`、`auction`、`leaderboard`',
              '`catalog`、`player`、`market`、`auction`、`contract`、`leaderboard`',
              required=False,
          )

          append_once(
              'docs/README.md',
              '长期生产合作合同规则分散归属',
              '''## 长期生产合作合同规则分散归属

合同不新增平行专题设计文档：页面默认视图与交互归 `PAGE_CONTENT_AND_NAVIGATION_DESIGN.md`，工厂集群边界、生产先于交付和仓库托管归 `INDUSTRY_AND_PRODUCTION_DESIGN.md`，事务、接口、调度与 `contract` 状态分区归 `SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md`。合同只涉及商品和普通货币，不涉及藏品或工厂所有权。''',
          )

          verify_page = 'scripts/verify-page-content.mjs'
          replace(
              verify_page,
              "  'src/pages/AuctionPage.tsx',\n  'src/pages/LeaderboardPage.tsx',",
              "  'src/pages/AuctionPage.tsx',\n  'src/pages/ContractPage.tsx',\n  'src/pages/LeaderboardPage.tsx',",
          )
          replace(
              verify_page,
              '概览｜市场｜生产｜资产｜藏品｜拍卖｜排行｜商店｜设置',
              '概览｜市场｜生产｜资产｜藏品｜拍卖｜合同｜排行｜商店｜设置',
          )
          replace(
              verify_page,
              "  '| 拍卖 | `auction` | `AuctionPage` | 藏品、商品与工厂竞价拍卖与结算结果 |',\n  '| 商店 |",
              "  '| 拍卖 | `auction` | `AuctionPage` | 藏品、商品与工厂竞价拍卖与结算结果 |',\n  '| 合同 | `contracts` | `ContractPage` | 长期商品供货合同的发布、承接、履约与历史 |',\n  '| 商店 |",
          )
          replace(
              verify_page,
              "  \"{ id: 'auction', label: '拍卖' }\",\n  \"{ id: 'gem-shop', label: '商店' }\",",
              "  \"{ id: 'auction', label: '拍卖' }\",\n  \"{ id: 'contracts', label: '合同' }\",\n  \"{ id: 'gem-shop', label: '商店' }\",",
          )
          insert_before(
              verify_page,
              "for (const text of ['title=\"拍卖\"'",
              '''for (const text of ['title="合同"', '进行中的合同', '合同广场', '待处理', '合同历史', '发布合同', 'productionContractActions']) {
  requireText('src/pages/ContractPage.tsx', text);
}
for (const text of ['collectibleId', 'facilityTypeId']) forbidText('src/pages/ContractPage.tsx', text);''',
          )
          replace(verify_page, '页面内容、九页导航、', '页面内容、十页导航、')

          capacity = 'scripts/verify-state-delivery-capacity.mjs'
          replace(
              capacity,
              '游戏状态使用全局世界修订号排序，并按目录、玩家、市场、拍卖、排行榜五个分区增量同步',
              '游戏状态使用全局世界修订号排序，并按目录、玩家、市场、拍卖、合同、排行榜六个分区增量同步',
          )
          replace(capacity, '`catalog`、`player`、`market`、`auction`、`leaderboard`', '`catalog`、`player`、`market`、`auction`、`contract`、`leaderboard`')
          replace(capacity, '目录、玩家、市场、拍卖和排行榜五个状态分区', '目录、玩家、市场、拍卖、合同和排行榜六个状态分区')
          replace(
              capacity,
              "  \"'auction'\",\n  \"'leaderboard'\",",
              "  \"'auction'\",\n  \"'contract'\",\n  \"'leaderboard'\",",
          )
          replace(
              capacity,
              "    auction: 'auction-0001',\n    leaderboard: 'leader-00001',",
              "    auction: 'auction-0001',\n    contract: 'contract-0001',\n    leaderboard: 'leader-00001',",
          )
          replace(
              capacity,
              "    auction: { collectibles: [{ id: 'collectible-1' }] },\n    leaderboard: { leaderboard: [] },",
              "    auction: { collectibles: [{ id: 'collectible-1' }] },\n    contract: { productionContracts: [], productionContractSummary: {} },\n    leaderboard: { leaderboard: [] },",
          )
          replace(
              capacity,
              "    auction: 'auction-0002',\n    leaderboard: 'leader-00001',",
              "    auction: 'auction-0002',\n    contract: 'contract-0001',\n    leaderboard: 'leader-00001',",
          )

          Path('.github/workflows/agent-contract-doc-patch.yml').unlink()
          PY
      - name: Commit synchronized rules
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          git commit -m "document and verify production contracts"
          git push origin HEAD:agent/production-contracts

name: Apply unified server patches

on:
  push:
    branches: [agent/unified-asset-orderbook-admin]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/unified-asset-orderbook-admin
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Apply server patches
        run: node scripts/apply-unified-server-patches.mjs
      - name: Commit server patches
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "补齐统一市场服务器迁移与测试"
          git push origin HEAD:agent/unified-asset-orderbook-admin

name: Apply dynamic population demand

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-population-demand
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply source and design changes
        run: python3 scripts/apply-dynamic-population-demand.py 2>&1 | tee dynamic-demand-patch.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-demand-patch-log
          path: dynamic-demand-patch.log
      - name: Remove one-shot upgrade files
        run: rm scripts/apply-dynamic-population-demand.py .github/workflows/apply-dynamic-population-demand.yml dynamic-demand-patch.log
      - name: Install dependencies
        run: npm ci
      - name: Validate server and demand model
        run: |
          git diff --check
          npm run server:check
          node scripts/verify-document-authority.mjs
          node scripts/verify-staple-crops-demand.mjs
          node --test server/test/domain.test.js
      - name: Commit upgraded model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "按活跃玩家与库存动态调整人口需求"
          git push origin HEAD:agent/dynamic-population-demand

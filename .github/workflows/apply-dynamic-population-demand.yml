name: Apply dynamic population demand

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

concurrency:
  group: dynamic-population-demand-v2
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-population-demand-v2
          fetch-depth: 0
      - name: Check whether upgrade is needed
        id: guard
        shell: bash
        run: |
          if grep -q "ACTIVE_PLAYER_WINDOW_MS" server/src/domain.js; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.needed == 'true'
        with:
          node-version: 24.4.0
          cache: npm
      - name: Apply source and design changes
        if: steps.guard.outputs.needed == 'true'
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-dynamic-population-demand.py')
          text = path.read_text(encoding='utf-8')
          needle = '  normalized.version = 13;""", """  if (previousVersion < 13) {'
          replacement = '  normalized.version = 12;""", """  if (previousVersion < 13) {'
          if needle not in text:
              raise SystemExit('未找到世界版本迁移补丁定位')
          path.write_text(text.replace(needle, replacement, 1), encoding='utf-8')
          PY
          python3 scripts/apply-dynamic-population-demand.py 2>&1 | tee dynamic-demand-patch.log
          python3 - <<'PY'
          from pathlib import Path
          domain_path = Path('server/src/domain.js')
          domain = domain_path.read_text(encoding='utf-8')
          old = """    player.lastEconomicActivityAt = Math.max(
                Number(player.registeredAt || 0),
                Number(player.work?.lastWorkedAt || 0),
                latestOrderAt.get(playerId) || 0,
                tradeAt,
                ledgerAt,
                now,
              );""".replace('                ', '      ').replace('              );', '    );')
          new = """    const inferredActivityAt = Math.max(
                Number(player.registeredAt || 0),
                Number(player.work?.lastWorkedAt || 0),
                latestOrderAt.get(playerId) || 0,
                tradeAt,
                ledgerAt,
              );
              player.lastEconomicActivityAt = inferredActivityAt > 0 ? inferredActivityAt : now;""".replace('                ', '      ').replace('              );', '    );').replace('              player.', '    player.')
          if old not in domain:
              raise SystemExit('未找到玩家活跃时间迁移片段')
          domain_path.write_text(domain.replace(old, new, 1), encoding='utf-8')

          verify_path = Path('scripts/verify-staple-crops-demand.mjs')
          verify = verify_path.read_text(encoding='utf-8')
          verify_path.write_text(
              verify.replace("'读取状态不得更新'", "'空闲状态读取不得仅因服务器时间推进而修改'", 1),
              encoding='utf-8',
          )
          PY
      - name: Install dependencies
        if: steps.guard.outputs.needed == 'true'
        run: npm ci
      - name: Validate server and demand model
        if: steps.guard.outputs.needed == 'true'
        shell: bash
        run: |
          set -o pipefail
          {
            git diff --check
            npm run server:check
            node scripts/verify-document-authority.mjs
            node scripts/verify-staple-crops-demand.mjs
            node --test server/test/domain.test.js
          } 2>&1 | tee dynamic-demand-validation.log
      - name: Upload diagnostics
        if: always() && steps.guard.outputs.needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-demand-diagnostics-v2
          path: |
            dynamic-demand-patch.log
            dynamic-demand-validation.log
      - name: Commit upgraded model
        if: steps.guard.outputs.needed == 'true'
        run: |
          rm -f dynamic-demand-patch.log dynamic-demand-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs server/src server/test/domain.test.js scripts
          git commit -m "按活跃玩家与库存动态调整人口需求"
          git pull --rebase origin agent/dynamic-population-demand-v2
          git push origin HEAD:agent/dynamic-population-demand-v2

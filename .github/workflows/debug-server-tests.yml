name: Debug Server Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Capture server test output
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run server:test > server-test-result.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: server-test-result
          path: server-test-result.txt
      - name: Fail when tests failed
        if: steps.test.outputs.status != '0'
        run: exit 1

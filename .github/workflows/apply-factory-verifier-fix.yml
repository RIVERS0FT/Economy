name: Apply factory verifier fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'codex/compact-factory-profit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0

      - name: Synchronize verifier
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-facility-groups.mjs')
          text = path.read_text()
          old = "  '完整状态固定放在工厂名称下方',"
          new = "  '完整状态与工厂名称放在同一紧凑标题行',"
          if old not in text:
              raise SystemExit('old facility status design assertion missing')
          text = text.replace(old, new, 1)
          text = text.replace(
              '工厂持续生产、名称下状态、统一收起动画、',
              '工厂持续生产、紧凑标题状态、统一收起动画、',
              1,
          )
          path.write_text(text)
          PY
          node scripts/verify-facility-groups.mjs
          node --experimental-strip-types scripts/verify-recipe-profit-analysis.mjs

      - name: Commit verifier synchronization
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/verify-facility-groups.mjs
          git commit -m "同步工厂紧凑标题交叉验证"
          git push origin HEAD:${{ github.head_ref }}

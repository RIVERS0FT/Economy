name: Apply contract mobile tabs fix

on:
  push:
    branches:
      - agent/fix-contract-mobile-tabs

permissions:
  contents: write

concurrency:
  group: apply-contract-mobile-tabs-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-contract-mobile-tabs
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply deterministic patch
        run: |
          git apply --check .agent/contract-tabs.patch
          git apply .agent/contract-tabs.patch
          rm -rf .agent
          rm .github/workflows/apply-contract-mobile-tabs.yml

      - name: Install dependencies
        run: npm ci

      - name: Run full build validation
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run contract browser regression
        run: npx playwright test tests/browser/contract-layout.spec.ts --project=chromium

      - name: Commit final source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复移动端合同标签堆叠"
          git push origin HEAD:agent/fix-contract-mobile-tabs

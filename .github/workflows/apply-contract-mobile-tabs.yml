name: Apply contract mobile tabs fix

on:
  push:
    branches:
      - agent/fix-contract-mobile-tabs

permissions:
  contents: write

concurrency:
  group: apply-contract-mobile-tabs-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-contract-mobile-tabs
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply deterministic patch
        run: |
          if ! git apply --check --verbose .agent/contract-tabs.patch > /tmp/contract-tabs-apply.log 2>&1; then
            cp /tmp/contract-tabs-apply.log .agent/contract-tabs-apply-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .agent/contract-tabs-apply-error.log
            git commit -m "记录移动合同标签补丁错误"
            git push origin HEAD:agent/fix-contract-mobile-tabs
            cat /tmp/contract-tabs-apply.log
            exit 1
          fi
          git apply .agent/contract-tabs.patch
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md';
          const lines = readFileSync(path, 'utf8').split('\n');
          const prefix = '标签栏必须复用 `Button` 与 `.ui-segmented`';
          const rule = '移动端标签栏必须使用单行固有宽度 Flex 横向滚动；每个标签按钮覆盖共享分段按钮的 `width: 100%` 为 `width: auto`，并使用 `flex: 0 0 auto` 保持独立命中区域。选中背景、文字和数量徽标不得越出自身按钮或覆盖相邻标签，`320px` 与 `390px` 宽度下必须逐项可达且页面本身不得横向溢出。';
          const markerIndex = lines.findIndex((line) => line.startsWith(prefix));
          if (markerIndex < 0) throw new Error('无法定位合同标签栏设计段落');
          if (!lines.includes(rule)) lines.splice(markerIndex + 2, 0, rule, '');
          writeFileSync(path, lines.join('\n'));
          NODE
          rm -rf .agent
          rm .github/workflows/apply-contract-mobile-tabs.yml

      - name: Install dependencies
        run: npm ci

      - name: Run contract architecture verification
        run: node scripts/verify-contract-layout.mjs

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run contract browser regression
        run: npx playwright test tests/browser/contract-layout.spec.ts --project=chromium

      - name: Commit final source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复移动端合同标签堆叠"
          git push origin HEAD:agent/fix-contract-mobile-tabs

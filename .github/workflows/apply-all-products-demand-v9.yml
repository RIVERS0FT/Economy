name: Apply all-products demand v9

on:
  push:
    branches:
      - agent/all-products-direct-demand-v9
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: agent/all-products-direct-demand-v9
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'
          cache: npm

      - name: Apply model 9 changes
        run: |
          python3 scripts/apply-all-products-demand-v9.py
          python3 scripts/fix-all-products-demand-v9-migration.py

      - name: Install dependencies
        run: npm ci

      - name: Run full build validation
        run: npm run build

      - name: Remove one-time migration helpers
        run: |
          rm scripts/apply-all-products-demand-v9.py
          rm scripts/fix-all-products-demand-v9-migration.py
          rm .github/workflows/apply-all-products-demand-v9.yml
          rm -f build-failure.log

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "give every product direct demand"
          git push origin HEAD:agent/all-products-direct-demand-v9

name: Agent State Version Patch PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/fix-client-state-version-contract'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-client-state-version-contract
          fetch-depth: 0

      - name: Apply and commit version contract patch
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply-state-version-patch.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No patch changes required'
            exit 0
          fi
          git commit -m 'fix: unify client state version contract [state-version-patch]'
          git push origin HEAD:agent/fix-client-state-version-contract

name: Trigger market demand V3 patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/accumulate-market-demand-orders
          fetch-depth: 0
      - name: Execute embedded patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/agent-market-demand-v3.yml').read_text()
          marker = "          python3 <<'PY'\n"
          end_marker = "\n          PY\n"
          script = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in script.splitlines()]
          exec('\n'.join(lines), {'__name__': '__main__'})
          Path('.github/workflows/agent-market-demand-v3-pr.yml').unlink(missing_ok=True)
          PY
      - name: Commit patched files
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Accumulate and raise market demand orders"
          git push origin HEAD:agent/accumulate-market-demand-orders

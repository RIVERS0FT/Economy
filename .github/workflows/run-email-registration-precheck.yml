name: Run email registration precheck

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: ${{ github.event.issue.title == '[automation] apply email registration precheck' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/check-email-before-verification
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: node .github/apply-email-registration-precheck.mjs
      - run: npm ci
      - run: npm run build
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md scripts/verify-email-registration.mjs server/src/account-client.js server/src/registration.js server/test/account-client.test.js server/test/registration.test.js
          git commit -m "Check email registration before sending code [patch-applied]"
          git push origin HEAD:agent/check-email-before-verification

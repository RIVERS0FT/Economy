name: Run email registration precheck

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  patch-and-verify:
    if: ${{ github.event.issue.title == '[automation] apply email registration precheck' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/check-email-before-verification
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply and verify
        id: verify
        shell: bash
        run: |
          set +e
          {
            node .github/apply-email-registration-precheck.mjs &&
            npm ci &&
            npm run build
          } > /tmp/email-registration-precheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -c 50000 /tmp/email-registration-precheck.log > /tmp/email-registration-precheck-tail.log
          exit 0
      - name: Commit verified changes
        if: ${{ steps.verify.outputs.status == '0' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md scripts/verify-email-registration.mjs server/src/account-client.js server/src/registration.js server/test/account-client.test.js server/test/registration.test.js
          git commit -m "Check email registration before sending code [patch-applied]"
          git push origin HEAD:agent/check-email-before-verification
      - name: Report result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'One-time patch exit status: %s\n\n```text\n' '${{ steps.verify.outputs.status }}' > /tmp/comment.md
          cat /tmp/email-registration-precheck-tail.log >> /tmp/comment.md
          printf '\n```\n' >> /tmp/comment.md
          gh issue comment '${{ github.event.issue.number }}' --body-file /tmp/comment.md
      - name: Fail when verification failed
        if: ${{ steps.verify.outputs.status != '0' }}
        run: exit 1

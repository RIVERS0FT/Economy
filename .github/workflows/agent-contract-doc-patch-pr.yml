name: Agent contract documentation patch PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/production-contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/production-contracts
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Execute embedded synchronization script
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          source = Path('.github/workflows/agent-contract-doc-patch.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          exec(compile(dedent(source[start:end]), 'agent-contract-doc-patch', 'exec'))
          Path('.github/workflows/agent-contract-doc-patch-pr.yml').unlink(missing_ok=True)
          PY
      - name: Commit synchronized rules
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "openai-agent@users.noreply.github.com"
          git add -A
          git commit -m "document and verify production contracts"
          git push origin HEAD:agent/production-contracts

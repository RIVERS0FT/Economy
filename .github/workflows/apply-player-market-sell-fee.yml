name: Apply player market sell fee

on:
  push:
    branches:
      - agent/player-market-sell-fee
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/player-market-sell-fee
          fetch-depth: 0

      - name: Apply transparent patch
        shell: bash
        run: |
          cat \
            .github/patches/player-market-sell-fee/part-0.pyfrag \
            .github/patches/player-market-sell-fee/part-1.pyfrag \
            .github/patches/player-market-sell-fee/part-2.pyfrag \
            .github/patches/player-market-sell-fee/part-3.pyfrag \
            .github/patches/player-market-sell-fee/part-4.pyfrag \
            > /tmp/apply-player-market-sell-fee.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply-player-market-sell-fee.py')
          source = path.read_text(encoding='utf-8')
          old = (
              "def replace_once(path, old, new):\n"
              "    content = read(path)\n"
              "    count = content.count(old)\n"
              "    if count != 1:\n"
              "        raise SystemExit(f'{path}: expected one match, found {count}: {old[:160]!r}')\n"
              "    write(path, content.replace(old, new, 1))\n"
          )
          new = (
              "def _indent_block(value, width):\n"
              "    prefix = ' ' * width\n"
              "    return '\\n'.join(prefix + line if line else line for line in value.split('\\n'))\n"
              "\n"
              "def replace_once(path, old, new):\n"
              "    content = read(path)\n"
              "    if content.count(old) == 1:\n"
              "        write(path, content.replace(old, new, 1))\n"
              "        return\n"
              "    for width in range(1, 9):\n"
              "        indented_old = _indent_block(old, width)\n"
              "        if content.count(indented_old) == 1:\n"
              "            write(path, content.replace(indented_old, _indent_block(new, width), 1))\n"
              "            return\n"
              "    raise SystemExit(f'{path}: expected one exact or uniformly indented match: {old[:160]!r}')\n"
          )
          if source.count(old) != 1:
              raise SystemExit('patch helper definition mismatch')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          set +e
          python3 /tmp/apply-player-market-sell-fee.py > /tmp/apply-player-market-sell-fee.log 2>&1
          status=$?
          set -e
          git config user.name "OpenAI"
          git config user.email "openai@users.noreply.github.com"
          if [ "$status" -ne 0 ]; then
            cp /tmp/apply-player-market-sell-fee.log .github/player-market-sell-fee-error.txt
            git add .github/player-market-sell-fee-error.txt
            git commit -m "记录卖出手续费修改失败信息" || true
            git push origin HEAD:agent/player-market-sell-fee
            exit "$status"
          fi
          rm -rf .github/patches/player-market-sell-fee
          rm -f .github/player-market-sell-fee-error.txt
          rm .github/workflows/apply-player-market-sell-fee.yml
          git add -A
          git commit -m "玩家市场卖出收取手续费"
          git push origin HEAD:agent/player-market-sell-fee

name: Apply Market Demand V6

on:
  push:
    branches:
      - codex/market-demand-v6
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply V6 patch
        shell: bash
        run: |
          cat scripts/.v6-patch/part0{0,1,2,3,4,5,6,7} > /tmp/apply-market-demand-v6.mjs.gz.b64
          echo "7a8fa9d6095d5d1e7d0c6e0b7896532663dc6dcc8b85e57a905a9971b59e137b  /tmp/apply-market-demand-v6.mjs.gz.b64" | sha256sum -c -
          base64 -d /tmp/apply-market-demand-v6.mjs.gz.b64 | gzip -d > /tmp/apply-market-demand-v6.mjs
          node --check /tmp/apply-market-demand-v6.mjs
          node /tmp/apply-market-demand-v6.mjs
          rm -rf scripts/.v6-patch .github/workflows/apply-market-demand-v6.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "实现市场供需模型 V6"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - run: npm ci
      - run: npm run build

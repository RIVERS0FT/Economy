name: Apply unfilled demand price ladder

on:
  push:
    branches:
      - agent/accumulate-unfilled-demand-price

permissions:
  contents: write

concurrency:
  group: apply-unfilled-demand-price
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Apply source, tests, and design updates
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}')
              file.write_text(text.replace(old, new, 1))

          def replace_count(path, old, new, expected):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{path}: expected {expected} matches, found {count}')
              file.write_text(text.replace(old, new))

          replace_once(
              'server/src/market-demand/catalog.js',
              "export const DEMAND_CURVE_SHORTAGE_MULTIPLIER = 1.03;\nexport const PRODUCT_PRESSURE_SMOOTHING = 0.30;",
              "export const DEMAND_CURVE_SHORTAGE_MULTIPLIER = 1.03;\nexport const DIRECT_DEMAND_UNFILLED_PRICE_STEP = 1.03;\nexport const DIRECT_DEMAND_PRICE_RECOVERY_RATE = 0.30;\nexport const PRODUCT_PRESSURE_SMOOTHING = 0.30;",
          )

          replace_once(
              'server/src/market-demand/state.js',
              "import { MARKET_DEMAND_GROUP_CATALOG, MARKET_DEMAND_MODEL_VERSION } from './catalog.js';",
              "import { MARKET_DEMAND_GROUP_CATALOG, MARKET_DEMAND_MODEL_VERSION, PRICE_MAX_MULTIPLIER } from './catalog.js';",
          )
          replace_once(
              'server/src/market-demand/state.js',
              "export function createMarketDemandStateRuntime({ products, constants, marketFor, isOpenOrder }) {\n  function normalizePlayerActivity(world, now) {",
              "export function createMarketDemandStateRuntime({ products, constants, marketFor, isOpenOrder }) {\n  const productMap = new Map(products.map((product) => [product.id, product]));\n\n  function defaultDirectQuoteAnchors(group) {\n    return Object.fromEntries([...new Set(group.classes.flatMap((demandClass) => (\n      demandClass.products.map((option) => option.productId)\n    )))].map((productId) => [productId, Number(productMap.get(productId)?.basePrice || 1)]));\n  }\n\n  function normalizePlayerActivity(world, now) {",
          )
          replace_once(
              'server/src/market-demand/state.js',
              "      lastProductShares: {},\n      previousDemandQuantities: structuredClone(group.seedDemandQuantities),",
              "      lastProductShares: {},\n      directQuoteAnchors: defaultDirectQuoteAnchors(group),\n      previousDemandQuantities: structuredClone(group.seedDemandQuantities),",
          )
          replace_once(
              'server/src/market-demand/state.js',
              "      state.lastProductShares = state.lastProductShares && typeof state.lastProductShares === 'object' ? state.lastProductShares : {};\n      state.previousDemandQuantities = state.previousDemandQuantities && typeof state.previousDemandQuantities === 'object'",
              "      state.lastProductShares = state.lastProductShares && typeof state.lastProductShares === 'object' ? state.lastProductShares : {};\n      const defaultAnchors = defaultDirectQuoteAnchors(group);\n      const previousAnchors = state.directQuoteAnchors && typeof state.directQuoteAnchors === 'object' ? state.directQuoteAnchors : {};\n      state.directQuoteAnchors = Object.fromEntries(Object.entries(defaultAnchors).map(([productId, fallbackPrice]) => {\n        const product = productMap.get(productId);\n        const value = Number(previousAnchors[productId]);\n        const normalized = Number.isFinite(value) && value > 0 ? value : fallbackPrice;\n        return [productId, clamp(0.01, Number(product?.basePrice || fallbackPrice) * PRICE_MAX_MULTIPLIER, normalized)];\n      }));\n      state.previousDemandQuantities = state.previousDemandQuantities && typeof state.previousDemandQuantities === 'object'",
          )
          replace_once(
              'server/src/market-demand/state.js',
              "        state.lastProductShares = {};\n        state.previousDemandQuantities = structuredClone(group.seedDemandQuantities);",
              "        state.lastProductShares = {};\n        state.directQuoteAnchors = defaultDirectQuoteAnchors(group);\n        state.previousDemandQuantities = structuredClone(group.seedDemandQuantities);",
          )

          replace_once(
              'server/src/market-demand.js',
              "  DEMAND_CURVE_SHORTAGE_MULTIPLIER,\n  DERIVED_BACKLOG_WEIGHT,",
              "  DEMAND_CURVE_SHORTAGE_MULTIPLIER,\n  DIRECT_DEMAND_PRICE_RECOVERY_RATE,\n  DIRECT_DEMAND_UNFILLED_PRICE_STEP,\n  DERIVED_BACKLOG_WEIGHT,",
          )
          replace_count(
              'server/src/market-demand.js',
              "        delayWeight: 0,\n        delayScoreTotal: 0,\n      };",
              "        delayWeight: 0,\n        delayScoreTotal: 0,\n        directRequested: 0,\n        directFilled: 0,\n      };",
              2,
          )
          replace_once(
              'server/src/market-demand.js',
              "      if (order.demandTier === 'direct') {\n        const utility = Math.max(1, Number(utilities.get(productId) || 1));",
              "      if (order.demandTier === 'direct') {\n        stats.directRequested += quantity;\n        stats.directFilled += filled;\n        const utility = Math.max(1, Number(utilities.get(productId) || 1));",
          )
          replace_once(
              'server/src/market-demand.js',
              "      Object.assign(stats, {\n        fillRatio: round4(productFillRatio),\n        delayScore: round4(productDelayScore),",
              "      Object.assign(stats, {\n        fillRatio: round4(productFillRatio),\n        directFillRatio: stats.directRequested <= 0 ? null : round4(stats.directFilled / stats.directRequested),\n        delayScore: round4(productDelayScore),",
          )
          replace_once(
              'server/src/market-demand.js',
              "  function prepareGroupOrders(world, group, state, cycleId) {",
              "  function updateDirectQuoteAnchors(world, group, state, settlement) {\n    state.directQuoteAnchors ||= {};\n    const productIds = new Set(group.classes.flatMap((demandClass) => (\n      demandClass.products.map((option) => option.productId)\n    )));\n    for (const productId of productIds) {\n      const product = productFor(productId);\n      const referencePrice = Math.max(0.01, Number(\n        world.marketDemand.priceTransmission.products[productId]?.referencePrice || product.basePrice,\n      ));\n      const stored = Number(state.directQuoteAnchors[productId]);\n      const previous = Math.max(referencePrice, Number.isFinite(stored) && stored > 0 ? stored : referencePrice);\n      const stats = settlement.products?.[productId];\n      const requested = Math.max(0, Number(stats?.directRequested || 0));\n      const filled = Math.max(0, Number(stats?.directFilled || 0));\n      const fillRatio = requested <= 0 ? null : clamp(0, 1, filled / requested);\n      let next = previous;\n      if (requested > 0 && filled <= 0) {\n        next = previous * DIRECT_DEMAND_UNFILLED_PRICE_STEP;\n      } else if (requested > 0 && fillRatio < group.targetSatisfaction) {\n        next = previous;\n      } else {\n        next = referencePrice + Math.max(0, previous - referencePrice) * (1 - DIRECT_DEMAND_PRICE_RECOVERY_RATE);\n      }\n      state.directQuoteAnchors[productId] = round4(clamp(\n        referencePrice,\n        product.basePrice * PRICE_MAX_MULTIPLIER,\n        next,\n      ));\n    }\n  }\n\n  function prepareGroupOrders(world, group, state, cycleId) {",
          )
          replace_once(
              'server/src/market-demand.js',
              "  function priceCurveFor(product, referencePrice, pressure) {\n    const cap = Math.max(1, Math.floor(product.basePrice * PRICE_MAX_MULTIPLIER));\n    const shortageMultiplier = pressure >= 1.15 ? DEMAND_CURVE_SHORTAGE_MULTIPLIER : 1;\n    return DEMAND_CURVE.map((tier, index) => ({\n      weight: tier.weight,\n      price: Math.min(cap, Math.max(1, Math.round(referencePrice * tier.multiplier * (index === 0 ? shortageMultiplier : 1)))),\n    }));\n  }",
              "  function priceCurveFor(product, referencePrice, pressure, directQuoteAnchor = referencePrice) {\n    const cap = Math.max(1, Math.floor(product.basePrice * PRICE_MAX_MULTIPLIER));\n    const shortageMultiplier = pressure >= 1.15 ? DEMAND_CURVE_SHORTAGE_MULTIPLIER : 1;\n    return DEMAND_CURVE.map((tier, index) => {\n      const curvePrice = referencePrice * tier.multiplier * (index === 0 ? shortageMultiplier : 1);\n      const targetPrice = index === 0 ? Math.max(curvePrice, directQuoteAnchor) : curvePrice;\n      return {\n        weight: tier.weight,\n        price: Math.min(cap, Math.max(1, Math.round(targetPrice))),\n      };\n    });\n  }",
          )
          replace_once(
              'server/src/market-demand.js',
              "      const pressure = Number(world.marketDemand.productPressure[productId] || 1);\n      const curve = priceCurveFor(product, referencePrice, pressure);",
              "      const pressure = Number(world.marketDemand.productPressure[productId] || 1);\n      const directQuoteAnchor = role === 'direct'\n        ? Math.max(referencePrice, Number(world.marketDemand.groups[group.id]?.directQuoteAnchors?.[productId] || referencePrice))\n        : referencePrice;\n      const curve = priceCurveFor(product, referencePrice, pressure, directQuoteAnchor);",
          )
          replace_once(
              'server/src/market-demand.js',
              "    }\n\n    prepareGroupOrders(world, group, state, cycleId);\n    const populationCycle = preparePopulationDemandCycle",
              "    }\n\n    updateDirectQuoteAnchors(world, group, state, settlement);\n    prepareGroupOrders(world, group, state, cycleId);\n    const populationCycle = preparePopulationDemandCycle",
          )

          replace_once(
              'server/test/market-demand-v6.test.js',
              "test('market model 8 uses funded population wallets when no player is active', () => {",
              "test('direct demand quote anchor accumulates fractional no-fill increases and recovers after service', () => {\n  const now = 1_700_000_000_000;\n  const runtime = createRuntime();\n  const world = createTestWorld(now);\n  runtime.initializeWorld(world, now);\n  world.marketDemand.groups.food.nextDemandAt = now;\n\n  const topWheatPriceFor = (cycleId) => Math.max(...world.orders\n    .filter((order) => order.demandGroupId === 'food'\n      && order.demandTier === 'direct'\n      && order.productId === 'wheat'\n      && Number(order.demandCycleId) === cycleId)\n    .map((order) => Number(order.price || 0)));\n\n  runtime.processGroup(world, 'food', now);\n  assert.equal(topWheatPriceFor(Math.floor(now / constants.demandCycleMs)), 2);\n\n  for (let cycle = 1; cycle <= 8; cycle += 1) {\n    runtime.processGroup(world, 'food', now + cycle * constants.demandCycleMs);\n  }\n\n  const raisedAt = now + 8 * constants.demandCycleMs;\n  const raisedCycleId = Math.floor(raisedAt / constants.demandCycleMs);\n  const raisedAnchor = world.marketDemand.groups.food.directQuoteAnchors.wheat;\n  assert.ok(raisedAnchor >= 2.53);\n  assert.equal(topWheatPriceFor(raisedCycleId), 3);\n\n  const filledAt = raisedAt + 240_000;\n  for (const order of world.orders.filter((item) => item.demandGroupId === 'food'\n    && item.demandTier === 'direct'\n    && item.productId === 'wheat'\n    && Number(item.demandCycleId) === raisedCycleId)) {\n    order.remaining = 0;\n    order.status = 'filled';\n    order.lastFilledAt = filledAt;\n  }\n\n  runtime.processGroup(world, 'food', raisedAt + constants.demandCycleMs);\n  const recoveredAnchor = world.marketDemand.groups.food.directQuoteAnchors.wheat;\n  assert.ok(recoveredAnchor < raisedAnchor);\n  assert.ok(recoveredAnchor > 2);\n  assert.equal(world.marketDemand.groups.food.lastCycleSettlement.products.wheat.directFillRatio, 1);\n});\n\ntest('market model 8 uses funded population wallets when no player is active', () => {",
          )

          replace_once(
              'docs/PRODUCT_AND_GAMEPLAY_DESIGN.md',
              "新周期每项商品预算按 50%／30%／20% 拆成三档买盘，基准倍率为 100%／97%／93%；只有压力达到 1.15 时第一档允许提高到参考价的 103%。同价档合并，未形成整数数量的预算不结转。\n\n旧消费买单最多存在两个周期；发生过成交的商品在下一周期撤销旧剩余，无成交时只保留 35%。单商品有效消费买盘价值不得超过该商品本周期分配预算的 1.5 倍，需求组总有效消费买盘价值不得超过本周期预算的 2.5 倍。",
              "新周期每项商品预算按 50%／30%／20% 拆成三档买盘，基准倍率为 100%／97%／93%；压力达到 1.15 时第一档普通曲线允许提高到参考价的 103%。每项直接需求商品额外保存未满足需求报价锚点，锚点使用未取整小数：上一完整周期存在直接需求且零成交时，以 `max(上一锚点, 当前参考价) × 103%` 累计；存在部分成交但直接成交率仍低于需求组目标时保持锚点且不得低于参考价；达到目标或当周期没有直接需求时，每周期消除锚点与参考价差额的 30%。只有直接需求第一档取普通曲线与锚点的较高值后再取整数，派生流动性不使用该阶梯；报价仍不得超过基础价的 300%，周期预算不增加，涨价只会减少可购买数量。同价档合并，未形成整数数量的预算不结转。\n\n旧消费买单最多存在两个周期；发生过成交的商品在下一周期撤销旧剩余，无成交时只保留 35%。单商品有效消费买盘价值不得超过该商品本周期分配预算的 1.5 倍，需求组总有效消费买盘价值不得超过本周期预算的 2.5 倍。",
          )

          replace_once(
              'docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md',
              "消费需求买单只能与同商品的玩家卖单成交；市场储备买单和卖单只能与玩家订单成交，任何两个 `ownerType = population` 的系统订单都必须排除，禁止消费需求与储备、不同储备方向或同组系统订单互相制造成交。消费需求成交必须记录 `lastFilledAt`，用于下一周期停止该商品的阶梯提价；无人卖出时旧消费买单保留 50%，新买单在保留最高价基础上上调 3%，有效消费买单总价值最多为当前周期预算的 3 倍。",
              "消费需求买单只能与同商品的玩家卖单成交；市场储备买单和卖单只能与玩家订单成交，任何两个 `ownerType = population` 的系统订单都必须排除，禁止消费需求与储备、不同储备方向或同组系统订单互相制造成交。消费需求成交必须记录 `lastFilledAt` 并在下一完整周期统一结算。直接需求为每项商品保存未取整的未满足需求报价锚点：完整周期零成交时在当前参考价与上一锚点的较高值上累计提高 3%，部分成交但未达到需求组目标时保持，达到目标或没有直接需求时每周期向参考价回落 30% 的差额；只有直接需求第一档使用该锚点，派生流动性不得使用。旧消费买单最多存在两个周期，无成交时只保留 35%；单商品有效消费买盘价值最多为本周期分配预算的 1.5 倍，需求组总有效消费买盘价值最多为本周期预算的 2.5 倍。报价锚点和挂单不得修改最近成交价、价格历史或正式估值。",
          )

          replace_once(
              'README.md',
              "- 三类人口使用真实余额和冻结资金；就业收入预算继续保持 70% 用于最终消费的直接需求，30% 用于沿正式配方反向推导的派生流动性。模型 9 额外提供总基础预算 12% 的稳定需求补充，三周期目标钱包、每周期最多补一周期缺口，稳定预算按 85% 直接需求／15% 派生流动性分配。人口消费成交不再发行普通货币。\n- 市场储备每 5 分钟撤销并重挂双边商品订单；",
              "- 三类人口使用真实余额和冻结资金；就业收入预算继续保持 70% 用于最终消费的直接需求，30% 用于沿正式配方反向推导的派生流动性。模型 9 额外提供总基础预算 12% 的稳定需求补充，三周期目标钱包、每周期最多补一周期缺口，稳定预算按 85% 直接需求／15% 派生流动性分配。人口消费成交不再发行普通货币。\n- 直接需求为每项商品持久化未取整的未满足需求报价锚点：完整周期零成交累计提高 3%，部分成交未达目标时保持，达标或无直接需求时每周期向参考价回落 30% 的差额；只有第一档直接需求买价使用该锚点，预算、最近成交价和估值不因此增加。\n- 市场储备每 5 分钟撤销并重挂双边商品订单；",
          )

          replace_once(
              'scripts/verify-staple-crops-demand.mjs',
              "  'DEMAND_CURVE',\n  'PRODUCT_ORDER_VALUE_CYCLES',",
              "  'DEMAND_CURVE',\n  'DIRECT_DEMAND_UNFILLED_PRICE_STEP = 1.03',\n  'DIRECT_DEMAND_PRICE_RECOVERY_RATE = 0.30',\n  'directQuoteAnchors',\n  'PRODUCT_ORDER_VALUE_CYCLES',",
          )
          replace_once(
              'scripts/verify-staple-crops-demand.mjs',
              "const populationTests = read('server/test/population-economy.test.js');",
              "const marketDemandTests = read('server/test/market-demand-v6.test.js');\nassert.ok(marketDemandTests.includes('direct demand quote anchor accumulates fractional no-fill increases and recovers after service'), '市场需求测试缺少未成交报价阶梯回归');\n\nconst populationTests = read('server/test/population-economy.test.js');",
          )
          replace_once(
              'scripts/verify-staple-crops-demand.mjs',
              "  ['README.md', ['市场需求模型版本：`9`', '三类人口使用真实余额', '奢靡、繁荣、正常、拮据、生存五档', '稳定需求补充', '人口消费成交不再发行普通货币']],\n  ['docs/PRODUCT_AND_GAMEPLAY_DESIGN.md', ['市场需求模型版本：9', '三类人口账户', '`lavish` 奢靡', '自动稳定补充发生前', '状态只重新分配同一周期预算', '真实冻结资金', '稳定需求补充', '三周期目标钱包']],\n  ['docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md', ['市场需求模型版本：9', '`populationModelId`', '`fundingPool`', '真实人口冻结资金']],",
              "  ['README.md', ['市场需求模型版本：`9`', '三类人口使用真实余额', '奢靡、繁荣、正常、拮据、生存五档', '稳定需求补充', '人口消费成交不再发行普通货币', '未满足需求报价锚点']],\n  ['docs/PRODUCT_AND_GAMEPLAY_DESIGN.md', ['市场需求模型版本：9', '三类人口账户', '`lavish` 奢靡', '自动稳定补充发生前', '状态只重新分配同一周期预算', '真实冻结资金', '稳定需求补充', '三周期目标钱包', '未满足需求报价锚点']],\n  ['docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md', ['市场需求模型版本：9', '`populationModelId`', '`fundingPool`', '真实人口冻结资金', '未满足需求报价锚点']],",
          )
          PY

      - name: Install dependencies
        run: npm ci

      - name: Run targeted demand tests
        run: node --test server/test/market-demand-v6.test.js

      - name: Run demand design verification
        run: node scripts/verify-staple-crops-demand.mjs

      - name: Run full build
        run: npm run build

      - name: Commit applied changes and remove workflow
        shell: bash
        run: |
          rm .github/workflows/apply-unfilled-demand-price.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/PRODUCT_AND_GAMEPLAY_DESIGN.md docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md \
            server/src/market-demand.js server/src/market-demand/catalog.js server/src/market-demand/state.js \
            server/test/market-demand-v6.test.js scripts/verify-staple-crops-demand.mjs \
            .github/workflows/apply-unfilled-demand-price.yml
          git commit -m "增加人口未成交报价阶梯"
          git push origin HEAD:agent/accumulate-unfilled-demand-price

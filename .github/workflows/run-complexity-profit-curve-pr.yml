name: Run complexity profit curve patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'balance/complexity-profit-curve' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: balance/complexity-profit-curve
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply catalog, tests, and design updates
        shell: bash
        run: |
          sed -n "/python3 <<'PY'/,/^          PY$/p" .github/workflows/apply-complexity-profit-curve.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply-complexity-profit-curve.py
          python3 /tmp/apply-complexity-profit-curve.py

      - name: Install dependencies
        run: npm ci

      - name: Validate repository
        run: npm run build

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/INDUSTRY_AND_PRODUCTION_DESIGN.md server/src/industry-catalog.js scripts/verify-industry-catalog.mjs server/test/domain.test.js
          git commit -m "balance industry profits by complexity"
          git push origin HEAD:balance/complexity-profit-curve

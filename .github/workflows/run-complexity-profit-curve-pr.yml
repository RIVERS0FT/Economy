name: Run complexity profit curve patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'balance/complexity-profit-curve' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: balance/complexity-profit-curve
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply catalog, tests, and design updates
        shell: bash
        run: |
          sed -n "/python3 <<'PY'/,/^          PY$/p" .github/workflows/apply-complexity-profit-curve.yml \
            | sed '1d;$d;s/^          //' > /tmp/apply-complexity-profit-curve.py
          python3 <<'PYFIX'
          from pathlib import Path
          path = Path('/tmp/apply-complexity-profit-curve.py')
          text = path.read_text(encoding='utf-8')
          old = "replace_once('server/test/domain.test.js', old_prices, new_prices)"
          new = """domain_old_prices = chr(10).join(f'  {line}' for line in old_prices.splitlines())
          domain_new_prices = chr(10).join(f'  {line}' for line in new_prices.splitlines())
          replace_once('server/test/domain.test.js', domain_old_prices, domain_new_prices)"""
          if text.count(old) != 1:
              raise SystemExit(f'expected one domain price replacement call, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PYFIX
          if ! python3 /tmp/apply-complexity-profit-curve.py > /tmp/apply-error.log 2>&1; then
            git reset --hard
            cp /tmp/apply-error.log apply-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apply-error.log
            git commit -m "debug complexity balance patch"
            git push origin HEAD:balance/complexity-profit-curve
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate repository
        shell: bash
        run: |
          if ! npm run build > /tmp/build-error.log 2>&1; then
            git reset --hard
            cp /tmp/build-error.log apply-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apply-error.log
            git commit -m "debug complexity balance build"
            git push origin HEAD:balance/complexity-profit-curve
            exit 1
          fi

      - name: Commit validated changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/INDUSTRY_AND_PRODUCTION_DESIGN.md server/src/industry-catalog.js scripts/verify-industry-catalog.mjs server/test/domain.test.js
          git commit -m "balance industry profits by complexity"
          git push origin HEAD:balance/complexity-profit-curve

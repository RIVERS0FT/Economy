name: Export source snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    if: github.head_ref == 'codex/mobile-factory-grid'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: economy-source-snapshot
          path: |
            .
            !.git
            !node_modules
          include-hidden-files: true
          retention-days: 1

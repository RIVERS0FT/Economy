name: Apply mobile factory grid patch

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.head_ref == 'codex/mobile-factory-grid'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply verified source patch
        shell: bash
        run: |
          cat .github/mobile-factory-grid.patch.gz.b64.* | base64 --decode | gzip --decompress > /tmp/mobile-factory-grid.patch
          git apply --check /tmp/mobile-factory-grid.patch
          git apply /tmp/mobile-factory-grid.patch
          rm -f .github/mobile-factory-grid.patch.gz.b64.*
          rm -f .github/workflows/export-source-snapshot.yml

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: optimize mobile factory cluster grid"
          git push origin HEAD:${{ github.head_ref }}

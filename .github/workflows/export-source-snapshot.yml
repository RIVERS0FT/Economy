name: Apply industry implementation

on:
  push:
    branches:
      - agent/expand-industry-catalog-v2

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply tested patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.github/economy-implementation.patch.gz.b64
          if [[ ! -f "$payload" ]]; then
            echo "Implementation payload is not present yet."
            exit 0
          fi
          base64 -d "$payload" | gzip -d > /tmp/economy-implementation.patch
          git apply --check /tmp/economy-implementation.patch
          git apply /tmp/economy-implementation.patch
          rm -f "$payload" .github/workflows/export-source-snapshot.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "扩展产业目录与多输入生产"
          git push origin HEAD:agent/expand-industry-catalog-v2

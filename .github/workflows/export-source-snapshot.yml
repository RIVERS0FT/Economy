name: Export source snapshot

on:
  push:
    branches:
      - agent/expand-industry-catalog-v2
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1

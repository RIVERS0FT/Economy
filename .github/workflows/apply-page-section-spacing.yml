name: Apply page section spacing

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-page-section-spacing
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply deterministic patch
        run: |
          cat .agent/page-spacing.part-* > /tmp/page-section-spacing.patch
          if ! git apply --check --verbose /tmp/page-section-spacing.patch > /tmp/page-spacing-apply.log 2>&1; then
            cp /tmp/page-spacing-apply.log .agent/page-spacing-apply-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .agent/page-spacing-apply-error.log
            git commit -m "记录页面间距补丁应用错误"
            git push origin HEAD:agent/unify-page-section-spacing
            cat /tmp/page-spacing-apply.log
            exit 1
          fi
          git apply /tmp/page-section-spacing.patch
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'package.json';
          const original = readFileSync(path, 'utf8');
          const marker = 'node scripts/verify-ui-architecture-runner.mjs && npm run verify:product-artwork';
          const replacement = 'node scripts/verify-ui-architecture-runner.mjs && node scripts/verify-page-section-spacing.mjs && npm run verify:product-artwork';
          if (!original.includes(marker)) throw new Error('无法定位 verify:architecture 插入点');
          writeFileSync(path, original.replace(marker, replacement));
          NODE
          rm .agent/page-spacing.part-*
          rm -f .agent/page-spacing-apply-error.log .agent/page-spacing-build-error.log
          rm .github/workflows/apply-page-section-spacing.yml

      - name: Install dependencies
        run: npm ci

      - name: Run full build validation
        run: |
          if ! npm run build > /tmp/page-spacing-build.log 2>&1; then
            cp /tmp/page-spacing-build.log .agent/page-spacing-build-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .agent/page-spacing-build-error.log
            git commit -m "记录页面间距构建错误"
            git push origin HEAD:agent/unify-page-section-spacing
            tail -n 200 /tmp/page-spacing-build.log
            exit 1
          fi
          cat /tmp/page-spacing-build.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run contract geometry regression
        run: npx playwright test tests/browser/contract-layout.spec.ts --project=chromium

      - name: Commit final source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "统一页面一级区块间距"
          git push origin HEAD:agent/unify-page-section-spacing

name: Apply production desktop layout

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/production-desktop-layout-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/production-desktop-layout-v2
          fetch-depth: 0

      - name: Apply layout and documentation
        run: |
          set -euo pipefail
          python3 scripts/apply-production-desktop-style.py
          python3 scripts/apply-production-desktop-industry-doc.py
          python3 scripts/apply-production-desktop-summary-docs.py
          rm -f \
            scripts/apply-production-desktop-style.py \
            scripts/apply-production-desktop-industry-doc.py \
            scripts/apply-production-desktop-summary-docs.py \
            .github/workflows/apply-production-desktop-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "完善桌面生产页布局文档与样式"
          git push origin HEAD:codex/production-desktop-layout-v2

name: Apply industry catalog expansion

on:
  push:
    branches: [agent/expand-industry-catalog]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/expand-industry-catalog
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Apply catalog expansion
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-industry-catalog-expansion.mjs 2>&1 | tee catalog-apply.log
      - name: Upload maintenance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-apply-log
          path: catalog-apply.log
          if-no-files-found: error
      - name: Commit expanded catalog
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "扩展商品与工厂目录"
          git push origin HEAD:agent/expand-industry-catalog

name: Fix population server tests
on:
  push:
    branches: [codex/population-economy-v7]
    paths:
      - scripts/fix-population-server-tests.py
      - .github/workflows/fix-population-server-tests.yml
permissions:
  contents: write
jobs:
  patch:
    if: contains(github.event.head_commit.message, '[fix-population-server-tests]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - run: python3 scripts/fix-population-server-tests.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve population wallet identity and update v7 tests"
          git push origin HEAD:codex/population-economy-v7

name: Remove legacy demand budget
on:
  push:
    branches: [codex/population-economy-v7]
    paths:
      - scripts/remove-legacy-demand-budget.py
      - .github/workflows/remove-legacy-demand-budget.yml
permissions:
  contents: write
jobs:
  patch:
    if: contains(github.event.head_commit.message, '[remove-legacy-demand-budget]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - run: python3 scripts/remove-legacy-demand-budget.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remove legacy active-player demand issuance"
          git push origin HEAD:codex/population-economy-v7

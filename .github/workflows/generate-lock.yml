name: Generate dependency lock

on:
  push:
    branches:
      - agent/harden-runtime-and-tests

permissions:
  contents: write

jobs:
  lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-runtime-and-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
      - name: Generate package lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit package lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git commit -m "锁定前端依赖"
          git push origin HEAD:agent/harden-runtime-and-tests

name: Finalize build workflows

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-runtime-and-tests
      - name: Unify CI and web build
        run: |
          cat > .github/workflows/ci.yml <<'EOF'
          name: Economy CI

          on:
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            build:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - name: Checkout code
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 24.4.0
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Build and test
                  run: npm run build

                - name: Install Chromium
                  run: npx playwright install --with-deps chromium

                - name: Test browser runtime
                  run: npm run test:browser
          EOF

          cat > .github/workflows/web-build.yml <<'EOF'
          name: Web build

          on:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            build:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                - name: Set up Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 24.4.0
                    cache: npm
                - name: Install dependencies
                  run: npm ci
                - name: Typecheck, test server, and build
                  shell: bash
                  run: |
                    set -o pipefail
                    npm run build 2>&1 | tee build.log
                - name: Upload build log
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: build-log
                    path: build.log
                    if-no-files-found: error
          EOF

          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/deploy.yml')
          text = path.read_text()
          old_node = '          node-version: 24\n'
          old_install = '        run: npm install --legacy-peer-deps\n'
          if old_node not in text or old_install not in text:
              raise SystemExit('deploy dependency setup did not match expected content')
          text = text.replace(old_node, '          node-version: 24.4.0\n', 1)
          text = text.replace(old_install, '        run: npm ci\n', 1)
          path.write_text(text)
          PY

          rm .github/workflows/generate-lock.yml
      - name: Commit workflow changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "统一可复现构建与浏览器测试"
          git push origin HEAD:agent/harden-runtime-and-tests

name: Prepare repair workspace

on:
  push:
    branches:
      - agent/harden-runtime-and-tests
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
      - run: npm install --package-lock-only --ignore-scripts
      - uses: actions/upload-artifact@v4
        with:
          name: economy-repair-workspace
          path: |
            .github
            docs
            scripts
            server
            src
            src-tauri
            index.html
            package.json
            package-lock.json
            postcss.config.js
            tailwind.config.js
            tsconfig.json
            vite.config.ts
          include-hidden-files: true
          if-no-files-found: error

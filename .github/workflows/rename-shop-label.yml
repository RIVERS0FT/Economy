name: Rename shop label

on:
  push:
    branches:
      - agent/rename-gem-shop-to-shop

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Replace player-facing label
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import subprocess

          old = "\u5b9d\u77f3\u5546\u5e97"
          new = "\u5546\u5e97"

          for raw_path in subprocess.check_output(["git", "ls-files", "-z"]).split(b"\0"):
              if not raw_path:
                  continue
              path = Path(raw_path.decode("utf-8"))
              try:
                  text = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue
              updated = text.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")

          design_path = Path("docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md")
          design = design_path.read_text(encoding="utf-8")
          marker = "| 设置 | `settings` | `SettingsPage` | 资料、偏好、邀请、礼品和退出 |\n"
          rule = "\n“商店”是宝石兑换页面的唯一玩家可见名称；路由 ID 继续使用 `gem-shop`，React 组件继续使用 `GemShopPage`，服务器 API 与数据表继续沿用现有技术标识，不得仅为显示名称新增迁移或兼容路由。\n"
          if rule.strip() not in design:
              if marker not in design:
                  raise SystemExit("无法定位页面导航设计插入点")
              design_path.write_text(design.replace(marker, marker + rule, 1), encoding="utf-8")
          PY

          git rm .github/workflows/rename-shop-label.yml
          git diff --check

      - name: Commit rename
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: rename gem shop to shop"
          git push origin HEAD

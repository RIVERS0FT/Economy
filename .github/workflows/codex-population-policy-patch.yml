name: Codex population policy patch

on:
  push:
    branches:
      - codex/population-policy-simplification

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-policy-simplification
          fetch-depth: 0
      - name: Apply targeted large-file changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              'server/src/facility-groups.js',
              """function normalizeProductionWageMultiplier(value) {\n  const normalized = Math.floor(Number(value));\n  return Number.isSafeInteger(normalized) && normalized >= 5_000 && normalized <= 15_000\n    ? normalized\n    : null;\n}\n""",
              """function normalizeProductionWageMultiplier(value) {\n  const normalized = Math.floor(Number(value));\n  return Number.isSafeInteger(normalized) && normalized >= 5_000\n    ? normalized\n    : null;\n}\n\nfunction calculateProductionWage(cost, multiplierBps) {\n  const normalizedCost = Math.max(0, Math.floor(Number(cost)));\n  const normalizedMultiplier = normalizeProductionWageMultiplier(multiplierBps);\n  if (!Number.isSafeInteger(normalizedCost) || normalizedMultiplier === null) {\n    throw new Error('生产工资参数超出系统可表示范围');\n  }\n  const rounded = (BigInt(normalizedCost) * BigInt(normalizedMultiplier) + 5_000n) / 10_000n;\n  if (rounded > BigInt(Number.MAX_SAFE_INTEGER)) {\n    throw new Error('生产工资计算结果超出系统可表示范围');\n  }\n  return Number(rounded);\n}\n""",
          )
          replace_once(
              'server/src/facility-groups.js',
              "  const populationWage = Math.max(0, Math.round(requirements.cost * wageMultiplierBps / 10_000));",
              "  const populationWage = calculateProductionWage(requirements.cost, wageMultiplierBps);",
          )

          replace_once(
              'README.md',
              '> 人口经济管理规则：管理员后台可在“概况”内应用有期限的稳定需求政策或按政策立即补充人口钱包缺口；所有操作受全局比例、三类倍率、目标钱包、同周期发行上限、幂等和不可删除审计约束，禁止任意编辑人口余额、收入状态或既有订单。',
              '> 人口经济管理规则：管理员后台可在“概况”内查看完整当前参数和持续时间、应用有期限的稳定需求政策或按政策立即补充人口钱包缺口；参数不设业务上限，只保留下限、安全整数和计算结果范围校验。写操作继续要求幂等，但不要求管理备注、不生成调控记录，且禁止任意编辑人口余额、收入状态或既有订单。',
          )
          replace_once(
              'README.md',
              '稳定需求补充只按人口钱包缺口发行，并受三周期目标钱包与单周期上限约束。',
              '稳定需求补充只按人口钱包缺口发行，并受当前目标钱包参数与同周期补充比例约束。',
          )
          replace_once(
              'README.md',
              '人口生产工资按固定成本乘 50%～150% 的临时政策系数计算',
              '人口生产工资按固定成本乘不低于 50% 且不设业务上限的临时政策系数计算',
          )
          replace_once(
              'README.md',
              '管理员“概况”内增加只读人口经济区域，展示三类人口钱包、就业来源、施工托管、生产复杂度工资、稳定需求补充和货币发行统计。',
              '管理员“概况”内增加只读人口经济区域，展示三类人口钱包、就业来源、施工托管、生产复杂度工资、稳定需求补充、货币发行统计，以及完整当前人口政策参数、总持续时间、已持续时间和剩余时间。',
          )

          replace_once(
              'docs/README.md',
              '> 人口政策权威规则已纳入 `GIFT_CODE_AND_ADMIN_DESIGN.md`：仅允许受控稳定需求参数、缺口式立即补充、同周期上限、到期恢复、幂等和审计，不允许任意余额编辑。',
              '> 人口政策权威规则已纳入 `GIFT_CODE_AND_ADMIN_DESIGN.md`：仅允许受控稳定需求参数、缺口式立即补充、同周期约束、到期恢复和幂等，不要求管理备注、不生成调控记录；参数不设业务上限，但必须通过下限、安全整数和计算结果范围校验，且不允许任意余额编辑。',
          )
          docs_index = Path('docs/README.md')
          docs_text = docs_index.read_text()
          rule = '39. 人口政策参数、当前参数与持续时间展示、无管理备注、无调控记录、无业务上限及安全整数边界统一归属 `GIFT_CODE_AND_ADMIN_DESIGN.md`；就业来源与复杂度工资中的正数比例条必须保留最小可见填充，真实零值保持空轨道，并通过人口经济服务器测试、管理员浏览器测试和 `scripts/verify-staple-crops-demand.mjs` 防回退。'
          if rule not in docs_text:
              docs_index.write_text(docs_text.rstrip() + '\n' + rule + '\n')

          replace_once(
              'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md',
              '生产工资系数默认 100%，管理员可在 50%～150% 内设置临时值；已开始周期锁定开始时系数，政策修改和到期恢复从下一完整周期生效。',
              '生产工资系数默认 100%，管理员可设置不低于 50% 且不设业务上限的临时安全整数值；已开始周期锁定开始时系数，政策修改和到期恢复从下一完整周期生效。工资计算使用安全整数乘除，结果超出系统可表示范围时拒绝对应政策或周期结算，不得静默回退为 100%。',
          )

          gift = Path('docs/GIFT_CODE_AND_ADMIN_DESIGN.md')
          text = gift.read_text()
          replacements = [
              (
                  '- 世界概况，并在概况内部提供人口经济指标、受控人口政策调控和不可删除的调控记录；',
                  '- 世界概况，并在概况内部提供人口经济指标、完整当前人口政策参数与持续时间，以及受控人口政策调控；',
              ),
              (
                  '管理员导航仍固定为五分区，不新增“人口经济”第六分区。人口经济区域位于“概况”现有世界指标下方，展示三类人口可用／冻结／待结算资金、收入状态、食品／家庭预算、施工就业托管、生产／建造／仓储／市场服务累计收入、C1～C7 生产工资以及各类发行统计，并在同一区域提供受控“人口政策调控”和服务端分页的不可删除审计记录。',
                  '管理员导航仍固定为五分区，不新增“人口经济”第六分区。人口经济区域位于“概况”现有世界指标下方，展示三类人口可用／冻结／待结算资金、收入状态、食品／家庭预算、施工就业托管、生产／建造／仓储／市场服务累计收入、C1～C7 生产工资以及各类发行统计，并在同一区域提供完整当前人口政策参数、持续时间和受控“人口政策调控”。人口政策不显示、不查询也不新增调控记录。',
              ),
              (
                  '人口政策只允许调整稳定需求比例 0%～20%、生产工资系数 50%～150%、目标钱包 1～5 个周期、单周期补充上限 0%～150%、三类人口 50%～150% 倍率和 1～288 个周期有效期。所有比例以整数基点保存；三类倍率调整后的稳定预算总额不得突破全局稳定需求比例上限。生产工资系数只调整人口获得的生产工资，不改变玩家生产成本；已开始周期锁定原系数。非默认政策到期后由服务器自动恢复稳定需求 12%／生产工资 100%／3 周期／补充上限 100%／三类 100% 的模型默认值，服务重启不得延长有效期。',
                  '人口政策允许调整稳定需求比例、生产工资系数、目标钱包周期、单周期补充比例、三类人口倍率和政策有效周期。业务参数不设上限，只保留下限：稳定需求比例与单周期补充比例不低于 0%，生产工资系数与三类人口倍率不低于 50%，目标钱包与有效期不低于 1 个周期。所有参数必须是安全整数，比例以整数基点保存；到期周期、稳定预算、目标钱包、补充额度和生产工资等计算结果必须处于系统安全整数范围，超出时拒绝请求或结算。三类倍率调整后的稳定预算总额不得突破全局稳定需求比例确定的总额。生产工资系数只调整人口获得的生产工资，不改变玩家生产成本；已开始周期锁定原系数。非默认政策到期后由服务器自动恢复稳定需求 12%／生产工资 100%／3 周期／补充比例 100%／三类 100% 的模型默认值，服务重启不得延长有效期。',
              ),
              (
                  '更新政策、恢复默认和立即补充都必须要求 `Idempotency-Key` 与 8～200 字管理备注，在世界状态保存、幂等响应和 `economy_population_policy_audit` 审计记录的同一 SQLite 事务内完成。审计记录保存操作人、动作、目标、前后政策、实际发行、世界 revision 和时间，客户端使用服务端游标分页与 `VirtualList`。管理员刷新复用现有概况刷新按钮，不增加独立轮询；市场页面不得复用或展示该区域。',
                  '更新政策、恢复默认和立即补充都必须要求 `Idempotency-Key`，但不要求管理备注，也不写入人口调控审计记录。写操作必须在世界状态保存与通用幂等响应的同一 SQLite 事务内完成；更换幂等键不得绕过同周期补充约束。既有 `economy_population_policy_audit` 历史表只做数据库兼容保留，不再写入、不再提供管理员查询接口，也不在客户端展示。管理员刷新复用现有概况刷新按钮，不增加独立轮询；市场页面不得复用或展示该区域。',
              ),
              (
                  '- 人口当前资金使用六项紧凑指标；就业来源、C1～C7 工资与累计资金流使用比例条和紧凑数据网格，不得恢复十二张等权指标卡和三张重复人口大卡。',
                  '- 人口当前资金使用六项紧凑指标；就业来源、C1～C7 工资与累计资金流使用比例条和紧凑数据网格，不得恢复十二张等权指标卡和三张重复人口大卡。比例条的真实值为正时必须至少保留 4px 可见填充，并用精确小数或 `<0.1%` 表达小比例；真实值为零时保持空轨道。',
              ),
              (
                  '- 人口政策调控默认折叠为政策摘要，展开后才显示预设、参数、影响预估、备注与写操作；折叠不得清空草稿。审计默认显示最近三条摘要，展开后继续使用服务端游标分页与 `VirtualList`。',
                  '- 人口政策区域始终显示服务器当前执行的完整参数，包括稳定需求比例、目标钱包周期、单周期补充比例、生产工资系数、三类人口倍率、总持续周期、已持续周期、剩余周期、生效时间和预计到期时间；默认政策显示长期且不自动到期。展开后只显示拟应用预设、参数、调整前后影响预估与写操作，折叠不得清空草稿；不得恢复管理备注或人口调控记录。',
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'GIFT doc expected one match, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)
          text = text.replace('- `GET /api/game/admin/population-economy/audit`\n', '')
          marker = '- 让左侧工作台或封禁事件列表创建新的页面级滚动容器，破坏共享 `.page-scroll` 的唯一纵向滚动所有权。'
          additions = """- 为人口政策恢复固定业务上限、管理备注、调控审计写入、审计查询接口或客户端调控记录；\n- 隐藏当前人口政策任一参数、总持续时间、已持续时间、剩余时间、生效时间或预计到期时间；\n- 让正数就业来源或复杂度工资比例因整数四舍五入变成无色空条，或让真实零值显示伪造填充；\n"""
          if additions.strip() not in text:
              if marker not in text:
                  raise SystemExit('GIFT doc anti-regression marker missing')
              text = text.replace(marker, additions + marker, 1)
          gift.write_text(text)

          server_doc = Path('docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md')
          lines = server_doc.read_text().splitlines()
          changed = 0
          output = []
          standard = '人口政策更新、恢复默认和立即补充只保存权威世界状态与通用幂等响应，不要求管理备注，也不新增调控审计记录；既有 `economy_population_policy_audit` 历史表仅为数据库兼容保留，不再写入或提供查询接口。'
          for line in lines:
              if '/population-economy/audit' in line:
                  changed += 1
                  continue
              if 'economy_population_policy_audit' in line:
                  changed += 1
                  if line.lstrip().startswith('|'):
                      output.append('| `economy_population_policy_audit` | 历史兼容表；人口政策写操作不再新增记录，管理员接口不提供查询 |')
                  else:
                      output.append(standard)
                  continue
              if '人口政策' in line and ('8～200' in line or ('调控' in line and '审计' in line)):
                  changed += 1
                  output.append(standard)
                  continue
              output.append(line)
          if changed == 0:
              raise SystemExit('server design population audit references not found')
          server_doc.write_text('\n'.join(output) + '\n')
          PY
      - name: Commit targeted changes and remove helper workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/codex-population-policy-patch.yml
          git add README.md docs server/src/facility-groups.js
          git commit -m "同步人口政策与工资设计规则"
          git push origin HEAD:codex/population-policy-simplification

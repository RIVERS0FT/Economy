name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/expand-industry-fruit
          fetch-depth: 0
      - name: Apply implementation payload
        id: transform
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(agent-industry-script-part-*)
          if (( ${#parts[@]} != 6 )); then
            echo "Implementation payload is not complete." | tee agent-transform.log
            exit 1
          fi
          cat "${parts[@]}" > agent-apply-industry.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('agent-apply-industry.py')
          source = path.read_text()
          source = source.replace(
              'bc490100ee79db775ad248fc99a4ab18447ead5a5eea70603c90f2c4b4006d9',
              'bc490100ee79db775ad248fc99a4ab18447ead5a5e5aa70603c90f2c4b4006d9',
          )
          source = source.replace(
              "    'appliance-factory': '家电厂',\\n']]}}",
              "    'appliance-factory': '家电厂',\\n\"]]}}",
          )
          path.write_text(source)
          PY
          echo "3cdb03ef5b6fe0123fa7745cc6a583837b1361a0dd59fd6460383ab0637b1a1e  agent-apply-industry.py" | sha256sum --check -
          set +e
          python3 agent-apply-industry.py > agent-transform.log 2>&1
          status=$?
          set -e
          if (( status != 0 )); then
            exit "$status"
          fi
          rm -f "${parts[@]}" agent-apply-industry.py agent-transform.log
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit
      - name: Upload transformation diagnostics
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: agent-industry-diagnostics
          path: |
            agent-apply-industry.py
            agent-transform.log
            agent-industry-script-part-*
          retention-days: 1
      - name: Fail transformation
        if: steps.transform.outcome == 'failure'
        run: exit 1

name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply implementation payload
        shell: bash
        run: |
          set -euo pipefail
          payload=agent-industry-payload.tar.gz.b64
          if [[ ! -f "$payload" ]]; then
            echo "No implementation payload in this commit."
            exit 0
          fi
          base64 --decode "$payload" > agent-industry-payload.tar.gz
          echo "a0f28189bf6be3bc67dfeb4ec6fbe08d218afccad3c15446c36cf258988727eb  agent-industry-payload.tar.gz" | sha256sum --check -
          tar -xzf agent-industry-payload.tar.gz
          rm -f "$payload" agent-industry-payload.tar.gz
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit

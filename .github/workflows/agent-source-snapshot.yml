name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/expand-industry-fruit
          fetch-depth: 0
      - name: Apply implementation payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(agent-industry-script-part-*)
          if (( ${#parts[@]} != 6 )); then
            echo "Implementation payload is not complete."
            exit 0
          fi
          cat "${parts[@]}" > agent-apply-industry.py
          python3 agent-apply-industry.py
          rm -f "${parts[@]}" agent-apply-industry.py
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit

name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Apply implementation payload
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch agent/expand-industry-fruit "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          shopt -s nullglob
          parts=(agent-industry-script-part-*)
          if (( ${#parts[@]} != 6 )); then
            echo "Implementation payload is not complete."
            exit 1
          fi
          cat "${parts[@]}" > agent-apply-industry.py
          python3 -c 'from pathlib import Path; p=Path("agent-apply-industry.py"); b=bytearray(p.read_bytes()); b[60705:60706]=b"5a"; b[61027]=34; p.write_bytes(b)'
          echo "3cdb03ef5b6fe0123fa7745cc6a583837b1361a0dd59fd6460383ab0637b1a1e  agent-apply-industry.py" | sha256sum --check -
          python3 agent-apply-industry.py
          echo "TRANSFORM_OK"
          rm -f "${parts[@]}" agent-apply-industry.py agent-transform-diagnostic.txt
          echo "CLEANUP_OK"
          git status --short
          git add -A
          echo "ADD_OK"
          git status --short
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          set +e
          git commit -m "feat: 扩展水果与产业目录"
          commit_status=$?
          set -e
          echo "COMMIT_STATUS=${commit_status}"
          if (( commit_status != 0 )); then exit "$commit_status"; fi
          set +e
          git push origin HEAD:agent/expand-industry-fruit
          push_status=$?
          set -e
          echo "PUSH_STATUS=${push_status}"
          exit "$push_status"

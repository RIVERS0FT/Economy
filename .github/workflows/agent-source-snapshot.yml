name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply implementation payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(agent-industry-patch-part-*)
          if (( ${#parts[@]} != 4 )); then
            echo "Implementation payload is not complete."
            exit 0
          fi
          cat "${parts[@]}" > agent-industry.patch
          echo "8227828d7b6a7a23e0b92be205e41c66d26ed846ef871e694dbb598d504d12c3  agent-industry.patch" | sha256sum --check -
          git apply --index agent-industry.patch
          rm -f "${parts[@]}" agent-industry.patch
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit

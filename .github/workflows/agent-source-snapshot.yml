name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/expand-industry-fruit
          fetch-depth: 0
      - name: Apply implementation payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(agent-industry-script-part-*)
          if (( ${#parts[@]} != 6 )); then
            echo "Implementation payload is not complete."
            exit 1
          fi
          cat "${parts[@]}" > agent-apply-industry.py
          python3 -c 'from pathlib import Path; p=Path("agent-apply-industry.py"); b=bytearray(p.read_bytes()); b[52472:52473]=b"5a"; b[52758]=34; p.write_bytes(b)'
          echo "3cdb03ef5b6fe0123fa7745cc6a583837b1361a0dd59fd6460383ab0637b1a1e  agent-apply-industry.py" | sha256sum --check -
          python3 agent-apply-industry.py
          rm -f "${parts[@]}" agent-apply-industry.py agent-transform-diagnostic.txt
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit

name: Agent Industry Payload

on:
  push:
    branches:
      - agent/expand-industry-fruit

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply implementation payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(agent-industry-payload-part-*)
          if (( ${#parts[@]} != 2 )); then
            echo "Implementation payload is not complete."
            exit 0
          fi
          cat "${parts[@]}" | base64 --decode > agent-industry.patch.gz
          echo "cdd657ef88baca24005104b8fd4bea4dd4c44e8576f5f8600ed039aa28702bf4  agent-industry.patch.gz" | sha256sum --check -
          gzip --decompress --stdout agent-industry.patch.gz > agent-industry.patch
          git apply --index agent-industry.patch
          rm -f "${parts[@]}" agent-industry.patch.gz agent-industry.patch
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "feat: 扩展水果与产业目录"
          git push origin HEAD:agent/expand-industry-fruit

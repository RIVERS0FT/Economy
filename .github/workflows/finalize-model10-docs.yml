name: Finalize model 10 authoritative docs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/bidirectional-demand-pricing-model10'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/bidirectional-demand-pricing-model10
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Normalize authoritative model references
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          paths = [Path('README.md'), *Path('docs').glob('*.md')]
          for path in paths:
              content = path.read_text()
              content = content.replace('市场需求模型版本为 9', '市场需求模型版本为 10')
              content = content.replace('市场需求模型版本：`9`', '市场需求模型版本：`10`')
              content = content.replace('市场需求模型版本：9', '市场需求模型版本：10')
              content = content.replace('市场需求模型 9', '市场需求模型 10')
              content = content.replace('模型 9', '模型 10')
              content = content.replace('`marketDemand.modelVersion = 9`', '`marketDemand.modelVersion = 10`')
              path.write_text(content)

          for path in [Path('docs/PRODUCT_AND_GAMEPLAY_DESIGN.md'), Path('docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md')]:
              content = path.read_text().replace('> 更新时间：2026-07-22', '> 更新时间：2026-07-24').replace('> 更新时间：2026-07-23', '> 更新时间：2026-07-24')
              path.write_text(content)

          stale = []
          needles = [
              '市场需求模型版本为 9',
              '市场需求模型版本：`9`',
              '市场需求模型版本：9',
              '市场需求模型 9',
              '模型 9',
              '`marketDemand.modelVersion = 9`',
          ]
          for path in paths:
              content = path.read_text()
              for needle in needles:
                  if needle in content:
                      stale.append(f'{path}: {needle}')
          if stale:
              raise RuntimeError('stale model references remain: ' + ', '.join(stale))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Commit final docs and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-model10-docs.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "统一模型 10 权威文档"
          git push origin HEAD:agent/bidirectional-demand-pricing-model10

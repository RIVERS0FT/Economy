name: Sync runtime verifier

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-runtime-and-tests
      - name: Update verifier
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-email-registration.mjs')
          text = path.read_text()
          old = '设置页只允许玩家资料与四项统计、客户端偏好、邀请入口、礼品兑换、管理员入口、退出登录和重置经济状态'
          new = '设置页只允许玩家资料与四项统计、已经实现的客户端偏好、邀请入口、礼品兑换、管理员入口、退出登录和重置经济状态'
          if old not in text:
              raise SystemExit('expected verifier text not found')
          path.write_text(text.replace(old, new))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify-email-registration.mjs
          git commit -m "同步设置页设计验证"
          git push origin HEAD:agent/harden-runtime-and-tests

name: Apply Deploy Log Design Patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'codex/deploy-failure-artifact' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/deploy-failure-artifact

      - name: Merge failure log rules into server deployment design
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          design_path = Path('docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md')
          design = design_path.read_text()
          anchor = '- 浏览器运行时测试使用固定 Playwright 版本与 Chromium，至少覆盖 localStorage 拒绝访问仍能渲染、正式设置控件存在以及无效设置控件不存在；测试 artifact 只在失败时上传并保留 3 天，完整标准输出继续保存在 Actions job log。\n'
          rule = '- 部署中的每个 shell 命令步骤必须把标准输出和标准错误保存到独立临时日志；任一步失败时只把该失败步骤的完整命令输出复制到 `economy-deploy-failure-<run>-<attempt>` Artifact，成功步骤日志不得上传。Artifact 保留 3 天并使用文本高压缩；完整失败输出不得依赖可能被截断的 job log，也不得再为单次构建失败创建临时诊断工作流。\n'
          if rule not in design:
            if design.count(anchor) != 1:
              raise SystemExit('服务器部署设计插入点不唯一')
            design = design.replace(anchor, anchor + rule, 1)
            design_path.write_text(design)

          verifier_path = Path('scripts/verify-runtime-reliability.mjs')
          verifier = verifier_path.read_text()
          verifier = verifier.replace(
            "  ['docs/DEPLOYMENT_FAILURE_LOG_DESIGN.md', '成功步骤日志不得上传'],\n  ['docs/DEPLOYMENT_FAILURE_LOG_DESIGN.md', '不得再为单次构建失败创建临时诊断工作流'],\n",
            "  ['docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md', '成功步骤日志不得上传'],\n  ['docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md', '不得再为单次构建失败创建临时诊断工作流'],\n",
            1,
          )
          verifier_path.write_text(verifier)
          PY

      - name: Commit design integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/SERVER_ARCHITECTURE_AND_DEPLOYMENT_DESIGN.md scripts/verify-runtime-reliability.mjs
          git commit -m "合并部署失败日志设计规则"
          git push origin HEAD:codex/deploy-failure-artifact

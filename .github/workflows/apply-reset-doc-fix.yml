name: Apply reset doc fix

on:
  push:
    branches:
      - codex/remove-economy-reset

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/remove-economy-reset
          fetch-depth: 0
      - name: Fix settings responsibility
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md')
          text = path.read_text(encoding='utf-8')
          old = '| 设置 | `settings` | `SettingsPage` | 资料、偏好、邀请、礼品、退出和重置 |'
          new = '| 设置 | `settings` | `SettingsPage` | 资料、偏好、邀请、礼品和退出 |'
          if old not in text:
              raise SystemExit('settings responsibility row not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          Path('.github/workflows/apply-reset-doc-fix.yml').unlink()
          PY
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "修正设置页唯一职责 [reset-doc-fix]"
          git push origin HEAD:codex/remove-economy-reset

name: Apply gem shop change

on:
  push:
    branches:
      - agent/gem-shop

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gem-shop
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Assemble gem shop changes
        run: |
          node scripts/repair-gem-shop-script.mjs
          node scripts/apply-gem-shop-change.mjs
      - name: Remove one-time assembly files
        run: |
          rm -f scripts/apply-gem-shop-change.mjs
          rm -f scripts/repair-gem-shop-script.mjs
          rm -f .github/workflows/apply-gem-shop.yml
      - name: Commit assembled changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "增加独立宝石商店"
          git push origin HEAD:agent/gem-shop

name: Apply facility three-state implementation

on:
  push:
    branches: [agent/facility-three-state-auto-recovery]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/facility-three-state-auto-recovery
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm
      - name: Decode implementation script
        shell: bash
        run: |
          cat > /tmp/facility-script.b64 <<'PAYLOAD'

PAYLOAD
          base64 -d /tmp/facility-script.b64 | gzip -d > /tmp/apply-facility-three-state.mjs
          node --check /tmp/apply-facility-three-state.mjs
      - name: Apply implementation
        run: node /tmp/apply-facility-three-state.mjs
      - name: Install dependencies
        run: npm ci
      - name: Run full build
        run: npm run build
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "重构工厂三态与自动恢复"
          git push origin HEAD:agent/facility-three-state-auto-recovery

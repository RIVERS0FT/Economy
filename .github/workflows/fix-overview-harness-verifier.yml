name: Fix overview harness verifier

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/fix-shop-layout'
    runs-on: ubuntu-latest
    steps:
      - name: Update verifier
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone -q --branch agent/fix-shop-layout "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python3 <<'PY'
          from pathlib import Path

          path = Path('scripts/verify-overview-content.mjs')
          text = path.read_text()
          old = "  \"view === 'overview' ? <OverviewHarness /> : <SettingsHarness />\","
          new = "  \"view === 'overview'\",\n  '<OverviewHarness />',\n  '<SettingsHarness />',"
          if text.count(old) != 1:
              raise SystemExit(f'expected one overview harness check, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          rm .github/workflows/fix-overview-harness-verifier.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: update overview harness verifier"
          git push -q origin HEAD:agent/fix-shop-layout

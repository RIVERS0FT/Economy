name: Apply work cooldown 3s

on:
  push:
    branches:
      - agent/work-cooldown-3s

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply exact rule update
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              'server/src/domain-core.js': [
                  ('workCooldownMs: 10_000', 'workCooldownMs: 3_000', 1),
                  ('完成工作，固定冷却 10 秒', '完成工作，固定冷却 3 秒', 1),
              ],
              'README.md': [
                  ('工作冷却固定为 10 秒，不随连续工作次数增加。', '工作冷却固定为 3 秒，不随连续工作次数增加。', 1),
              ],
              'docs/PRODUCT_AND_GAMEPLAY_DESIGN.md': [
                  ('> 更新时间：2026-07-20', '> 更新时间：2026-07-21', 1),
                  ('工作冷却固定为 10 秒，以服务器时间为准。', '工作冷却固定为 3 秒，以服务器时间为准。', 1),
              ],
              'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md': [
                  ('> 更新时间：2026-07-20', '> 更新时间：2026-07-21', 1),
                  ('固定 10s 冷却', '固定 3s 冷却', 1),
              ],
              'src/pages/OverviewPage.tsx': [
                  ('固定 10s 冷却', '固定 3s 冷却', 1),
              ],
              'scripts/verify-display-format.mjs': [
                  ("'固定 10s 冷却'", "'固定 3s 冷却'", 1),
                  ("'工作冷却固定为 10 秒'", "'工作冷却固定为 3 秒'", 1),
              ],
              'scripts/verify-market-assets.mjs': [
                  ("'workCooldownMs: 10_000'", "'workCooldownMs: 3_000'", 1),
              ],
              'server/test/domain.test.js': [
                  ("  assert.equal(applyAction(world, alice, 'work', {}, now + 9_999).ok, false);\n  assert.equal(applyAction(world, alice, 'work', {}, now + 10_000).ok, true);",
                   "  assert.equal(applyAction(world, alice, 'work', {}, now + 2_999).ok, false);\n  assert.equal(applyAction(world, alice, 'work', {}, now + 3_000).ok, true);", 1),
              ],
          }

          for filename, edits in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding='utf-8')
              for old, new, expected_count in edits:
                  count = text.count(old)
                  if count != expected_count:
                      raise SystemExit(f'{filename}: expected {expected_count} occurrence(s) of {old!r}, found {count}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          stale = {
              'server/src/domain-core.js': ['workCooldownMs: 10_000', '固定冷却 10 秒'],
              'README.md': ['工作冷却固定为 10 秒'],
              'docs/PRODUCT_AND_GAMEPLAY_DESIGN.md': ['工作冷却固定为 10 秒'],
              'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md': ['固定 10s 冷却'],
              'src/pages/OverviewPage.tsx': ['固定 10s 冷却'],
              'scripts/verify-market-assets.mjs': ["'workCooldownMs: 10_000'"],
          }
          for filename, fragments in stale.items():
              text = Path(filename).read_text(encoding='utf-8')
              for fragment in fragments:
                  if fragment in text:
                      raise SystemExit(f'{filename}: stale rule remains: {fragment}')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Verify cooldown and presentation
        run: |
          node --experimental-strip-types scripts/verify-display-format.mjs
          node --experimental-strip-types scripts/verify-market-assets.mjs
          node scripts/verify-authoritative-countdowns.mjs
          node --test server/test/domain.test.js
          npm run server:check
          npm run typecheck

      - name: Commit verified changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-work-cooldown-3s.yml
          git add README.md docs/PRODUCT_AND_GAMEPLAY_DESIGN.md docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md src/pages/OverviewPage.tsx scripts/verify-display-format.mjs scripts/verify-market-assets.mjs server/src/domain-core.js server/test/domain.test.js
          git commit -m "Set work cooldown to 3 seconds"
          git push origin HEAD:agent/work-cooldown-3s

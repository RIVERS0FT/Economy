name: Apply global interaction modality protocol

on:
  push:
    branches:
      - agent/global-interaction-modality

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/global-interaction-modality

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply interaction protocol
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYTHON'
          from pathlib import Path
          import json

          def read(path):
              return Path(path).read_text()

          def write(path, content):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content)

          def replace_once(path, old, new):
              content = read(path)
              if old not in content:
                  raise RuntimeError(f'{path} 缺少待替换内容: {old[:120]!r}')
              write(path, content.replace(old, new, 1))

          write('src/app/interactionBootstrap.ts', """import { configureInputModality } from '../utils/inputModality';

configureInputModality();
""")

          write('src/styles/interaction-states.css', """/* Shared input-modality interaction protocol.
 * Runtime modality is authoritative for hover and focus visuals; capability
 * media queries remain a second guard against sticky touch hover behavior. */

@media (hover: hover) and (pointer: fine) {
  html[data-input-modality='mouse'] button:hover:not(:disabled),
  html[data-input-modality='mouse'] .ui-button:hover:not(:disabled) {
    transform: translateY(-1px);
    filter: brightness(1.04);
  }

  html[data-input-modality='mouse'] [data-ui-interactive='surface']:hover:not(:disabled) {
    border-color: var(--ui-interactive-hover-border-color, var(--color-border-strong));
    background: var(--ui-interactive-hover-background, var(--color-surface-hover));
    transform: var(--ui-interactive-hover-transform, none);
    filter: var(--ui-interactive-hover-filter, none);
  }
}

[data-ui-interactive='surface']:active:not(:disabled) {
  transform: var(--ui-interactive-active-transform, scale(0.98));
}

html:not([data-input-modality='keyboard']) [data-ui-interactive='surface']:focus-visible {
  outline: none;
  box-shadow: none;
}

html[data-input-modality='keyboard'] [data-ui-interactive='surface']:focus-visible {
  outline: 2px solid var(--ui-interactive-focus-color, var(--color-focus-ring, var(--color-success)));
  outline-offset: var(--ui-interactive-focus-offset, 2px);
  box-shadow: var(--ui-interactive-focus-shadow, var(--shadow-focus));
}
""")

          write('scripts/verify-interaction-modality.mjs', r"""import {
  existsSync,
  readFileSync,
  readdirSync,
  statSync,
  writeFileSync,
} from 'node:fs';
import { relative, resolve } from 'node:path';
import postcss from 'postcss';

const root = process.cwd();
const baselinePath = resolve(root, 'scripts/interaction-hover-legacy.json');
const writeBaseline = process.argv.includes('--write-baseline');
const failures = [];
const read = (path) => readFileSync(resolve(root, path), 'utf8');
const requireFile = (path) => {
  if (!existsSync(resolve(root, path))) failures.push(`缺少文件: ${path}`);
};
const requireText = (path, text) => {
  if (!read(path).includes(text)) failures.push(`${path} 缺少: ${text}`);
};
const forbidText = (path, text) => {
  if (read(path).includes(text)) failures.push(`${path} 不应包含: ${text}`);
};

function walkFiles(directory) {
  if (!existsSync(directory)) return [];
  return readdirSync(directory).flatMap((name) => {
    const path = resolve(directory, name);
    return statSync(path).isDirectory() ? walkFiles(path) : [path];
  });
}

function normalize(value) {
  return value.replace(/\s+/g, ' ').trim();
}

function hasFineMouseGuard(rule) {
  const selectorHasMouseModality = /html\[data-input-modality=(?:"mouse"|'mouse')\]/.test(rule.selector);
  let hasHoverCapability = false;
  let hasFinePointerCapability = false;
  for (let parent = rule.parent; parent; parent = parent.parent) {
    if (parent.type !== 'atrule' || parent.name !== 'media') continue;
    hasHoverCapability ||= /\(\s*hover\s*:\s*hover\s*\)/.test(parent.params);
    hasFinePointerCapability ||= /\(\s*pointer\s*:\s*fine\s*\)/.test(parent.params);
  }
  return selectorHasMouseModality && hasHoverCapability && hasFinePointerCapability;
}

function collectUnguardedHoverRules() {
  const styleRoot = resolve(root, 'src/styles');
  const entries = [];
  for (const absolutePath of walkFiles(styleRoot).filter((path) => path.endsWith('.css'))) {
    const file = relative(root, absolutePath).replaceAll('\\', '/');
    const css = readFileSync(absolutePath, 'utf8');
    const parsed = postcss.parse(css, { from: file });
    parsed.walkRules((rule) => {
      if (!rule.selector.includes(':hover') || hasFineMouseGuard(rule)) return;
      entries.push(`${file}::${normalize(rule.selector)}`);
    });
  }
  return Array.from(new Set(entries)).sort();
}

const requiredFiles = [
  'src/utils/inputModality.ts',
  'src/app/interactionBootstrap.ts',
  'src/styles/interaction-states.css',
  'src/pages/ProductionPage.tsx',
  'src/styles/facility-group-card-grid.css',
  'tests/browser/facility-detail-sheet.spec.ts',
  'tests/browser/input-modality.spec.ts',
  'docs/UI_DESIGN_SYSTEM.md',
  'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md',
  'docs/FACILITY_CATALOG_PRESENTATION_DESIGN.md',
  'docs/README.md',
  'README.md',
  'package.json',
];
requiredFiles.forEach(requireFile);

if (failures.length === 0) {
  for (const text of [
    'configureInputModality();',
    "from '../utils/inputModality'",
  ]) requireText('src/app/interactionBootstrap.ts', text);

  for (const text of [
    "@media (hover: hover) and (pointer: fine)",
    "html[data-input-modality='mouse']",
    "[data-ui-interactive='surface']:hover:not(:disabled)",
    "html:not([data-input-modality='keyboard']) [data-ui-interactive='surface']:focus-visible",
    "html[data-input-modality='keyboard'] [data-ui-interactive='surface']:focus-visible",
    '--ui-interactive-active-transform',
  ]) requireText('src/styles/interaction-states.css', text);

  for (const text of [
    'data-ui-interactive="surface"',
    'detailTriggerRef.current = trigger;',
    'returnFocusRef.current?.focus()',
  ]) requireText('src/pages/ProductionPage.tsx', text);

  for (const text of [
    '--ui-interactive-hover-border-color',
    '--ui-interactive-hover-background',
    '--ui-interactive-active-transform',
  ]) requireText('src/styles/facility-group-card-grid.css', text);
  for (const forbidden of [
    '.facility-cluster-selector-card:hover',
    '.facility-cluster-selector-card:active',
    '.facility-cluster-selector-card:focus-visible',
  ]) forbidText('src/styles/facility-group-card-grid.css', forbidden);
  forbidText('src/styles/design-system.css', 'button:hover:not(:disabled)');

  const rootFiles = [
    ...walkFiles(resolve(root, 'src')),
    ...walkFiles(resolve(root, 'tests/browser')),
  ].filter((path) => path.endsWith('.tsx') && readFileSync(path, 'utf8').includes('createRoot('));
  for (const absolutePath of rootFiles) {
    const file = relative(root, absolutePath).replaceAll('\\', '/');
    const content = readFileSync(absolutePath, 'utf8');
    if (!content.includes('interactionBootstrap')) {
      failures.push(`${file} 是 React 根入口但未安装 interactionBootstrap`);
    }
    if (content.includes('styles/design-system.css')) {
      const designIndex = content.indexOf('styles/design-system.css');
      const interactionIndex = content.indexOf('styles/interaction-states.css');
      if (interactionIndex < designIndex) {
        failures.push(`${file} 必须在 design-system.css 之后加载 interaction-states.css`);
      }
    }
  }

  for (const text of [
    '输入方式与共享交互状态',
    '`src/app/interactionBootstrap.ts`',
    '`src/styles/interaction-states.css`',
    '`data-ui-interactive="surface"`',
    '`scripts/verify-interaction-modality.mjs`',
    '`tests/browser/input-modality.spec.ts`',
  ]) requireText('docs/UI_DESIGN_SYSTEM.md', text);
  requireText('docs/INDUSTRY_AND_PRODUCTION_DESIGN.md', '触摸关闭后必须恢复为仅由工厂运行状态决定的基础视觉');
  requireText('docs/FACILITY_CATALOG_PRESENTATION_DESIGN.md', '触摸关闭悬浮框后不得残留悬停、按压或焦点选中视觉');
  requireText('docs/README.md', '输入方式、共享交互表面');
  requireText('README.md', '全局输入方式由最近一次有效输入动态决定');

  for (const text of [
    "Input.dispatchTouchEvent",
    "data-input-modality",
    "outlineStyle",
    "await expect(trigger).toBeFocused()",
  ]) requireText('tests/browser/facility-detail-sheet.spec.ts', text);
  for (const text of [
    'mixed input switches shared surface hover and focus without reload',
    "dataset.inputModality",
    "trigger.hover()",
    "trigger.tap()",
  ]) requireText('tests/browser/input-modality.spec.ts', text);

  requireText('package.json', 'node scripts/verify-interaction-modality.mjs');
}

const currentUnguardedHoverRules = collectUnguardedHoverRules();
if (writeBaseline) {
  writeFileSync(baselinePath, `${JSON.stringify({
    description: 'Existing unguarded hover selectors. New entries are forbidden; migrate existing entries to the shared interaction protocol when touched.',
    unguardedHoverRules: currentUnguardedHoverRules,
  }, null, 2)}\n`);
} else if (!existsSync(baselinePath)) {
  failures.push('缺少 scripts/interaction-hover-legacy.json；先由维护流程生成现有遗留 hover 基线');
} else {
  const baseline = JSON.parse(readFileSync(baselinePath, 'utf8'));
  const allowed = new Set(baseline.unguardedHoverRules ?? []);
  const unexpected = currentUnguardedHoverRules.filter((entry) => !allowed.has(entry));
  if (unexpected.length > 0) {
    failures.push(
      `发现新增的未受输入方式约束 hover：\n${unexpected.map((entry) => `  - ${entry}`).join('\n')}\n` +
      '请使用 data-ui-interactive="surface" 与 interaction-states.css，或在鼠标输入方式和 hover/pointer 能力查询下显式约束。',
    );
  }
}

if (failures.length > 0) {
  console.error('全局输入方式与共享交互状态验证失败：');
  failures.forEach((failure) => console.error(`- ${failure}`));
  process.exit(1);
}

console.log(`全局输入方式验证通过；当前遗留未约束 hover ${currentUnguardedHoverRules.length} 条，新增条目为 0。`);
""")

          write('tests/browser/facility-detail-sheet.spec.ts', """import { expect, test, type Locator, type Page } from '@playwright/test';

async function waitForSheetAnimations(dialog: Locator) {
  await expect.poll(() => dialog.evaluate((element) => (
    element.getAnimations().every((animation) => animation.playState === 'finished')
  ))).toBe(true);
}

async function swipeDown(page: Page, handle: Locator, distance = 180) {
  const box = await handle.boundingBox();
  expect(box).not.toBeNull();
  const x = box!.x + box!.width / 2;
  const startY = box!.y + box!.height / 2;
  const client = await page.context().newCDPSession(page);
  await client.send('Input.dispatchTouchEvent', {
    type: 'touchStart',
    touchPoints: [{ x, y: startY }],
  });
  for (const offset of [24, 64, 112, distance]) {
    await client.send('Input.dispatchTouchEvent', {
      type: 'touchMove',
      touchPoints: [{ x, y: startY + offset }],
    });
  }
  await client.send('Input.dispatchTouchEvent', {
    type: 'touchEnd',
    touchPoints: [],
  });
}

test.describe('mobile facility detail sheet close lifecycle', () => {
  test.use({
    viewport: { width: 390, height: 844 },
    hasTouch: true,
  });

  test('backdrop touch closes after every reopen and restores focus and page scrolling', async ({ page }) => {
    await page.goto('runtime-test.html?view=production&scenario=activity');

    const trigger = page.getByRole('button', { name: /机械工厂，数量 18，运行中/ });
    const dialog = page.getByRole('dialog', { name: /机械工厂/ });
    const pageScroll = page.locator('.page-scroll');

    await expect(trigger).toBeVisible();

    for (let iteration = 0; iteration < 3; iteration += 1) {
      await trigger.tap();
      await expect(dialog).toBeVisible();
      await expect(pageScroll).toHaveCSS('overflow-y', 'hidden');
      await waitForSheetAnimations(dialog);

      const sheetBox = await dialog.boundingBox();
      expect(sheetBox).not.toBeNull();
      expect(sheetBox!.y).toBeGreaterThan(8);
      expect(sheetBox!.y).toBeLessThan(844);
      await page.touchscreen.tap(sheetBox!.x + sheetBox!.width / 2, Math.max(8, sheetBox!.y / 2));

      await expect(dialog).toBeHidden();
      await expect(pageScroll).toHaveCSS('overflow-y', 'auto');
      await expect(trigger).toBeFocused();
    }
  });

  test('swipe close restores the touch surface visual while preserving semantic focus', async ({ page }) => {
    await page.goto('runtime-test.html?view=production&scenario=activity');

    const trigger = page.getByRole('button', { name: /机械工厂，数量 18，运行中/ });
    const dialog = page.getByRole('dialog', { name: /机械工厂/ });
    const handle = page.locator('.facility-detail-sheet-drag-handle');
    const pageScroll = page.locator('.page-scroll');
    await page.mouse.move(1, 1);

    const baseVisual = await trigger.evaluate((element) => {
      const style = getComputedStyle(element);
      return {
        background: style.background,
        borderColor: style.borderColor,
      };
    });

    for (let iteration = 0; iteration < 3; iteration += 1) {
      await trigger.tap();
      await expect(dialog).toBeVisible();
      await waitForSheetAnimations(dialog);
      await swipeDown(page, handle);

      await expect(dialog).toBeHidden();
      await expect(pageScroll).toHaveCSS('overflow-y', 'auto');
      await expect(trigger).toBeFocused();
      await expect(page.locator('html')).toHaveAttribute('data-input-modality', 'touch');

      const closedVisual = await trigger.evaluate((element) => {
        const style = getComputedStyle(element);
        return {
          background: style.background,
          borderColor: style.borderColor,
          transform: style.transform,
          outlineStyle: style.outlineStyle,
          boxShadow: style.boxShadow,
        };
      });
      expect(closedVisual.background).toBe(baseVisual.background);
      expect(closedVisual.borderColor).toBe(baseVisual.borderColor);
      expect(closedVisual.transform).toBe('none');
      expect(closedVisual.outlineStyle).toBe('none');
      expect(closedVisual.boxShadow).toBe('none');
    }
  });

  test('keyboard escape keeps the returned trigger focus visibly accessible', async ({ page }) => {
    await page.goto('runtime-test.html?view=production&scenario=activity');

    const trigger = page.getByRole('button', { name: /机械工厂，数量 18，运行中/ });
    const dialog = page.getByRole('dialog', { name: /机械工厂/ });
    await trigger.focus();
    await page.keyboard.press('Enter');
    await expect(dialog).toBeVisible();
    await waitForSheetAnimations(dialog);
    await page.keyboard.press('Escape');

    await expect(dialog).toBeHidden();
    await expect(trigger).toBeFocused();
    await expect(page.locator('html')).toHaveAttribute('data-input-modality', 'keyboard');
    const focusVisual = await trigger.evaluate((element) => {
      const style = getComputedStyle(element);
      return {
        outlineStyle: style.outlineStyle,
        outlineWidth: style.outlineWidth,
        boxShadow: style.boxShadow,
      };
    });
    expect(focusVisual.outlineStyle).toBe('solid');
    expect(focusVisual.outlineWidth).toBe('2px');
    expect(focusVisual.boxShadow).not.toBe('none');
  });
});
""")

          write('tests/browser/input-modality.spec.ts', """import { expect, test } from '@playwright/test';

test.describe('shared input modality interaction protocol', () => {
  test.use({
    viewport: { width: 390, height: 844 },
    hasTouch: true,
  });

  test('mixed input switches shared surface hover and focus without reload', async ({ page }) => {
    await page.goto('runtime-test.html?view=production&scenario=activity');

    const trigger = page.getByRole('button', { name: /机械工厂，数量 18，运行中/ });
    const dialog = page.getByRole('dialog', { name: /机械工厂/ });
    await page.mouse.move(1, 1);
    const baseBackground = await trigger.evaluate((element) => getComputedStyle(element).background);

    await page.mouse.click(2, 2);
    await trigger.hover();
    await expect.poll(() => page.evaluate(() => document.documentElement.dataset.inputModality)).toBe('mouse');
    const mouseBackground = await trigger.evaluate((element) => getComputedStyle(element).background);
    expect(mouseBackground).not.toBe(baseBackground);

    await trigger.tap();
    await expect(dialog).toBeVisible();
    await expect.poll(() => page.evaluate(() => document.documentElement.dataset.inputModality)).toBe('touch');
    const touchBackground = await trigger.evaluate((element) => getComputedStyle(element).background);
    expect(touchBackground).toBe(baseBackground);

    await page.keyboard.press('Escape');
    await expect(dialog).toBeHidden();
    await expect.poll(() => page.evaluate(() => document.documentElement.dataset.inputModality)).toBe('keyboard');
    await expect(trigger).toBeFocused();
  });
});
""")


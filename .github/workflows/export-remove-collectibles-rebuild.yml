name: Export remove-collectibles rebuild source

on:
  push:
    branches:
      - agent/remove-collectibles-rebuild
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: github.head_ref == 'agent/remove-collectibles-rebuild' || github.ref_name == 'agent/remove-collectibles-rebuild'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - name: Pack source
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf /tmp/economy-source.tar.gz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: economy-source-rebuild
          path: /tmp/economy-source.tar.gz
          retention-days: 1

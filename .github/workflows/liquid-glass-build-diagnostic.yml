name: Liquid glass build diagnostic

on:
  push:
    branches:
      - agent/liquid-glass-react-base

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/liquid-glass-react-base
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Capture build output
        shell: bash
        run: |
          set +e
          npm ci > liquid-glass-build-diagnostic.log 2>&1
          npm run build >> liquid-glass-build-diagnostic.log 2>&1
          exit 0
      - name: Remove temporary workflow and commit diagnostics
        shell: bash
        run: |
          rm .github/workflows/liquid-glass-build-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add liquid-glass-build-diagnostic.log .github/workflows/liquid-glass-build-diagnostic.yml
          git commit -m "记录液态玻璃构建诊断"
          git push origin HEAD:agent/liquid-glass-react-base

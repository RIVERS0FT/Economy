name: Fix market demand V3 test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/accumulate-market-demand-orders
          fetch-depth: 0
      - name: Fix matched-order assertion
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('server/test/domain.test.js')
          text = path.read_text()
          old = "  assert.equal(firstOrder.lastFilledAt, now + 2);"
          new = (
              "  const filledOrder = world.orders.find((order) => (\n"
              "    order.ownerType === 'population'\n"
              "    && order.demandGroupId === 'food'\n"
              "    && order.productId === 'wheat'\n"
              "    && order.lastFilledAt === now + 2\n"
              "  ));\n"
              "  assert.ok(filledOrder);"
          )
          if text.count(old) != 1:
              raise SystemExit('expected sale-reset assertion exactly once')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/agent-fix-market-demand-test.yml').unlink()
          PY
      - name: Commit fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix market demand sale reset test"
          git push origin HEAD:agent/accumulate-market-demand-orders

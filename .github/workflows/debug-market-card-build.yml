name: Debug market card build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  capture-build-log:
    if: github.head_ref == 'agent/market-card-artwork-64' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/market-card-artwork-64
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'
          cache: npm
      - name: Capture build failure
        run: |
          set +e
          python3 scripts/apply-market-card-artwork-sizing.py
          npm ci
          npm run build > /tmp/market-card-build.log 2>&1
          status=$?
          tail -n 120 /tmp/market-card-build.log > /tmp/market-card-build-tail.log
          git reset --hard HEAD
          cp /tmp/market-card-build-tail.log scripts/market-card-build.log
          rm -f scripts/market-card-build-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/market-card-build.log scripts/market-card-build-trigger.txt
          git commit -m "capture market card build failure"
          git push origin HEAD:agent/market-card-artwork-64
          exit $status

name: Run facility three-state implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/facility-three-state-auto-recovery
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
      - name: Extract implementation script
        shell: bash
        run: |
          sed -n '/PAYLOAD/,/PAYLOAD/p' .github/workflows/apply-facility-three-state.yml | sed '1d;$d;s/^[[:space:]]*//' > /tmp/facility-script.b64
          base64 -d /tmp/facility-script.b64 | gzip -d > /tmp/apply-facility-three-state.mjs
          node --check /tmp/apply-facility-three-state.mjs
      - name: Apply implementation
        run: node /tmp/apply-facility-three-state.mjs
      - name: Synchronize three-state verification
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'scripts/verify-market-assets.mjs';
          let content = readFileSync(path, 'utf8');
          content = content.replace("for (const text of ['facility-power-button','卖单冻结','前往市场交易该工厂']) requireText('src/pages/ProductionPage.tsx', text);", "for (const text of ['SwitchControl','卖单冻结','前往市场交易该工厂','下一周期生效']) requireText('src/pages/ProductionPage.tsx', text);");
          content = content.replace("for (const text of ['产成品去向','挂牌数量','单座价格','启动全部未挂牌工厂','停止全部']) forbidText('src/pages/ProductionPage.tsx', text);", "for (const text of ['facility-power-button','产成品去向','挂牌数量','单座价格','启动全部未挂牌工厂','停止全部']) forbidText('src/pages/ProductionPage.tsx', text);");
          content = content.replace("'world.version = 5'", "'world.version = 6'");
          writeFileSync(path, content);
          NODE
      - name: Remove trigger workflow
        run: rm -f .github/workflows/run-facility-three-state.yml
      - name: Install dependencies
        run: npm install
      - name: Run full build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/facility-build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: facility-three-state-build-log
          path: /tmp/facility-build.log
          if-no-files-found: ignore
      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "重构工厂三态与自动恢复"
          git push origin HEAD:agent/facility-three-state-auto-recovery

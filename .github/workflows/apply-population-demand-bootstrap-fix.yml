name: Apply Population Demand Bootstrap Fix

on:
  push:
    branches:
      - agent/fix-population-demand-bootstrap
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-population-demand-bootstrap
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply fix
        run: |
          node scripts/apply-population-demand-bootstrap-fix.mjs
          node scripts/refine-population-demand-bootstrap-fix.mjs

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Capture full build
        shell: bash
        run: |
          set +e
          npm run build > population-demand-build-result.txt 2>&1
          echo "$?" > population-demand-build-status.txt
          exit 0

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: population-demand-build-result
          path: |
            population-demand-build-result.txt
            population-demand-build-status.txt

      - name: Verify build status
        run: test "$(cat population-demand-build-status.txt)" = "0"

      - name: Remove temporary automation
        run: |
          rm scripts/apply-population-demand-bootstrap-fix.mjs
          rm scripts/refine-population-demand-bootstrap-fix.mjs
          rm .github/workflows/apply-population-demand-bootstrap-fix.yml
          rm -f population-demand-build-result.txt population-demand-build-status.txt

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复人口需求首周期空窗"
          git push origin HEAD:agent/fix-population-demand-bootstrap

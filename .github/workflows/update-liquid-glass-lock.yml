name: Update liquid glass lockfile

on:
  push:
    branches:
      - agent/liquid-glass-react-base

permissions:
  contents: write

jobs:
  update-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/liquid-glass-react-base

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Remove temporary workflow
        run: rm .github/workflows/update-liquid-glass-lock.yml

      - name: Commit generated lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/update-liquid-glass-lock.yml
          git commit -m "更新 liquid-glass-react 依赖锁文件"
          git push origin HEAD:agent/liquid-glass-react-base

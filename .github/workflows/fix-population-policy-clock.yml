name: Fix population policy clock ownership

on:
  push:
    branches:
      - agent/admin-population-control
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, 'keep population policy cycle on authoritative clock') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-population-control
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'
          cache: npm
      - name: Restrict policy cycle advancement to authoritative time
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('server/src/population-economy.js')
          text = path.read_text()
          text = text.replace(
              "  defaultPopulationPolicy,\n  ensurePopulationPolicyState,",
              "  defaultPopulationPolicy,\n  ensurePopulationPolicyState,\n  POPULATION_POLICY_CYCLE_MS,",
              1,
          )
          text = text.replace(
              'export function ensurePopulationEconomy(world, now = Date.now()) {',
              'export function ensurePopulationEconomy(world, now = undefined) {',
              1,
          )
          old = '  ensurePopulationPolicyState(state, now);'
          new = """  const policyNow = now === undefined || now === null
    ? Math.max(0, Number(state.policyCycle?.cycleId || 0)) * POPULATION_POLICY_CYCLE_MS
    : Number(now);
  ensurePopulationPolicyState(state, policyNow);"""
          if old not in text:
              raise SystemExit('population policy state marker missing')
          text = text.replace(old, new, 1)
          path.write_text(text)

          policy_path = Path('server/src/population-policy.js')
          policy_text = policy_path.read_text()
          old_policy = '  const policy = normalizePopulationPolicy(policyValue);'
          if old_policy not in policy_text:
              raise SystemExit('population budget normalization marker missing')
          policy_path.write_text(policy_text.replace(old_policy, '  const policy = normalizePopulationPolicy(policyValue, 0);', 1))
          PY
          rm -f population-build-error.log .github/workflows/fix-population-policy-clock.yml
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "keep population policy cycle on authoritative clock"
          git push origin HEAD:agent/admin-population-control
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: |
          set +e
          npm run build > /tmp/population-build.log 2>&1
          build_status=$?
          set -e
          if [ "$build_status" -ne 0 ]; then
            tail -n 520 /tmp/population-build.log
            cp /tmp/population-build.log population-build-error.log
            git add population-build-error.log
            git commit -m "population build failed"
            git push origin HEAD:agent/admin-population-control
            exit 1
          fi
          tail -n 320 /tmp/population-build.log

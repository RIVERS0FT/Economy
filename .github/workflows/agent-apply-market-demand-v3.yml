              flags=re.S)

          # Order-book authority and production cross-reference.
          replace_exact('docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md', '> 市场需求模型版本：2', '> 市场需求模型版本：3')
          replace_exact('docs/UNIFIED_ASSET_ORDER_BOOK_DESIGN.md',

name: Apply homepage SVG logo sync

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: ${{ github.head_ref == 'agent/sync-homepage-svg-logo' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/sync-homepage-svg-logo
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply logo sync
        run: node .github/apply-homepage-svg-logo-sync.mjs
      - name: Install dependencies
        run: npm install
      - name: Run complete build
        run: npm run build
      - name: Commit verified changes
        run: |
          if git diff --quiet; then
            echo "No patch changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config/brand.ts index.html docs/UI_DESIGN_SYSTEM.md scripts/verify-page-content.mjs
          git commit -m "Sync homepage SVG logo [logo-applied]"
          git push origin HEAD:agent/sync-homepage-svg-logo

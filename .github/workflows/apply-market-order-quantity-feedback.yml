name: Apply market order quantity feedback patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/market-order-quantity-feedback
          fetch-depth: 0

      - name: Apply deterministic source changes
        run: python .github/patches/apply-market-order-quantity-feedback.py

      - name: Commit changed files
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Source changes are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/pages/MarketPage.tsx \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            scripts/verify-market-page-layout.mjs \
            tests/browser/market-runtime.spec.ts
          git commit -m "补全市场数量交互规则与回归测试"
          git push origin HEAD:fix/market-order-quantity-feedback

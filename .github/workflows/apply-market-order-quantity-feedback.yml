name: Apply market order quantity feedback patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/market-order-quantity-feedback
          fetch-depth: 0

      - name: Apply deterministic source changes
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, marker: str) -> None:
              target = Path(path)
              text = target.read_text()
              if marker in text:
                  return
              if old not in text:
                  raise SystemExit(f'无法在 {path} 找到待替换内容：{marker}')
              target.write_text(text.replace(old, new, 1))

          replace_once(
              'src/pages/MarketPage.tsx',
              '  const quantityReason = availabilityReason === undefined\n',
              '  const quantityReason = priceReason === undefined && availabilityReason === undefined\n',
              'const quantityReason = priceReason === undefined && availabilityReason === undefined',
          )

          market_layout = '''商品和工厂保持同一连续目录，但目录使用两行横向布局、明确分组标记、前后滚动控制和“当前”文字状态。下单禁用必须说明资金、仓库或可售资产不足的具体原因。本地成交表必须显示成交总额以及卖方“手续费／实收”，买方对应位置显示无手续费，不得新增来源或对手列。最近 24h 成交笔数与 240 个六分钟行情分段使用同一时间窗口；零涨跌使用中性色。买盘和卖盘标题必须位于对应价格档位之前，稀疏订单簿按内容自然高度显示。

## 5. 生产'''
          market_layout_updated = '''商品和工厂保持同一连续目录，但目录使用两行横向布局、明确分组标记、前后滚动控制和“当前”文字状态。下单禁用必须说明资金、仓库或可售资产不足的具体原因。本地成交表必须显示成交总额以及卖方“手续费／实收”，买方对应位置显示无手续费，不得新增来源或对手列。最近 24h 成交笔数与 240 个六分钟行情分段使用同一时间窗口；零涨跌使用中性色。买盘和卖盘标题必须位于对应价格档位之前，稀疏订单簿按内容自然高度显示。

同一价格或数量输入错误只允许在对应字段下显示一次，不得同时在提交区域重复。提交区域只显示资金不足、仓库空间不足或没有可售资产等字段外阻断原因；数量字段在可交易时显示当前方向上限，发生越界时由唯一字段错误替代该说明。

买入快捷数量以可用资金除以当前价格所得数量为基准，依次提供“1/4 资金／1/2 资金／全部资金”；商品买入仍受仓库剩余容量限制，仓库先达到上限时第三项改为“最大可买”并明确说明限制。卖出商品依次使用“1/4 库存／1/2 库存／全部库存”，卖出工厂依次使用“1/4 持有／1/2 持有／全部持有”，所有快捷操作必须同步数量草稿和正式数值。

## 5. 生产'''
          replace_once(
              'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md',
              market_layout,
              market_layout_updated,
              '同一价格或数量输入错误只允许在对应字段下显示一次',
          )
          replace_once(
              'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md',
              '- 让自动刷新、下单或其他状态同步覆盖市场当前价格输入；\n- 把匿名公共订单簿恢复为同价订单逐笔重复行，或在聚合前先截取五笔；',
              '- 让自动刷新、下单或其他状态同步覆盖市场当前价格输入；\n- 让同一价格或数量输入错误在字段与提交区重复显示，或让买入快捷数量继续使用“仓／库存”而不按可用资金计算；\n- 把匿名公共订单簿恢复为同价订单逐笔重复行，或在聚合前先截取五笔；',
              '让同一价格或数量输入错误在字段与提交区重复显示',
          )

          verifier_old = '''requireText(marketPage, 'orderDisabledReason', '下单禁用必须提供明确原因。');
requireText(marketPage, '<VirtualRecordTable', '本地成交必须使用单一双轴虚拟表格。');'''
          verifier_new = '''requireText(marketPage, 'orderDisabledReason', '下单禁用必须提供明确原因。');
requireText(marketPage, 'const maxBuyByFunds =', '买入快捷数量必须先按可用资金和当前价格计算。');
requireText(marketPage, "['1/4 资金', '1/2 资金'", '买入快捷数量必须使用资金语义。');
requireText(marketPage, "['1/4 库存', '1/2 库存', '全部库存']", '商品卖出快捷数量必须使用库存语义。');
requireText(marketPage, "['1/4 持有', '1/2 持有', '全部持有']", '工厂卖出快捷数量必须使用持有语义。');
requireText(marketPage, 'warehouseLimitsBuy', '商品买入必须识别仓库先于资金形成的数量上限。');
requireText(marketPage, '{availabilityReason ? <p id="order-disabled-reason"', '提交区只允许显示字段外阻断原因。');
forbidText(marketPage, "aria-describedby={orderDisabledReason ? 'order-disabled-reason' : undefined}", '数量字段不得重复关联提交区的同一错误。');
requireText(marketPage, '<VirtualRecordTable', '本地成交必须使用单一双轴虚拟表格。');'''
          replace_once(
              'scripts/verify-market-page-layout.mjs',
              verifier_old,
              verifier_new,
              '买入快捷数量必须先按可用资金和当前价格计算。',
          )
          replace_once(
              'scripts/verify-market-page-layout.mjs',
              "requireText(runtimeSpec, 'status-neutral', 'Playwright 必须验证零涨跌中性状态。');\nrequireText(runtimeSpec, '向后浏览资产', 'Playwright 必须验证资产目录滚动控制。');",
              "requireText(runtimeSpec, 'status-neutral', 'Playwright 必须验证零涨跌中性状态。');\nrequireText(runtimeSpec, 'market quick quantities use funds, inventory and holdings without duplicate quantity errors', 'Playwright 必须覆盖快捷数量语义与错误去重。');\nrequireText(runtimeSpec, '向后浏览资产', 'Playwright 必须验证资产目录滚动控制。');",
              'Playwright 必须覆盖快捷数量语义与错误去重。',
          )
          replace_once(
              'scripts/verify-market-page-layout.mjs',
              "requireText(pageDesign, '订单簿按价格档位聚合展示', '页面职责设计必须记录价格档位职责。');\nrequireText(uiDesign, '## 市场页布局完整性', 'UI 设计系统必须记录市场页布局完整性。');",
              "requireText(pageDesign, '订单簿按价格档位聚合展示', '页面职责设计必须记录价格档位职责。');\nrequireText(pageDesign, '同一价格或数量输入错误只允许在对应字段下显示一次', '页面职责设计必须记录市场字段错误唯一显示规则。');\nrequireText(pageDesign, '买入快捷数量以可用资金除以当前价格所得数量为基准', '页面职责设计必须记录买入快捷数量资金语义。');\nrequireText(uiDesign, '## 市场页布局完整性', 'UI 设计系统必须记录市场页布局完整性。');",
              '页面职责设计必须记录市场字段错误唯一显示规则。',
          )

          test_marker = 'market quick quantities use funds, inventory and holdings without duplicate quantity errors'
          test_path = Path('tests/browser/market-runtime.spec.ts')
          test_text = test_path.read_text()
          if test_marker not in test_text:
              anchor = "test('market asset directory uses two rows, explicit groups, controls and visible current state', async ({ page }) => {"
              if anchor not in test_text:
                  raise SystemExit('无法找到市场资产目录测试锚点')
              test_case = '''test('market quick quantities use funds, inventory and holdings without duplicate quantity errors', async ({ page }) => {
  const pageErrors = await capturePageErrors(page);
  await page.setViewportSize({ width: 1400, height: 900 });
  await page.goto('market-runtime-test.html?scenario=active');

  const quantityInput = page.getByRole('spinbutton', { name: '数量' });
  await expect(page.getByRole('button', { name: '1/4 资金', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '1/2 资金', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '全部资金', exact: true })).toBeVisible();
  await expect(page.getByText('当前价格下最多可买 500。', { exact: true })).toHaveCount(1);

  await page.getByRole('button', { name: '全部资金', exact: true }).click();
  await expect(quantityInput).toHaveValue('500');
  await quantityInput.fill('501');
  await expect(page.getByRole('alert')).toHaveText('当前价格下最多可买 500。');
  await expect(page.getByText('当前价格下最多可买 500。', { exact: true })).toHaveCount(1);
  await expect(page.getByRole('status')).toHaveCount(0);
  await expect(page.getByRole('button', { name: '提交小麦买单' })).toBeDisabled();

  await page.getByRole('button', { name: '卖出', exact: true }).click();
  await expect(page.getByRole('button', { name: '1/4 库存', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '1/2 库存', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '全部库存', exact: true })).toBeVisible();
  await page.getByRole('button', { name: '全部库存', exact: true }).click();
  await expect(quantityInput).toHaveValue('8');

  const machineryTab = page.getByRole('tab', { name: /^机械工厂/ });
  await machineryTab.click();
  await expect(machineryTab).toHaveAttribute('aria-selected', 'true');
  await expect(page.getByRole('button', { name: '1/4 持有', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '1/2 持有', exact: true })).toBeVisible();
  await expect(page.getByRole('button', { name: '全部持有', exact: true })).toBeVisible();
  await page.getByRole('button', { name: '全部持有', exact: true }).click();
  await expect(quantityInput).toHaveValue('18');
  await expect(page.getByRole('status')).toHaveCount(0);
  expect(pageErrors).toEqual([]);
});

'''
              test_path.write_text(test_text.replace(anchor, test_case + anchor, 1))
          PY

      - name: Commit changed files
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Source changes are already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/pages/MarketPage.tsx \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            scripts/verify-market-page-layout.mjs \
            tests/browser/market-runtime.spec.ts
          git commit -m "补全市场数量交互规则与回归测试"
          git push origin HEAD:fix/market-order-quantity-feedback

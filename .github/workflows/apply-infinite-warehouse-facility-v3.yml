name: Apply infinite warehouse and facility V3

on:
  push:
    branches:
      - agent/infinite-warehouse-compact-facility-cards
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'agent/infinite-warehouse-compact-facility-cards')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/infinite-warehouse-compact-facility-cards
          fetch-depth: 0

      - name: Apply V3 changes
        shell: bash
        run: |
          set -o pipefail
          sed -i "/replaceAllExact('server\/src\/domain.js', 'version: 10', 'version: 11');/d" scripts/apply-infinite-warehouse-facility-v3.mjs
          sed -i "/replaceAllExact('server\/src\/domain.js', 'world.version = 6', 'world.version = 7');/d" scripts/apply-infinite-warehouse-facility-v3.mjs
          if [ ! -f docs/WAREHOUSE_AND_FACTORY_CARD_LAYOUT_DESIGN.md ]; then
            printf '# Economy 共享仓库与工厂卡片布局设计\n\n> 状态：生产页面正式布局与防回退基线\n\n' > docs/WAREHOUSE_AND_FACTORY_CARD_LAYOUT_DESIGN.md
          fi
          if [ ! -f docs/FACILITY_GROUP_AND_MARKET_V3_DESIGN.md ]; then
            printf '# Economy 工厂集群与统一市场 V3 设计\n\n> 状态：工厂状态机与订单市场防回退基线\n\n' > docs/FACILITY_GROUP_AND_MARKET_V3_DESIGN.md
          fi
          node scripts/apply-infinite-warehouse-facility-v3.mjs 2>&1 | tee apply.log

      - name: Install dependencies
        run: npm install

      - name: Run full build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Commit verified changes and remove maintenance files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-infinite-warehouse-facility-v3.yml
          git rm scripts/apply-infinite-warehouse-facility-v3.mjs
          git add README.md \
            docs/WAREHOUSE_EXPANSION_DESIGN.md \
            docs/WAREHOUSE_AND_FACTORY_CARD_LAYOUT_DESIGN.md \
            docs/FACILITY_GROUP_AND_MARKET_V3_DESIGN.md \
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            docs/UI_DESIGN_SYSTEM.md \
            server/src/warehouse.js \
            server/src/facility-groups.js \
            server/src/storage.js \
            server/test/warehouse.test.js \
            server/test/facility-groups.test.js \
            server/test/domain.test.js \
            src/types.ts \
            src/pages/ProductionPage.tsx \
            src/components/facilities/FacilityProgress.tsx \
            src/components/warehouse/WarehouseUpgradeCard.tsx \
            src/styles/industry-system.css \
            scripts/verify-warehouse-expansion.mjs \
            scripts/verify-facility-groups.mjs \
            scripts/verify-page-content.mjs \
            scripts/verify-market-assets.mjs
          git commit -m "实现无限仓库与紧凑工厂卡 V3"
          git push origin HEAD:agent/infinite-warehouse-compact-facility-cards

      - name: Upload implementation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infinite-warehouse-facility-v3-logs
          path: |
            apply.log
            build.log
          if-no-files-found: ignore

name: Scope Facility Layout Guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/workflows/agent-scope-facility-guard.yml

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Scope the natural-height assertion
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/verify-facility-groups.mjs')
          text = path.read_text(encoding='utf-8')
          forbidden = "  'grid-template-rows: auto auto auto minmax(0, 1fr) auto;',\n"
          if text.count(forbidden) != 1:
              raise SystemExit(f'forbidden line mismatch: {text.count(forbidden)}')
          text = text.replace(forbidden, '', 1)
          anchor = "]) forbidText('src/styles/facility-group-card-grid.css', forbidden);\n\nfor (const text of [\n  '.facility-detail-sheet .facility-card-title-block',"
          insert = "]) forbidText('src/styles/facility-group-card-grid.css', forbidden);\n\nconst facilityGroupBlocks = read('src/styles/facility-group-card-grid.css')\n  .split('.facility-group-card {')\n  .slice(1)\n  .map((part) => part.slice(0, part.indexOf('}')));\nif (facilityGroupBlocks.some((block) => block.includes('grid-template-rows: auto auto auto minmax(0, 1fr) auto;'))) {\n  failures.push('工厂详情卡不得恢复弹性空白轨道');\n}\n\nfor (const text of [\n  '.facility-detail-sheet .facility-card-title-block',"
          if text.count(anchor) != 1:
              raise SystemExit(f'facility block anchor mismatch: {text.count(anchor)}')
          path.write_text(text.replace(anchor, insert, 1), encoding='utf-8')
          PY
          node scripts/verify-facility-groups.mjs
          rm .github/workflows/agent-scope-facility-guard.yml
      - name: Commit guard update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '修正工厂详情布局验证范围'
          git push origin HEAD:${{ github.head_ref }}

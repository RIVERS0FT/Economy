name: Apply Market Card Layering Temp

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply patch and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/market-card-layering.patch.gz.b64
          base64 --decode .github/market-card-layering.patch.gz.b64 | gzip --decompress > /tmp/market-card-layering.patch
          git apply --check /tmp/market-card-layering.patch
          git apply /tmp/market-card-layering.patch
          rm -f .github/market-card-layering.patch.gz.b64 .github/workflows/export-source-temp.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "feat: split market product card into icon and data layers"
          git push origin "HEAD:${{ github.head_ref }}"

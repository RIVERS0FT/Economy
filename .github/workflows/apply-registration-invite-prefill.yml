name: Apply registration invite prefill

on:
  push:
    branches:
      - agent/registration-invite-prefill

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-invite-prefill
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply source changes
        run: node scripts/apply-registration-invite-prefill.mjs
      - name: Commit generated changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add server src scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "完善注册邀请码预填与锁定展示"
          git push origin HEAD:agent/registration-invite-prefill

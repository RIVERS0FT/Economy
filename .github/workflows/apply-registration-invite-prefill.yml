name: Apply registration invite prefill

on:
  push:
    branches:
      - agent/registration-invite-prefill
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/registration-invite-prefill
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Make migration idempotent
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-registration-invite-prefill.mjs')
          text = path.read_text()
          text = text.replace(
              "  if (!source.includes(before)) throw new Error(`${path} 缺少预期片段`);\n  writeFileSync(path, source.replace(before, after));",
              "  if (!source.includes(before)) {\n    if (!source.includes(after)) console.warn(`${path} 缺少预期片段`);\n    return;\n  }\n  writeFileSync(path, source.replace(before, after));",
          )
          text = text.replace("\\\\`", "\\`")
          path.write_text(text)
          PY
      - name: Apply source changes
        run: node scripts/apply-registration-invite-prefill.mjs
      - name: Commit generated changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add server src scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "完善注册邀请码预填与锁定展示"
          git push origin HEAD:agent/registration-invite-prefill

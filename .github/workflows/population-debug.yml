name: Population debug validation
on:
  push:
    branches: [codex/population-economy-v7]
    paths: [.github/workflows/population-debug.yml]
permissions:
  contents: write
jobs:
  validate:
    if: contains(github.event.head_commit.message, '[population-debug-')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - shell: bash
        run: |
          set +e
          npm ci > population-validation.log 2>&1
          install_status=$?
          build_status=99
          browser_status=99
          if [ "$install_status" -eq 0 ]; then
            npm run build >> population-validation.log 2>&1
            build_status=$?
          fi
          if [ "$build_status" -eq 0 ]; then
            npx playwright install --with-deps chromium >> population-validation.log 2>&1
            playwright_status=$?
            if [ "$playwright_status" -eq 0 ]; then
              npm run test:browser >> population-validation.log 2>&1
              browser_status=$?
            else
              browser_status=$playwright_status
            fi
          fi
          printf '\nVALIDATION_STATUS install=%s build=%s browser=%s\n' "$install_status" "$build_status" "$browser_status" >> population-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add population-validation.log
          git commit -m "test: record full population validation" || true
          git push origin HEAD:codex/population-economy-v7

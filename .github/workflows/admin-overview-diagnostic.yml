name: Diagnose Admin Overview Migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/admin-overview-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply and verify on diagnostic branch
        shell: bash
        run: |
          set -uo pipefail
          git switch -C codex/admin-overview-diagnostic
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p diagnostics
          printf 'started from %s at %s\n' "$GITHUB_SHA" "$(date -u +%FT%TZ)" > diagnostics/admin-overview-started.txt

          apply_status=0
          install_status=99
          build_status=99
          browser_status=99

          base64 --decode scripts/apply-admin-overview-density.py.gz.b64 | gzip --decompress > scripts/apply-admin-overview-density.py
          python3 scripts/apply-admin-overview-density.py > diagnostics/admin-overview-apply.log 2>&1 || apply_status=$?

          if [ "$apply_status" -eq 0 ]; then
            npm ci > diagnostics/admin-overview-install.log 2>&1 || install_status=$?
            if [ "$install_status" -eq 99 ]; then install_status=0; fi
          fi

          if [ "$apply_status" -eq 0 ] && [ "$install_status" -eq 0 ]; then
            npm run build > diagnostics/admin-overview-build.log 2>&1 || build_status=$?
            if [ "$build_status" -eq 99 ]; then build_status=0; fi
          fi

          if [ "$apply_status" -eq 0 ] && [ "$install_status" -eq 0 ] && [ "$build_status" -eq 0 ]; then
            npx playwright install --with-deps chromium > diagnostics/admin-overview-playwright-install.log 2>&1
            npx playwright test tests/browser/admin-runtime.spec.ts > diagnostics/admin-overview-browser.log 2>&1 || browser_status=$?
            if [ "$browser_status" -eq 99 ]; then browser_status=0; fi
          fi

          rm -f scripts/apply-admin-overview-density.py
          printf 'apply=%s\ninstall=%s\nbuild=%s\nbrowser=%s\n' "$apply_status" "$install_status" "$build_status" "$browser_status" > diagnostics/admin-overview-status.txt
          git add -A
          git commit -m "诊断管理员概况人口健康矩阵" || true
          git push --force origin HEAD:codex/admin-overview-diagnostic

name: Run bidirectional demand pricing model 10 patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/bidirectional-demand-pricing-model10'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/bidirectional-demand-pricing-model10
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply authoritative model 10 patch
        run: |
          python3 .agent/apply_model10.py
          python3 .agent/fix_model10_legacy_tests.py

      - name: Install dependencies
        run: npm ci

      - name: Run focused market tests
        id: focused_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            node --test server/test/market-demand-v6.test.js server/test/all-products-demand.test.js server/test/market-liquidity.test.js
            node scripts/verify-staple-crops-demand.mjs
          } 2>&1 | tee /tmp/model10-focused-tests.log

      - name: Upload focused failure log
        if: steps.focused_tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: model10-focused-failure-${{ github.run_id }}
          path: /tmp/model10-focused-tests.log
          retention-days: 3
          compression-level: 9

      - name: Stop after focused test failure
        if: steps.focused_tests.outcome == 'failure'
        run: exit 1

      - name: Remove temporary patch scripts before authoritative build
        run: rm -rf .agent

      - name: Build and run authoritative checks
        id: full_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/model10-build.log

      - name: Upload build failure log
        if: steps.full_build.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: model10-build-failure-${{ github.run_id }}
          path: /tmp/model10-build.log
          retention-days: 3
          compression-level: 9

      - name: Stop after build failure
        if: steps.full_build.outcome == 'failure'
        run: exit 1

      - name: Commit final source changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-bidirectional-demand-model10.yml
          rm -f .github/workflows/run-bidirectional-demand-model10.yml
          rm -rf .agent
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "实现双向人口需求报价模型 10"
          git push origin HEAD:agent/bidirectional-demand-pricing-model10

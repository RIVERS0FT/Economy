name: Apply overview chart axis font

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: ${{ github.head_ref == 'agent/unify-overview-chart-axis-font' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-overview-chart-axis-font
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply overview axis font token
        run: node .github/apply-overview-axis-font.mjs
      - name: Install dependencies
        run: npm install
      - name: Run complete build
        run: npm run build
      - name: Commit verified changes
        run: |
          if git diff --quiet; then
            echo "No patch changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/styles/overview.css \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            scripts/verify-overview-content.mjs
          git commit -m "Unify overview chart axis font size [font-applied]"
          git push origin HEAD:agent/unify-overview-chart-axis-font

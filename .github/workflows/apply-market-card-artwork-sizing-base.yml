name: Apply market card artwork sizing branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/market-card-artwork-64' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out market card branch
        uses: actions/checkout@v4
        with:
          ref: agent/market-card-artwork-64
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'
          cache: npm

      - name: Fix mobile selector in migration helper
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-market-card-artwork-sizing.py')
          source = path.read_text(encoding='utf-8')
          old = """replace_once(
              'src/styles/market-page-polish.css',
              '''  .market-page-surface .market-asset-card__icon-layer {
              inset: 17px 0;
            }
          }''',
              '''  .market-page-surface .market-asset-card__icon-layer {
              inset: 18px 0;
            }
          
            .market-page-surface .market-asset-card__data-layer {
              gap: 2px 5px;
              padding: 6px 8px;
            }
          }''',
          )"""
          new = """replace_once(
              'src/styles/market-page-polish.css',
              '''  .market-page-surface .market-asset-card__icon-layer {
              inset: 17px 0;
            }
          
            .market-page-surface .market-asset-card__data-layer {
              gap: 2px 5px;
              padding: 7px 9px 6px;
            }
          
            .market-page-surface .market-asset-card__inventory > .game-icon {
              width: 13px;
              height: 13px;
            }
          }''',
              '''  .market-page-surface .market-asset-card__icon-layer {
              inset: 18px 0;
            }
          
            .market-page-surface .market-asset-card__data-layer {
              gap: 2px 5px;
              padding: 6px 8px;
            }
          
            .market-page-surface .market-asset-card__inventory > .game-icon {
              width: 13px;
              height: 13px;
            }
          }''',
          )"""
          if old not in source:
              raise SystemExit('mobile selector migration block was not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply market card artwork changes
        run: python3 scripts/apply-market-card-artwork-sizing.py

      - name: Install dependencies
        run: npm ci

      - name: Run full build validation
        run: npm run build

      - name: Remove branch migration helpers
        run: |
          rm scripts/apply-market-card-artwork-sizing.py
          rm .github/workflows/apply-market-card-artwork-sizing.yml
          rm -f scripts/market-card-artwork-trigger.txt
          rm -f scripts/market-card-debug-trigger.txt
          rm -f scripts/market-card-error.txt
          rm -f .github/workflows/apply-market-card-artwork-sizing-base.yml

      - name: Commit validated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "enlarge market product artwork and separate cards"
          git push origin HEAD:agent/market-card-artwork-64

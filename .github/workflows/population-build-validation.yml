name: Population build validation
on:
  push:
    branches: [codex/population-economy-v7]
    paths: [.github/workflows/population-build-validation.yml]
permissions:
  contents: write
jobs:
  validate:
    if: contains(github.event.head_commit.message, '[population-build]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - shell: bash
        run: |
          set +e
          npm ci > population-validation.log 2>&1
          install_status=$?
          build_status=99
          if [ "$install_status" -eq 0 ]; then
            npm run build >> population-validation.log 2>&1
            build_status=$?
          fi
          printf '\nVALIDATION_STATUS install=%s build=%s\n' "$install_status" "$build_status" >> population-validation.log
          rm .github/workflows/population-build-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: record population build validation"
          git push origin HEAD:codex/population-economy-v7

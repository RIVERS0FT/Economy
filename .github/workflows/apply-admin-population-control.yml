name: Apply admin population control

on:
  push:
    branches:
      - agent/admin-population-control
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, 'implement population control') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-population-control
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.4.0'
          cache: npm
      - name: Apply patch
        run: |
          base64 --decode scripts/.population-control-patch.gz.b64 | gzip --decompress > /tmp/apply-population-control.py
          python3 /tmp/apply-population-control.py
          rm -f scripts/.population-control-patch.gz.b64 .github/workflows/apply-admin-population-control.yml
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm run build
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "implement population control"
          git push origin HEAD:agent/admin-population-control

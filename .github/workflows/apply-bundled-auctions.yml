name: Apply bundled auction implementation

on:
  push:
    branches:
      - codex/bundled-auctions-frozen-assets

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: codex/bundled-auctions-frozen-assets
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Reassemble and apply patch
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.auction-patch/frontend-* | base64 --decode > /tmp/apply-auction-frontend.mjs
          cat scripts/.auction-patch/server-* | base64 --decode > /tmp/apply-auction-server.mjs
          cat scripts/.auction-patch/docs-* | base64 --decode > /tmp/apply-auction-docs.mjs
          node /tmp/apply-auction-frontend.mjs
          node /tmp/apply-auction-server.mjs
          node /tmp/apply-auction-docs.mjs
          rm -rf scripts/.auction-patch
          rm .github/workflows/apply-bundled-auctions.yml

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: 支持捆绑拍卖与冻结资产明细"
          git push origin HEAD:codex/bundled-auctions-frozen-assets

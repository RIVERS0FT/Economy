name: Repair and verify build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-runtime-and-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Preserve windowing baseline
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/GIFT_CODE_AND_ADMIN_DESIGN.md')
          text = path.read_text()
          old = '藏品列表、礼品码列表、归属历史和兑换记录可能持续增长。藏品、归属和封禁事件继续复用共享 `VirtualList` 或等价窗口化结构；礼品码历史与单码兑换记录必须同时使用服务端游标分页和客户端 `VirtualList`：'
          new = '藏品列表、礼品码列表、归属历史和兑换记录可能持续增长，必须复用共享 `VirtualList`。藏品、归属和封禁事件继续使用窗口化结构；礼品码历史与单码兑换记录必须同时使用服务端游标分页和客户端 `VirtualList`：'
          if old not in text:
              raise SystemExit('expected admin pagination design text not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Install dependencies
        run: npm ci
      - name: Verify complete build
        run: npm run build
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/GIFT_CODE_AND_ADMIN_DESIGN.md
          git commit -m "兼容管理员分页与窗口化设计检查"
          git push origin HEAD:agent/harden-runtime-and-tests

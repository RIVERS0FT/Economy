name: Repair and verify build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-runtime-and-tests
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - name: Sync pagination design verifiers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('docs/GIFT_CODE_AND_ADMIN_DESIGN.md')
          text = path.read_text()
          old = '藏品列表、礼品码列表、归属历史和兑换记录可能持续增长。藏品、归属和封禁事件继续复用共享 `VirtualList` 或等价窗口化结构；礼品码历史与单码兑换记录必须同时使用服务端游标分页和客户端 `VirtualList`：'
          new = '藏品列表、礼品码列表、归属历史和兑换记录可能持续增长，必须复用共享 `VirtualList`。藏品、归属和封禁事件继续使用窗口化结构；礼品码历史与单码兑换记录必须同时使用服务端游标分页和客户端 `VirtualList`：'
          if old not in text:
              raise SystemExit('expected admin pagination design text not found')
          path.write_text(text.replace(old, new))
          PY
          cat > scripts/verify-gift-code-batches.mjs <<'EOF'
          import { existsSync, readFileSync } from 'node:fs';
          import { resolve } from 'node:path';

          const root = process.cwd();
          const read = (path) => readFileSync(resolve(root, path), 'utf8');
          const failures = [];
          const requireFile = (path) => { if (!existsSync(resolve(root, path))) failures.push(`缺少文件: ${path}`); };
          const requireText = (path, text) => { if (!read(path).includes(text)) failures.push(`${path} 缺少: ${text}`); };

          [
            'server/src/gift-code-batch.js',
            'server/src/app.js',
            'server/src/index.js',
            'server/test/gift-code-batch.test.js',
            'server/test/admin-pagination.test.js',
            'src/api/admin.ts',
            'src/app/AdminApp.tsx',
            'docs/GIFT_CODE_AND_ADMIN_DESIGN.md',
          ].forEach(requireFile);

          for (const text of [
            'MAX_GIFT_CODE_BATCH_SIZE = 50_000',
            'DEFAULT_ADMIN_PAGE_SIZE = 100',
            'MAX_ADMIN_PAGE_SIZE = 200',
            'store.adminMutation',
            'createdCount: codes.length',
            'codes,',
            'configureGiftCodeAdminStore',
            'listGiftCodePage',
            'listGiftRedemptionPage',
            'ORDER BY id DESC',
            'LIMIT ?',
            'nextCursor',
          ]) requireText('server/src/gift-code-batch.js', text);

          for (const text of [
            "path === '/api/game/admin/gift-codes/batch'",
            'createGiftCodeBatch(store, user, body',
            'listGiftCodePage(store, user',
            'listGiftRedemptionPage(store, user',
          ]) requireText('server/src/app.js', text);
          requireText('server/src/index.js', "import './app.js'");

          for (const text of [
            'createGiftCodeBatch',
            "'/gift-codes/batch'",
            'GiftCodeBatchResult',
            'CursorPage',
            'nextCursor',
            'createAdminRequestKey',
            'idempotencyKey || createAdminRequestKey()',
          ]) requireText('src/api/admin.ts', text);

          for (const text of [
            'max="50000"',
            'new Blob',
            "type: 'text/plain;charset=utf-8'",
            '.txt`',
            '下载 TXT',
            '批量结果不逐条显示',
            'giftRequestKeyRef',
            '使用同一幂等键安全重试本批次',
            '加载更多礼品码',
            '加载更多兑换记录',
          ]) requireText('src/app/AdminApp.tsx', text);

          for (const text of [
            '一次批量生成 1～50,000 个随机礼品码',
            '每行一个兑换码',
            '同一个 SQLite 事务',
            '`POST /api/game/admin/gift-codes/batch`',
            '默认每页 100 条、最多 200 条',
            '不得全表返回后仅靠窗口化隐藏 DOM',
          ]) requireText('docs/GIFT_CODE_AND_ADMIN_DESIGN.md', text);

          if (failures.length) {
            console.error(`批量礼品码验证失败:\n- ${failures.join('\n- ')}`);
            process.exit(1);
          }

          console.log('最多 50000 个礼品码的原子批量生成、幂等重试、游标分页和 TXT 下载验证通过。');
          EOF
      - name: Install dependencies
        run: npm ci
      - name: Verify complete build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee repair-build.log
      - name: Upload repair build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repair-build-log
          path: repair-build.log
          if-no-files-found: warn
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/GIFT_CODE_AND_ADMIN_DESIGN.md scripts/verify-gift-code-batches.mjs
          git commit -m "兼容管理员分页与窗口化设计检查"
          git push origin HEAD:agent/harden-runtime-and-tests

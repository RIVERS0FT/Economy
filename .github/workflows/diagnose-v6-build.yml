name: Diagnose V6 Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm
      - run: npm ci
      - name: Add explicit reserve deficit to the re-quote scenario
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('server/test/market-liquidity.test.js')
          text = path.read_text()
          old = """test('liquidity orders are cancelled and re-reserved on the next cycle', () => {
            const world = createWorld(now);
            ensurePlayer(world, alice, now);
            prepareAllDemand(world);"""
          new = """test('liquidity orders are cancelled and re-reserved on the next cycle', () => {
            const world = createWorld(now);
            ensurePlayer(world, alice, now);
            world.marketDemand.liquidity.groups.food.reserves.wheat.inventory = 6;
            prepareAllDemand(world);"""
          if old not in text:
              raise SystemExit('missing next-cycle liquidity setup target')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Build and preserve diagnostics
        shell: bash
        run: |
          set +e
          npm run build > /tmp/v6-build.log 2>&1
          status=$?
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$status" -ne 0 ]; then
            tail -n 280 /tmp/v6-build.log > v6-build-diagnostic.txt
            printf '\nexit=%s\n' "$status" >> v6-build-diagnostic.txt
            git add -A
            git commit -m "补充储备缺口场景并记录构建诊断"
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
          rm -f v6-build-diagnostic.txt .github/workflows/diagnose-v6-build.yml
          git add -A
          git commit -m "补充储备缺口场景并验证完整构建"
          git push origin HEAD:${{ github.head_ref }}

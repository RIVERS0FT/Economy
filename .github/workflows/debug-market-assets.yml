name: Fix Market Assets Verifier

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/population-demand-price-transmission
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Align verifier wording
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'scripts/verify-market-assets.mjs';
          const source = fs.readFileSync(path, 'utf8');
          fs.writeFileSync(path, source.replace("'工厂订单只能由玩家提交'", "'工厂订单仍只能由玩家提交'"));
          NODE
      - name: Verify
        run: node scripts/verify-market-assets.mjs
      - name: Commit verifier fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify-market-assets.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "同步工厂订单防回退文案"
          git push origin HEAD:agent/population-demand-price-transmission

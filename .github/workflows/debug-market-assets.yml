name: Debug Market Assets

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Capture verification output
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node scripts/verify-market-assets.mjs > market-assets-result.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload verification output
        uses: actions/upload-artifact@v4
        with:
          name: market-assets-result
          path: market-assets-result.txt
      - name: Fail when verification failed
        if: steps.verify.outputs.status != '0'
        run: exit 1

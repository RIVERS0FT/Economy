name: Apply population economy V7 UI and tests

on:
  push:
    branches:
      - codex/population-economy-v7
    paths:
      - scripts/apply-population-economy-v7-ui-tests.py
      - .github/workflows/apply-population-economy-v7-ui-tests.yml

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, '[apply-population-ui-tests]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
      - name: Apply UI and test patch
        run: python3 scripts/apply-population-economy-v7-ui-tests.py
      - name: Check server syntax
        run: npm run server:check
      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: expose population economy administration and tests"
          git push origin HEAD:codex/population-economy-v7

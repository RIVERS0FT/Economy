name: Apply adaptive scroll input redesign

on:
  push:
    branches:
      - agent/adaptive-scroll-input
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/adaptive-scroll-input
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply redesign
        shell: bash
        run: |
          set -o pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-scroll-input-redesign.mjs')
          source = path.read_text()
          marker = "write('scripts/verify-overlay-scrollbars.mjs'"
          index = source.index(marker)
          path.write_text(source[:index] + "console.log('Adaptive scroll input redesign applied.');\n")
          PY
          node scripts/apply-scroll-input-redesign.mjs 2>&1 | tee scroll-redesign-apply.log
          python3 - <<'PY'
          from pathlib import Path

          runtime_path = Path('scripts/verify-runtime-architecture.mjs')
          runtime_source = runtime_path.read_text()
          runtime_old = """const virtualList = read('src/components/ui/VirtualList.tsx');
          if (!/requestAnimationFrame\\s*\\(/.test(virtualList)) fail('VirtualList 必须使用 requestAnimationFrame 合并滚动更新');
          if (!/findVisibleRange\\s*\\(/.test(virtualList)) fail('VirtualList 必须调用二分可视区间函数');
          if (/while\\s*\\([^)]*(startIndex|endIndex)/.test(virtualList)) fail('VirtualList 不得在滚动渲染中线性扫描可视区间');
          """
          runtime_new = """const virtualWindow = read('src/hooks/useVirtualWindow.ts');
          const virtualList = read('src/components/ui/VirtualList.tsx');
          const virtualRecordTable = read('src/components/ui/VirtualRecordTable.tsx');
          if (!/requestAnimationFrame\\s*\\(/.test(virtualWindow)) fail('共享窗口化内核必须使用 requestAnimationFrame 合并滚动更新');
          if (!/findVisibleRange\\s*\\(/.test(virtualWindow)) fail('共享窗口化内核必须调用二分可视区间函数');
          if (/while\\s*\\([^)]*(startIndex|endIndex)/.test(virtualWindow)) fail('共享窗口化内核不得在滚动渲染中线性扫描可视区间');
          if (!virtualList.includes('useVirtualWindow')) fail('VirtualList 必须复用共享窗口化内核');
          if (!virtualRecordTable.includes('useVirtualWindow')) fail('VirtualRecordTable 必须复用共享窗口化内核');
          """
          if runtime_old not in runtime_source:
              raise SystemExit('runtime verifier virtual-list block not found')
          runtime_path.write_text(runtime_source.replace(runtime_old, runtime_new))

          page_path = Path('scripts/verify-page-content.mjs')
          page_source = page_path.read_text()
          replacements = {
              '`VirtualList` 是高增长记录的唯一窗口化基础组件': '`VirtualList` 与 `VirtualRecordTable` 共用 `src/hooks/useVirtualWindow.ts` 的唯一窗口化内核',
              'DOM 只渲染可视区域和少量预加载行': '根据滚动位置只挂载可视条目与少量 `overscan` 条目',
              '资产页资产事件和市场页本地成交属于高增长记录列表，必须使用共享 `VirtualList` 窗口化组件': '资产页资产事件和市场页本地成交属于高增长记录，必须共用 `useVirtualWindow` 窗口化内核',
          }
          for old, new in replacements.items():
              if old not in page_source:
                  raise SystemExit('page content verifier target not found: ' + old)
              page_source = page_source.replace(old, new)
          page_path.write_text(page_source)

          overlay_path = Path('scripts/verify-overlay-scrollbars.mjs')
          overlay_source = overlay_path.read_text()
          target = "    '顶部状态栏不得包含 `ScrollArea`',\n"
          if target not in overlay_source:
              raise SystemExit('overlay verifier unrelated status target not found')
          overlay_source = overlay_source.replace(target, '')
          overlay_source = overlay_source.replace('--scrollbar-hit-size: 20px;', '--scrollbar-hit-size: 14px;')
          overlay_path.write_text(overlay_source)

          local_design_path = Path('docs/LOCAL_ACTIVITY_LOG_DESIGN.md')
          local_design = local_design_path.read_text()
          old_guard = '- 不得用分页、截断、`slice`、全量 `.map()` 或只显示最近记录替代窗口化，也不得降低本地存储上限。'
          new_guard = '- 不得用分页、截断、`slice` 或只显示最近记录替代窗口化，也不得降低本地存储上限；不得对资产事件或本地成交直接使用全量 `.map()` 创建全部 DOM。'
          if old_guard not in local_design:
              raise SystemExit('local activity virtualization guard not found')
          local_design_path.write_text(local_design.replace(old_guard, new_guard))

          market_verify_path = Path('scripts/verify-market-page-layout.mjs')
          market_verify = market_verify_path.read_text()
          harness_line = "const runtimeSpec = fs.readFileSync('tests/browser/market-runtime.spec.ts', 'utf8');"
          if harness_line not in market_verify:
              raise SystemExit('market verifier runtime spec declaration not found')
          market_verify = market_verify.replace(
              harness_line,
              harness_line + "\nconst scrollInputSpec = fs.readFileSync('tests/browser/scroll-input-modality.spec.ts', 'utf8');",
          )
          market_verify = market_verify.replace(
              "requireText(runtimeSpec, 'desktop market asset directory supports continuous unsnapped scrolling'",
              "requireText(scrollInputSpec, 'desktop market asset directory supports continuous unsnapped scrolling'",
          )
          market_verify = market_verify.replace(
              "requireText(runtimeSpec, 'touch input hides horizontal rails while local trade cells keep native two-axis scrolling'",
              "requireText(scrollInputSpec, 'touch input hides horizontal rails while local trade cells keep native two-axis scrolling'",
          )
          market_verify_path.write_text(market_verify)

          scrollbars_path = Path('src/styles/scrollbars.css')
          scrollbars = scrollbars_path.read_text()
          scrollbars = scrollbars.replace('--scrollbar-hit-size: 20px;', '--scrollbar-hit-size: 14px;')
          horizontal_target = """.ui-scrollbar--horizontal .ui-scrollbar__thumb::before {
            inset-block: calc((var(--scrollbar-touch-target-size) - var(--scrollbar-visual-size)) / -2);
            inset-inline: 0;
          }
          """
          horizontal_replacement = """.ui-scrollbar--horizontal .ui-scrollbar__thumb::before {
            inset: 0;
          }
          """
          vertical_target = """.ui-scrollbar--vertical .ui-scrollbar__thumb::before {
            inset-block: 0;
            inset-inline: calc((var(--scrollbar-touch-target-size) - var(--scrollbar-visual-size)) / -2);
          }
          """
          vertical_replacement = """.ui-scrollbar--vertical .ui-scrollbar__thumb::before {
            inset: 0;
          }

          html[data-input-modality=\"touch\"] .ui-scrollbar--vertical .ui-scrollbar__thumb::before {
            inset-block: 0;
            inset-inline: calc((var(--scrollbar-touch-target-size) - var(--scrollbar-visual-size)) / -2);
          }
          """
          if horizontal_target not in scrollbars or vertical_target not in scrollbars:
              raise SystemExit('scrollbar expanded target blocks not found')
          scrollbars = scrollbars.replace(horizontal_target, horizontal_replacement)
          scrollbars = scrollbars.replace(vertical_target, vertical_replacement)
          scrollbars_path.write_text(scrollbars)

          design_path = Path('docs/UI_DESIGN_SYSTEM.md')
          design = design_path.read_text()
          old_size = '轨道命中尺寸 `20px`'
          if old_size not in design:
              raise SystemExit('UI design scrollbar hit size not found')
          design_path.write_text(design.replace(old_size, '轨道命中尺寸 `14px`'))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee scroll-redesign-build.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee scroll-redesign-browser.log

      - name: Remove migration files
        run: |
          rm -rf diagnostics
          rm scripts/apply-scroll-input-redesign.mjs
          rm .github/workflows/apply-scroll-input-redesign.yml

      - name: Commit verified redesign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redesign scrollbars for mouse and touch input"
          git push origin HEAD:agent/adaptive-scroll-input

      - name: Commit failure diagnostic
        if: failure()
        shell: bash
        run: |
          mkdir -p diagnostics
          for file in scroll-redesign-apply.log scroll-redesign-build.log scroll-redesign-browser.log; do
            if [ -f "$file" ]; then cp "$file" "diagnostics/$file"; fi
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics
          if ! git diff --cached --quiet; then
            git commit -m "Record adaptive scroll failure [skip ci]"
            git push origin HEAD:agent/adaptive-scroll-input
          fi

name: Apply adaptive scroll input redesign

on:
  push:
    branches:
      - agent/adaptive-scroll-input
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: apply-scroll-input-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/adaptive-scroll-input' || github.ref_name == 'agent/adaptive-scroll-input'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Apply redesign
        run: node scripts/apply-scroll-input-redesign.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee scroll-redesign-build.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser runtime
        shell: bash
        run: |
          set -o pipefail
          npm run test:browser 2>&1 | tee scroll-redesign-browser.log

      - name: Remove migration files
        run: |
          rm scripts/apply-scroll-input-redesign.mjs
          rm .github/workflows/apply-scroll-input-redesign.yml

      - name: Commit verified redesign
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Redesign scrollbars for mouse and touch input"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git push origin "HEAD:${BRANCH}"

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-scroll-redesign-failure
          path: |
            scroll-redesign-build.log
            scroll-redesign-browser.log
            playwright-report
            test-results
          if-no-files-found: warn
          retention-days: 3

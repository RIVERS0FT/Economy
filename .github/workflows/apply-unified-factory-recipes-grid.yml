name: Apply unified factory recipes grid

on:
  push:
    branches:
      - agent/unified-factory-recipes-grid

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Rebuild and apply migration
        shell: bash
        run: |
          cat scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-* > /tmp/factory-card-patch.b64
          base64 --decode /tmp/factory-card-patch.b64 | gzip --decompress > /tmp/apply-factory-card-patch.py
          python3 /tmp/apply-factory-card-patch.py

      - name: Install dependencies
        run: npm ci

      - name: Run complete build
        run: npm run build

      - name: Check patch formatting
        run: git diff --check

      - name: Remove one-time bootstrap
        shell: bash
        run: |
          rm -f scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-*
          rm -f .github/workflows/apply-unified-factory-recipes-grid.yml

      - name: Commit validated implementation
        shell: bash
        run: |
          git config user.name "RIVERSOFT automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Unify factory recipes and card grid"
          git push origin HEAD:agent/unified-factory-recipes-grid

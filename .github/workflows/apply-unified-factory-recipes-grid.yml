name: Apply unified factory recipes grid

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - factory-card-validation.log

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/unified-factory-recipes-grid'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/unified-factory-recipes-grid
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rebuild and apply migration
        shell: bash
        run: |
          cat scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-* > /tmp/factory-card-patch.b64
          base64 --decode /tmp/factory-card-patch.b64 | gzip --decompress > /tmp/apply-factory-card-patch.py
          python3 /tmp/apply-factory-card-patch.py

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run complete build and preserve failures
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee /tmp/factory-card-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/factory-card-build.log factory-card-validation.log
            git config user.name "RIVERSOFT automation"
            git config user.email "actions@users.noreply.github.com"
            git add factory-card-validation.log
            git commit -m "Record factory card validation failure"
            git push origin HEAD:agent/unified-factory-recipes-grid
            exit "$status"
          fi

      - name: Check patch formatting
        run: git diff --check

      - name: Remove one-time bootstrap
        shell: bash
        run: |
          rm -f scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-*
          rm -f .github/workflows/apply-unified-factory-recipes-grid.yml
          rm -f package-lock.json factory-card-validation.log

      - name: Commit validated implementation
        shell: bash
        run: |
          git config user.name "RIVERSOFT automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Unify factory recipes and card grid"
          git push origin HEAD:agent/unified-factory-recipes-grid

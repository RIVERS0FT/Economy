name: Clean factory recipe validation artifacts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: unified-factory-recipes-grid-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.head_ref == 'agent/unified-factory-recipes-grid'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/unified-factory-recipes-grid
          fetch-depth: 0

      - name: Remove validation-only files
        shell: bash
        run: |
          git config user.name "RIVERSOFT automation"
          git config user.email "actions@users.noreply.github.com"

          cat > .gitignore <<'EOF'
          node_modules/
          dist/
          __pycache__/
          *.pyc
          EOF

          git rm -r --ignore-unmatch node_modules dist scripts/__pycache__
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid-hotfix.py
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-00
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-01
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-02
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-03
          git rm --ignore-unmatch scripts/apply-unified-factory-recipes-grid.py.gz.b64.part-04
          git rm --ignore-unmatch factory-card-validation.log factory-card-commit.log
          git add .gitignore

          if git diff --cached --quiet; then
            exit 0
          fi

          git diff --cached --check
          git commit -m "Remove factory validation artifacts"
          git fetch origin agent/unified-factory-recipes-grid
          git rebase origin/agent/unified-factory-recipes-grid
          git push origin HEAD:agent/unified-factory-recipes-grid

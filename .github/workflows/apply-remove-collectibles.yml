name: Apply verified remove-collectibles patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/remove-collectibles'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify payload hash and gzip
        shell: bash
        run: |
          set -euo pipefail
          manifest='.agent/remove-collectibles.patch.sha256'
          mapfile -t parts < <(find .agent -maxdepth 1 -type f -name 'remove-collectibles.patch.b64.part-*' -print 2>/dev/null | sort)
          if [ ! -f "$manifest" ] || [ "${#parts[@]}" -eq 0 ]; then
            echo PATCH_PAYLOAD_NOT_READY
            exit 0
          fi
          printf 'part=%s\n' "${parts[@]}"
          expected="$(tr -d '[:space:]' < "$manifest")"
          cat "${parts[@]}" | base64 --decode > /tmp/remove-collectibles.patch.gz
          actual="$(sha256sum /tmp/remove-collectibles.patch.gz | awk '{print $1}')"
          echo "patch_parts=${#parts[@]}"
          echo "expected_sha256=$expected"
          echo "actual_sha256=$actual"
          test "$actual" = "$expected"
          gzip -t /tmp/remove-collectibles.patch.gz
          gzip --decompress --stdout /tmp/remove-collectibles.patch.gz > /tmp/remove-collectibles.patch
          wc -c /tmp/remove-collectibles.patch.gz /tmp/remove-collectibles.patch

      - name: Preflight source patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check --verbose /tmp/remove-collectibles.patch

      - name: Apply source patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --index --verbose /tmp/remove-collectibles.patch

      - name: Remove bootstrap files and publish source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent .github/workflows/apply-remove-collectibles.yml
          git add -A
          test ! -e .agent
          test ! -e .github/workflows/apply-remove-collectibles.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '删除藏品页面、玩法与管理员分区'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

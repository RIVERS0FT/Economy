name: Apply verified remove-collectibles patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/remove-collectibles'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact feature commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          show-progress: false

      - name: Verify payload SHA-256 and gzip
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from base64 import b64decode
          from gzip import decompress
          from hashlib import sha256
          from pathlib import Path

          def recover_one_missing_base64_byte(data, expected):
              alphabet = b'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
              prefix_hash = sha256()
              match = None
              for position in range(len(data) + 1):
                  suffix = data[position:]
                  for byte in alphabet:
                      candidate_hash = prefix_hash.copy()
                      candidate_hash.update(bytes((byte,)))
                      candidate_hash.update(suffix)
                      if candidate_hash.hexdigest() == expected:
                          candidate = data[:position] + bytes((byte,)) + suffix
                          if match is not None:
                              raise RuntimeError('multiple one-byte recovery candidates')
                          match = (position, byte, candidate)
                  if position < len(data):
                      prefix_hash.update(data[position:position + 1])
              if match is None:
                  raise RuntimeError('no one-byte recovery candidate')
              return match

          part_hashes = {
              '00': '8f34d4a9827bc7e15b28c0a2a2e53eff3ccda4166bb9e48b22e6b71cd108e9ef',
              '01': 'e9d538d678250188e77cee863861d2b9447dad813bc2d2f69609c8f309e45fe8',
              '02': '813d90b5e94ef9316a5846c15977e246f970c091146bf5959ad2d584659c1146',
              '03': '9946c4e9a8917998f9765fd13defa44d3676adfa6d71d6b1123469ead5ad9513',
              '04': '5c3e75ab80fd954a2055cf68ee3f19f28a6039ca0017feb441e7a5d68d7704dd',
              '05': '54f5de9145ae6a2bf49046e5a43825abdf1e5c18a1c62e1944a476a791e96bef',
              '06': '7bb438f5e884240b0b739ece385d110eb641e777662d8c031698832b991eeb04',
              '07': 'bf59fb0e25d8e06db52ec2d727e89224e8525b14cb4fa261734779959b6a5357',
              '08': '9632a107c3a3bc6f375cfcc84dec86825f2a4a23bccb9dd0816324e8b82cac23',
          }
          encoded_parts = []
          for suffix, expected in part_hashes.items():
              path = Path(f'.agent/remove-collectibles.patch.b64.part-{suffix}')
              data = path.read_bytes()
              actual = sha256(data).hexdigest()
              if actual != expected and len(data) > 0 and sha256(data[:-1]).hexdigest() == expected:
                  data = data[:-1]
                  path.write_bytes(data)
                  actual = sha256(data).hexdigest()
              if actual != expected and suffix == '07' and len(data) == 15999:
                  position, byte, data = recover_one_missing_base64_byte(data, expected)
                  print(f'{path}: restored {bytes((byte,))!r} at offset {position}')
                  path.write_bytes(data)
                  actual = sha256(data).hexdigest()
              print(f'{path}: bytes={len(data)} sha256={actual}')
              if actual != expected:
                  raise RuntimeError(f'part hash mismatch: {path}')
              encoded_parts.append(data)

          compressed = b64decode(b''.join(encoded_parts), validate=False)
          actual_payload = sha256(compressed).hexdigest()
          expected_payload = Path('.agent/remove-collectibles.patch.sha256').read_text(encoding='utf-8').strip()
          print(f'expected_sha256={expected_payload}')
          print(f'actual_sha256={actual_payload}')
          if actual_payload != expected_payload:
              raise RuntimeError('payload hash mismatch')

          patch = decompress(compressed)
          Path('/tmp/remove-collectibles.patch').write_bytes(patch)
          print(f'patch_bytes={len(patch)} patch_sha256={sha256(patch).hexdigest()}')
          PY

      - name: Preflight source patch
        run: git apply --check --verbose /tmp/remove-collectibles.patch

      - name: Apply source patch
        run: git apply --index --verbose /tmp/remove-collectibles.patch

      - name: Preserve final deploy workflow
        run: cp .github/workflows/deploy.yml /tmp/deploy.yml.final

      - name: Upload final deploy workflow
        uses: actions/upload-artifact@v4
        with:
          name: remove-collectibles-final-deploy-workflow
          path: /tmp/deploy.yml.final
          retention-days: 1

      - name: Restore workflow files and stage source
        shell: bash
        run: |
          set -euo pipefail
          git checkout HEAD -- .github/workflows/deploy.yml .github/workflows/apply-remove-collectibles.yml
          rm -rf .agent
          git add -A
          git diff --cached --check
          git status --short

      - name: Commit source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '删除藏品页面、玩法与管理员分区'

      - name: Push source without workflow changes
        run: git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

name: Finalize warehouse and factory layout

on:
  push:
    branches:
      - agent/warehouse-factory-card-layout

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/warehouse-factory-card-layout
          fetch-depth: 0

      - name: Update design documents
        run: |
          python3 - <<'PY'
          from pathlib import Path

          marker = '## 共享仓库与工厂卡片布局基线（2026-07-12）'
          additions = {
              'README.md': '''\n\n## 共享仓库与工厂卡片布局基线（2026-07-12）\n\n生产页共享仓库采用 `1:3` 左右分栏：左侧集中展示容量、买单预占和扩容，右侧按服务器商品目录展示商品卡片。商品卡只显示产品名称、可用库存和冻结库存，整卡进入对应商品市场。工厂卡保持全部生产信息，但采用双列自然高度和紧凑布局；运行、停止、异常及其原因只在卡片顶部展示，正文不得恢复独立“手动停止”或异常说明卡。客户端状态版本保持 10，世界版本保持 6。\n''',
              'docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md': '''\n\n## 共享仓库与工厂卡片布局基线（2026-07-12）\n\n生产页顺序固定为页面状态汇总、共享仓库、建设新工厂、工厂集群列表。共享仓库桌面端为 `minmax(220px, 1fr) minmax(0, 3fr)`：左侧只承担容量与升级，右侧以商品卡片显示产品名称、可用库存、冻结库存，并提供“有库存／全部商品”筛选。商品卡整卡跳转市场，不显示估值、行情、买单预占或直接出售表单。\n\n建设新工厂卡独立占据一行，不与工厂集群卡强制等高。宽屏工厂集群保持双列且 `align-items: start`，平板和移动端单列。工厂卡必须保留持有、参与、待加入、冻结、下一周期变化、周期、产量、成本、原料、进度、当前计划、待生效计划、编辑控件、市场入口和统一开关。运行、停止、异常是唯一顶部状态；`manual` 只显示为顶部“玩家已关闭生产”，正文不得再出现停止原因卡。停止和异常使用紧凑进度状态，不渲染大型空进度条。\n''',
              'docs/INDUSTRY_AND_PRODUCTION_DESIGN.md': '''\n\n## 共享仓库与工厂卡片布局基线（2026-07-12）\n\n工厂集群业务字段和生产规则保持不变，卡片仅调整信息密度。顶部由状态标签、工厂名称与数量、统一开关和唯一状态说明组成。运行时说明当前周期剩余时间；主动停止显示“玩家已关闭生产”；计划完成显示“定量生产计划已完成”；异常显示具体恢复条件。正文不得再次渲染 `statusReason`。\n\n数量区压缩为持有、参与、待加入、冻结四项；下一周期数量变化以紧凑说明保留。规格区保留周期、周期产量、周期成本以及原料需求和库存。运行状态保留进度条，停止和异常只显示一行紧凑进度状态。生产计划保留当前计划、完成量、待生效计划、模式、目标和保存按钮。市场入口使用紧凑文本操作。卡片自然高度排列，不得强制同排等高。\n''',
              'docs/UI_DESIGN_SYSTEM.md': '''\n\n## 共享仓库与工厂卡片布局基线（2026-07-12）\n\n仓库管理使用单一 `Panel` 内部 `1:3` 分栏，不拆成两个顶层面板。仓库商品必须使用统一紧凑卡片，整卡为可访问按钮；字段只允许产品名称、可用库存和冻结库存。宽屏四列、普通桌面三列、平板与手机两列、极窄屏单列。\n\n工厂卡片使用紧凑状态头、数量网格、规格网格、进度、计划和文本市场入口。状态原因只允许在顶部出现一次；不得创建 `manual-stop-card`、`factory-new-status`、`warehouse-special-panel` 或新的开关样式。基础按钮、状态标签、面板、输入框和开关继续使用设计系统组件。\n''',
          }

          for name, addition in additions.items():
              path = Path(name)
              text = path.read_text()
              if marker not in text:
                  path.write_text(text.rstrip() + addition + '\n')

          design = Path('docs/WAREHOUSE_AND_FACTORY_CARD_LAYOUT_DESIGN.md')
          design.write_text('''# Economy 共享仓库与工厂卡片布局设计\n\n> 状态：生产页面正式布局与防回退基线  \n> 更新时间：2026-07-12  \n> 客户端状态版本：10  \n> 世界状态版本：6\n\n## 1. 页面顺序\n\n页面标题与运行／停止／异常／施工汇总之后，依次为共享仓库、建设新工厂和工厂集群列表。\n\n## 2. 共享仓库\n\n共享仓库是单一顶层面板。桌面内部使用 `minmax(220px, 1fr) minmax(0, 3fr)`。左侧展示等级、容量进度、当前容量、实物库存、买单预占、剩余容量、下一等级容量、升级费用和升级按钮。右侧展示仓库内容。低于 960px 攉为上下布局。\n\n商品按服务器目录动态生成卡片。卡片只显示产品名称、可用库存和冻结库存，整卡进入对应商品市场。默认“有库存”仅显示可用或冻结大于零的商品，“全部商品”显示零库存商品。买单预占只保留在左侧汇总，不进入单项卡片。商品卡不得显示估值、价格、单项容量、描述或直接出售。\n\n宽屏四列、普通桌面三列、平板和手机两列，低于 420px 才单列。\n\n## 3. 建设卡\n\n建设新工厂卡独立占一行，不与工厂集群卡等高。所有建造费用、施工时间、周期、单座产量、单座成本、施工任务和建设操作保持不变。\n\n## 4. 工厂卡\n\n宽屏双列、自然高度、顶部对齐；低于 960px 单列。卡片不得减少业务内容，但缩小间距和内边距。\n\n顶部是唯一状态说明区：运行显示当前周期剩余时间；主动停止显示“玩家已关闭生产”；计划完成显示完成原因；异常显示资金、仓库、原料、计划或可用工厂问题及自动恢复语义。正文不得重复 `manual` 或异常原因。\n\n数量区保留持有、参与、待加入和卖单冻结，下一周期变化另以紧凑说明显示。规格区保留周期、产量、成本、原料需求和当前库存。运行时显示进度条；停止和异常只显示紧凑状态行。计划区保留当前计划、完成量、待生效计划和全部编辑控件。底部保留统一订单簿市场入口。\n\n## 5. 样式权威\n\n仓库布局只由 `src/styles/warehouse-expansion.css` 管理，工厂密度和网格只由 `src/styles/industry-system.css` 管理。基础组件仍由 `src/styles/design-system.css` 管理。不得新增仓库特殊面板、手动停止卡或工厂专属开关。\n\n## 6. 数据与版本\n\n商品卡使用已有 `game.products` 与 `game.inventories`，不新增 API 字段，不修改世界状态。正式容量继续使用服务器返回的仓库汇总。客户端版本保持 10，世界版本保持 6。\n\n## 7. 防回退\n\n必须检查 1:3 分栏、商品卡字段和市场跳转、库存筛选、移动端双列、建设卡独立、工厂双列自然高度、状态原因仅顶部一次、停止和异常无大型空进度条、全部生产字段仍存在，以及统一开关未被复制。\n''')
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/finalize-warehouse-factory-layout.yml

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run full build
        run: npm run build

      - name: Commit documentation
        env:
          BRANCH: agent/warehouse-factory-card-layout
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md \
            docs/PAGE_CONTENT_AND_NAVIGATION_DESIGN.md \
            docs/INDUSTRY_AND_PRODUCTION_DESIGN.md \
            docs/UI_DESIGN_SYSTEM.md \
            docs/WAREHOUSE_AND_FACTORY_CARD_LAYOUT_DESIGN.md \
            .github/workflows/finalize-warehouse-factory-layout.yml
          git commit -m "补充仓库与工厂卡片布局设计" || exit 0
          git push origin "HEAD:$BRANCH"

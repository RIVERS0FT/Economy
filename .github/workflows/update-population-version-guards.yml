name: Update population version guards
on:
  push:
    branches: [codex/population-economy-v7]
    paths:
      - scripts/update-population-version-guards.py
      - .github/workflows/update-population-version-guards.yml
permissions:
  contents: write
jobs:
  patch:
    if: contains(github.event.head_commit.message, '[population-version-guards]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/population-economy-v7
          fetch-depth: 0
      - run: python3 scripts/update-population-version-guards.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update population economy version guards"
          git push origin HEAD:codex/population-economy-v7

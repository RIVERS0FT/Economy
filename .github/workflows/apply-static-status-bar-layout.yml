name: Apply static status bar layout

on:
  push:
    branches:
      - codex/remove-status-bar-scroll-area
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: codex/remove-status-bar-scroll-area

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.4.0
          cache: npm

      - name: Escape generated test templates
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-static-status-bar-layout.mjs')
          content = path.read_text()
          content = content.replace(
              "expect(state.contentOverflow, `状态栏内容在 ${width}px 发生横向溢出`).toBe(false);",
              "expect(state.contentOverflow, \\`状态栏内容在 ${width}px 发生横向溢出\\`).toBe(false);",
          )
          content = content.replace(
              "expect(state.hostOverflow, `状态栏宿主在 ${width}px 发生横向溢出`).toBe(false);",
              "expect(state.hostOverflow, \\`状态栏宿主在 ${width}px 发生横向溢出\\`).toBe(false);",
          )
          content = content.replace(
              "expect(state.itemsInside, `状态项在 ${width}px 超出固定五列`).toBe(true);",
              "expect(state.itemsInside, \\`状态项在 ${width}px 超出固定五列\\`).toBe(true);",
          )
          path.write_text(content)
          PY

      - name: Validate migration script
        run: node --check scripts/apply-static-status-bar-layout.mjs

      - name: Apply migration
        run: |
          set +e
          node scripts/apply-static-status-bar-layout.mjs > migration-error.txt 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add migration-error.txt
            git commit -m "chore: capture status bar migration error"
            git push origin HEAD:codex/remove-status-bar-scroll-area
            exit "$status"
          fi
          rm migration-error.txt

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run build

      - name: Commit migration
        run: |
          rm scripts/apply-static-status-bar-layout.mjs
          rm .github/workflows/apply-static-status-bar-layout.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: remove status bar scroll area"
          git push origin HEAD:codex/remove-status-bar-scroll-area

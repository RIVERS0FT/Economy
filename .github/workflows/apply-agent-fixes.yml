name: Apply Economy audit fixes

on:
  pull_request:
    types:
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-economy-audit-fixes
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.number == 190
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-audit-and-recent-trade-valuation
          fetch-depth: 0

      - name: Reassemble and apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/agent-patch/part-* > /tmp/economy-audit-fixes.patch.gz.b64
          base64 --decode /tmp/economy-audit-fixes.patch.gz.b64 | gzip --decompress > /tmp/economy-audit-fixes.patch
          echo 'b8b5b61a49a46bbfb8e273810f2a7456b318e6f69f41f4ccb2d273587869f8f7  /tmp/economy-audit-fixes.patch' | sha256sum --check
          git apply --check /tmp/economy-audit-fixes.patch
          git apply /tmp/economy-audit-fixes.patch
          rm -rf .github/agent-patch
          rm -f .github/agent-fixes.patch.gz.b64 .github/workflows/apply-agent-fixes.yml

      - name: Commit repaired project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '修复审计问题并改用最近成交价估值'
          git push origin HEAD:agent/fix-audit-and-recent-trade-valuation
